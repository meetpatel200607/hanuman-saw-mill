        }
        @media(max-width:760px){
          main{padding:14px!important}
          .orders-shell{padding:14px!important;border-radius:16px!important}
          .order-card-grid{grid-template-columns:1fr!important;gap:14px!important;padding:16px!important}
          .orders-right{align-items:flex-start!important;min-width:0!important;width:100%}
          .orders-right>div{text-align:left!important}
          .order-card{border-radius:16px!important}
        }
      `}</style>
    </div>
  );
}

// ── DISPATCH CONFIRM MODAL (scan QR or enter order # / ID to confirm and mark In Transit) ──
function DispatchModal({order,orders,onConfirm,onCancel,toast2}){
  const [scanned,setScanned]=useState(false);
  const [mid,setMid]=useState("");
  const checkMatch=text=>{
    const t=String(text||"").trim();
    if(!t) return false;
    return t===order.id||t===(order.groupId||order.id)||t===order.mobile||matchesOrderNumber(order,t,orders||[]);
  };
  const onScan=text=>{
    if(checkMatch(text)){setScanned(true);toast2("QR matched!");}
    else toast2("This QR doesn't match this order","err");
  };
  const searchMid=()=>{
    if(checkMatch(mid)){setScanned(true);toast2("Order matched!");}
    else toast2("That order # / ID doesn't match this order","err");
  };
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#fff",borderRadius:16,padding:22,maxWidth:420,width:"100%"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={{fontWeight:700,fontSize:16}}>Dispatch Order</div>
          <button onClick={onCancel} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:"#bbb"}}><i className="ti ti-x"/></button>
        </div>
        <div style={{background:"#fafaf8",borderRadius:10,padding:12,marginBottom:14}}>
          {order.orderNum&&<div style={{fontSize:18,fontWeight:900,color:"#cc0000"}}>Order {displayOrderNum(order)}</div>}
          <div style={{fontSize:13,fontWeight:600}}>{order.customer}</div>
          <div style={{fontSize:11,color:"#aaa",marginTop:2}}>{orderDateTime(order).label}</div>
          <div style={{fontSize:12,color:"#999"}}>{order.product} · {order.wood} · <b className="size-strong-sm">{order.size}</b> · Qty {order.qty}</div>
        </div>
        {!scanned?(
          <>
            <div style={{fontSize:12.5,color:"#777",marginBottom:10}}>Scan this order's QR code to confirm it's being loaded for transport.</div>
            <QRScanner onResult={onScan} onError={()=>toast2("Camera error","err")}/>
            <div style={{display:"flex",alignItems:"center",gap:10,margin:"14px 0"}}>
              <div style={{flex:1,height:1,background:"#eee"}}/>
              <span style={{fontSize:11,color:"#bbb",flexShrink:0}}>OR ENTER ORDER #/ID</span>
              <div style={{flex:1,height:1,background:"#eee"}}/>
            </div>
            <div style={{display:"flex",gap:8}}>
              <input className="inp" value={mid} onChange={e=>setMid(e.target.value)} placeholder="Order #, Order ID or Mobile" onKeyDown={e=>e.key==="Enter"&&searchMid()}/>
              <button className="btn btn-red" onClick={searchMid}><i className="ti ti-search"/></button>
            </div>
          </>
        ):(
          <div style={{padding:14,background:"#e1f5ee",borderRadius:10,color:"#0f6e56",fontWeight:600,fontSize:13,textAlign:"center",marginBottom:14}}>
            <i className="ti ti-circle-check" style={{marginRight:6}}/>Order Matched & Confirmed
          </div>
        )}
        <div style={{display:"flex",gap:10,marginTop:14}}>
          <button className="btn btn-outline" style={{flex:1,justifyContent:"center"}} onClick={onCancel}>Cancel</button>
          <button className="btn btn-red" disabled={!scanned} style={{flex:1,justifyContent:"center",opacity:scanned?1:.5,cursor:scanned?"pointer":"not-allowed"}} onClick={()=>scanned&&onConfirm()}><i className="ti ti-truck"/>OK — Mark In Transit</button>
        </div>
      </div>
    </div>
  );
}

// ── FACTORY ──
function Factory({orders,allOrders,delOrder,updOrder,updOrderH,user,onAdd,toast2,goto}){
  // Office-placed orders still go through the full factory production workflow (Accept → Production → Dispatch).
  // Factory-sourced orders bypass that workflow entirely — they only support Delivered & Paid.
  const pendAccept=orders.filter(o=>!isFactoryOrder(o)&&o.status===S.PEND);
  const inProd=orders.filter(o=>!isFactoryOrder(o)&&o.status===S.PROD);
  const inTransit=orders.filter(o=>!isFactoryOrder(o)&&o.status===S.TRANSIT);
  const factoryAwaitingDelivery=orders.filter(o=>isFactoryOrder(o)&&o.status!==S.DELI);
  const active=[...pendAccept,...inProd,...inTransit,...factoryAwaitingDelivery];
  const [sel,setSel]=useState(null);
  const [delTarget,setDelTarget]=useState(null);
  const [dispatchTarget,setDispatchTarget]=useState(null);
  const [showNewOrder,setShowNewOrder]=useState(false);
  const [scanMode,setScanMode]=useState(null); // 'dispatch' | 'deliver' | null
  const [scanResult,setScanResult]=useState(null); // the matched order after scan
  const [qrSelectMode,setQrSelectMode]=useState(false);
  const [selectedQRIds,setSelectedQRIds]=useState(new Set());
  const [histOrder,setHistOrder]=useState(null);

  const [factoryDeliveredOrder,setFactoryDeliveredOrder]=useState(null); // success screen after factory delivery

  const acceptOrder=o=>{
    const h=makeHistoryEntry("Accepted","Factory");
    updOrderH(o.id,{status:S.PROD,acceptedAt:now2(),acceptedBy:user.name},h);
    toast2("Order accepted — now In Production");setSel(null);
  };
  const confirmDispatch=o=>{
    const h=makeHistoryEntry("Dispatched","Factory");
    updOrderH(o.id,{status:S.TRANSIT,dispatchedAt:now2(),dispatchedBy:user.name},h);
    toast2("Order marked In Transit!");setDispatchTarget(null);setSel(null);
  };
  const markFactoryDelivered=o=>{
    if(o.status===S.DELI){toast2("Already delivered","err");return;}
    // Auto-accept if an Office-workflow order was still Pending (Factory-sourced orders never enter that workflow)
    let extraPatch={};
    if(!isFactoryOrder(o)&&o.status===S.PEND){extraPatch={acceptedAt:now2(),acceptedBy:user.name};}
    const h=makeHistoryEntry("Delivered at Factory","Factory");
    const patch={status:S.DELI,pending:0,payMethod:"Cash",deliveryChannel:"Direct Factory Pickup",payAt:now2(),deliveredAt:now2(),deliveredBy:user.name,deliveredLocation:"At Production",...extraPatch};
    updOrderH(o.id,patch,h);
    toast2("Order marked Delivered from Factory");
    setFactoryDeliveredOrder({...o,...patch});
    setSel(null);setScanResult(null);setScanMode(null);
  };

  // Scanning the single order QR now loads every size/sub-item belonging to that order.
  const onScanDispatch=useCallback(text=>{
    const g=findGroupByText(text,orders);
    if(!g||!g.length){toast2("QR scanned but order not found","err");return;}
    setScanResult(g);
    toast2("Order found: "+displayOrderNum(g[0],orders)+(g.length>1?` (${g.length} items)`:""));
  },[orders,toast2]);

  const [scanMid,setScanMid]=useState("");
  const searchScanDispatch=()=>{
    const g=findGroupByText(scanMid,orders);
    if(g&&g.length){setScanResult(g);toast2("Order found: "+displayOrderNum(g[0],orders));}
    else toast2("Order not found","err");
  };

  if(showNewOrder) return(
    <div>
      <button className="btn btn-outline" style={{marginBottom:14,padding:"7px 14px",fontSize:12}} onClick={()=>setShowNewOrder(false)}>← Back to Factory View</button>
      <NewOrder user={user} onAdd={onAdd} toast2={toast2} orders={orders} allOrders={allOrders||orders} goto={goto||(()=>setShowNewOrder(false))} defaultSource="Factory"/>
    </div>
  );

  // ── Factory Delivery Success Screen ──
  if(factoryDeliveredOrder) return(
    <div style={{maxWidth:480,margin:"0 auto"}}>
      <div className="card" style={{textAlign:"center"}}>
        <div style={{width:52,height:52,background:"#e1f5ee",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 12px"}}>
          <i className="ti ti-package-export" style={{fontSize:26,color:"#1d9e75"}}/>
        </div>
        <div style={{fontSize:17,fontWeight:700,marginBottom:2}}>Delivered from Factory!</div>
        {factoryDeliveredOrder.orderNum&&<div style={{fontSize:22,fontWeight:900,color:"#cc0000",marginBottom:2,display:"flex",alignItems:"center",justifyContent:"center",gap:8,flexWrap:"wrap"}}>Order {displayOrderNum(factoryDeliveredOrder,orders)} {isFactoryOrder(factoryDeliveredOrder)&&<FactoryOrderBadge/>}</div>}
        <div style={{fontSize:13,color:"#999",marginBottom:4}}>{factoryDeliveredOrder.customer} · {factoryDeliveredOrder.mobile}</div>
        <div style={{fontSize:11,color:"#1d9e75",fontWeight:600,marginBottom:16}}>Collection: {collectionLocationOf(factoryDeliveredOrder)} — Delivered & Paid</div>
        <div style={{background:"#fafaf8",borderRadius:12,padding:14,marginBottom:18,textAlign:"left",border:"1px solid #eeebe6"}}>
          <div style={{fontSize:12,fontWeight:700,color:"#888",marginBottom:8,textTransform:"uppercase",letterSpacing:.5}}>Order Summary</div>
          {[["Product",factoryDeliveredOrder.product],["Wood",factoryDeliveredOrder.wood],["Size",factoryDeliveredOrder.size],["Qty",factoryDeliveredOrder.qty],["Delivered At",factoryDeliveredOrder.deliveredAt]].map(([k,v])=>(
            <div key={k} style={{display:"flex",justifyContent:"space-between",fontSize:12.5,padding:"4px 0",borderBottom:"1px solid #f5f2ee"}}>
              <span style={{color:"#999"}}>{k}</span>
              <b className={k==="Size"?"size-strong-sm":""}>{v}</b>
            </div>
          ))}
        </div>
        <div style={{fontSize:12,color:"#888",marginBottom:10}}>Want to request feedback from this customer?</div>
        <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
          <button className="btn" style={{background:"#25D366",color:"#fff",fontWeight:700,fontSize:14}}
            onClick={()=>{
              sendFeedbackRequest(factoryDeliveredOrder);
              const h=makeHistoryEntry("Google Review Request Sent","Factory");
              updOrderH(factoryDeliveredOrder.id,{feedbackSent:true,feedbackSentAt:now2()},h);
              toast2("Feedback request sent on WhatsApp!");
              setFactoryDeliveredOrder(null);
            }}>
            <i className="ti ti-brand-whatsapp" style={{fontSize:18}}/>Send Feedback Request
          </button>
          <button className="btn btn-outline" onClick={()=>setFactoryDeliveredOrder(null)}>
            <i className="ti ti-qrcode"/>Scan Next Order
          </button>
        </div>
      </div>
    </div>
  );

  if(sel) return(
    <div style={{maxWidth:440,margin:"0 auto"}}>
      {histOrder&&<OrderHistoryPanel order={histOrder} onClose={()=>setHistOrder(null)}/>}
      {delTarget&&<DeleteConfirm order={delTarget} onCancel={()=>setDelTarget(null)} onConfirm={()=>{delOrder(delTarget.id);setDelTarget(null);setSel(null);}}/>}
      {dispatchTarget&&<DispatchModal order={dispatchTarget} orders={orders} toast2={toast2} onCancel={()=>setDispatchTarget(null)} onConfirm={()=>confirmDispatch(dispatchTarget)}/>}
      <button className="btn btn-outline" style={{marginBottom:14,padding:"7px 14px",fontSize:12}} onClick={()=>setSel(null)}>← Back</button>
      <div className="card" style={{textAlign:"center"}}>
        <div style={{fontSize:22,fontWeight:900,color:"#cc0000",marginBottom:2,display:"flex",alignItems:"center",justifyContent:"center",gap:8,flexWrap:"wrap"}}>
          <OrderNumberEditor order={sel} orders={orders} updOrder={updOrder} user={user} toast2={toast2} onLocalUpdate={setSel}/>
          {isFactoryOrder(sel)&&<FactoryOrderBadge/>}
        </div>
        <div style={{fontSize:12,color:"#aaa",marginBottom:4}}>{sel.id||"—"}</div>
        <div style={{fontSize:17,fontWeight:700,marginBottom:2}}>{sel.customer||"—"}</div>
        <div style={{fontSize:13,color:"#999",marginBottom:10}}>{sel.mobile||"—"}</div>
        <div style={{marginBottom:14}}><StatusBadge s={sel.status}/></div>
        <div style={{background:"#fafaf8",borderRadius:12,padding:14,display:"inline-block",marginBottom:14}}><QRSvg order={sel}/></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,fontSize:12.5,marginBottom:16,textAlign:"left"}}>
          {[["Product",sel.product||"—"],["Wood",sel.wood||"—"],["Size",sel.size||"—"],["Qty",sel.qty||"—"],["Order Date",orderDateTime(sel).date],["Order Time",orderDateTime(sel).time],["Delivery",fmtD(sel.delivery)],["Collection",collectionLocationOf(sel)],
          ...(sel.status!==S.DELI&&(isFactoryOrder(sel)||sel.status===S.TRANSIT)?[["Total",fmtM(orderTotalOf(sel))],["Received",fmtM(sel.advance)],["Pending",fmtM(sel.pending)]]:[])
          ].map(([k,v])=>(
            <div key={k} style={{background:k==="Size"?"#f5f0e8":"#fafaf8",borderRadius:9,padding:"9px 11px",border:k==="Size"?"1.5px solid #d5cfc4":"none",gridColumn:k==="Size"?"span 2":undefined}}><div style={{fontSize:10,color:"#bbb",marginBottom:2}}>{k}</div><div className={k==="Size"?"size-strong":""} style={{fontWeight:600}}>{v}</div></div>
          ))}
          {sel.notes&&<div style={{gridColumn:"span 2",background:"#fff8f8",borderRadius:9,padding:"9px 11px",border:"1px solid #ffe0e0"}}><div style={{fontSize:10,color:"#cc0000",marginBottom:2}}>Notes</div><div style={{fontSize:12}}>{sel.notes}</div></div>}
        </div>
        <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
          {!isFactoryOrder(sel)&&sel.status===S.PEND&&<button className="btn btn-green" style={{fontSize:14}} onClick={()=>acceptOrder(sel)}><i className="ti ti-check"/>Accept Order</button>}
          {!isFactoryOrder(sel)&&sel.status===S.PROD&&<button className="btn" style={{background:"#6a1bb5",color:"#fff",fontSize:14}} onClick={()=>setDispatchTarget(sel)}><i className="ti ti-truck"/>Dispatch</button>}
          {sel.status!==S.DELI&&<button className="btn btn-green" style={{fontSize:14}} onClick={()=>markFactoryDelivered(sel)}><i className="ti ti-package-export"/>Deliver at Factory{!isFactoryOrder(sel)&&sel.status===S.PEND?" (Auto-Accept)":""}</button>}
          {!isFactoryOrder(sel)&&sel.status===S.TRANSIT&&<div style={{padding:"10px 16px",background:"#f0e6fb",borderRadius:10,color:"#6a1bb5",fontWeight:600,fontSize:13}}><i className="ti ti-truck" style={{marginRight:6}}/>In Transit since {sel.dispatchedAt}</div>}
          <button className="btn btn-outline" style={{fontSize:13}} onClick={()=>setHistOrder(sel)}><i className="ti ti-history"/>History</button>
          <button className="btn btn-red" onClick={()=>printQR(sel)}><i className="ti ti-printer"/>Print QR</button>
          {user.role==="Admin"&&<button className="btn btn-danger" onClick={()=>setDelTarget(sel)}><i className="ti ti-trash"/>Trash</button>}
        </div>
        {groupMembers(sel,orders).length>1&&(
          <div style={{marginTop:18,textAlign:"left"}}>
            <div style={{fontSize:11,fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>Other Sizes In This Order</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {groupMembers(sel,orders).filter(x=>x.id!==sel.id).map(o=>(
                <div key={o.id} className="card" style={{padding:"10px 12px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:8,flexWrap:"wrap",cursor:"pointer"}} onClick={()=>setSel(o)}>
                  <div>
                    <div style={{fontSize:12.5,fontWeight:700}}>{displayOrderNum(o,orders)} · <b className="size-strong-sm">{o.size}</b></div>
                    <div style={{fontSize:11,color:"#999"}}>Qty {o.qty}</div>
                  </div>
                  <StatusBadge s={o.status}/>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );

  const Section=({title,list,color,emptyMsg,renderAction})=>(
    <div style={{marginBottom:22}}>
      <div style={{fontSize:12,fontWeight:700,color,textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>{title} ({list.length})</div>
      <div style={{display:"flex",flexDirection:"column",gap:9}}>
        {list.length===0&&<div style={{textAlign:"center",padding:24,color:"#bbb",background:"#fff",borderRadius:14,fontSize:13}}>{emptyMsg}</div>}
        {list.map(o=>(
          <div key={o.id} className="card" style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",flexWrap:"wrap",border:qrSelectMode&&selectedQRIds.has(o.id)?"2px solid #cc0000":"1px solid #eeebe6"}}>
            {qrSelectMode&&(
              <div onClick={()=>setSelectedQRIds(p=>{const n=new Set(p);n.has(o.id)?n.delete(o.id):n.add(o.id);return n;})} style={{width:24,height:24,borderRadius:6,border:`2px solid ${selectedQRIds.has(o.id)?"#cc0000":"#ddd"}`,background:selectedQRIds.has(o.id)?"#cc0000":"#fff",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0,transition:"all .15s"}}>
                {selectedQRIds.has(o.id)&&<i className="ti ti-check" style={{fontSize:14,color:"#fff"}}/>}
              </div>
            )}
            <div onClick={()=>!qrSelectMode&&setSel(o)} style={{display:"flex",alignItems:"center",gap:12,flex:1,cursor:qrSelectMode?"default":"pointer",minWidth:0}}>
              <div style={{width:44,height:44,background:"#fff3f3",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <OrderNumberEditor order={o} orders={orders} updOrder={updOrder} user={user} toast2={toast2} compact/>
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                  <div style={{fontWeight:700,color:"#1a1a1a",fontSize:14}}>{o.customer}</div>
                  {isFactoryOrder(o)&&<FactoryOrderBadge/>}
                </div>
                <div style={{fontSize:11,color:"#aaa"}}>{orderDateTime(o).label}</div>
                <div style={{fontSize:11,color:"#854f0b",fontWeight:600}}><i className="ti ti-map-pin" style={{marginRight:3}}/>{collectionLocationOf(o)}</div>
                <div style={{fontSize:12,color:"#999"}}>{o.product} · {o.wood} · <b className="size-strong-sm">{o.size}</b> · Qty {o.qty}</div>
              </div>
              <div style={{textAlign:"right",marginRight:4,flexShrink:0}}>
                <div style={{fontSize:11,color:"#bbb"}}>Delivery</div>
                <div style={{fontWeight:600,fontSize:13}}>{fmtD(o.delivery)}</div>
              </div>
            </div>
            <div style={{display:"flex",gap:6,flexShrink:0,flexWrap:"wrap"}}>
              {!qrSelectMode&&renderAction(o)}
              {!qrSelectMode&&user.role==="Admin"&&<button className="btn btn-danger" title="Move to Trash" style={{padding:"6px 10px",fontSize:12}} onClick={e=>{e.stopPropagation();setDelTarget(o);}}><i className="ti ti-trash"/></button>}
            </div>
          </div>
        ))}
      </div>
    </div>
  );

  const doScanDispatchItem=o=>{
    const h=makeHistoryEntry("Dispatched","Factory");
    updOrderH(o.id,{status:S.TRANSIT,dispatchedAt:now2(),dispatchedBy:user.name},h);
    toast2("Order "+displayOrderNum(o,orders)+" marked In Transit!");
    setScanResult(g=>g&&g.map(x=>x.id===o.id?{...x,status:S.TRANSIT,dispatchedAt:now2(),dispatchedBy:user.name}:x));
  };
  const doScanDispatchAll=()=>{
    const items=scanResult.filter(o=>o.status===S.PROD);
    items.forEach(o=>{
      const h=makeHistoryEntry("Dispatched","Factory");
      updOrderH(o.id,{status:S.TRANSIT,dispatchedAt:now2(),dispatchedBy:user.name},h);
    });
    toast2(`${items.length} item${items.length===1?"":"s"} marked In Transit!`);
    setScanResult(null);setScanMode(null);
  };
  const markFactoryDeliveredAll=()=>{
    const items=scanResult.filter(o=>o.status!==S.DELI);
    items.forEach(markFactoryDelivered);
    setScanResult(null);setScanMode(null);
  };

  return(
    <div>
      {delTarget&&<DeleteConfirm order={delTarget} onCancel={()=>setDelTarget(null)} onConfirm={()=>{delOrder(delTarget.id);setDelTarget(null);}}/>}
      {dispatchTarget&&<DispatchModal order={dispatchTarget} orders={orders} toast2={toast2} onCancel={()=>setDispatchTarget(null)} onConfirm={()=>confirmDispatch(dispatchTarget)}/>}

      {/* ── Top action bar ── */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:10}}>
        <div style={{fontSize:13,color:"#999"}}>{active.length} active orders in factory</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <button className="btn" style={{background:qrSelectMode?"#cc0000":"#fff",color:qrSelectMode?"#fff":"#555",border:"1.5px solid #ddd"}} onClick={()=>{setQrSelectMode(p=>!p);setSelectedQRIds(new Set());}}>
            <i className="ti ti-checkbox"/>
            {qrSelectMode?"Cancel QR Select":"Select QR to Print"}
          </button>
          <button className="btn" style={{background:"#6a1bb5",color:"#fff"}} onClick={()=>{setScanMode(m=>m==="dispatch"?null:"dispatch");setScanResult(null);setScanMid("");}}>
            <i className="ti ti-qrcode"/>Scan & Dispatch
          </button>
          <button className="btn" style={{background:"#1d9e75",color:"#fff"}} onClick={()=>{setScanMode(m=>m==="deliver"?null:"deliver");setScanResult(null);setScanMid("");}}>
            <i className="ti ti-qrcode"/>Scan & Deliver
          </button>
          <button className="btn btn-red" onClick={()=>setShowNewOrder(true)}>
            <i className="ti ti-plus"/>Add New Order
          </button>
        </div>
      </div>

      {/* ── Batch QR Print bar ── */}
      {qrSelectMode&&selectedQRIds.size>0&&(
        <div style={{background:"#1a1a1a",borderRadius:12,padding:"12px 16px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
          <div style={{color:"#fff",fontSize:13,fontWeight:600}}><i className="ti ti-checkbox" style={{marginRight:6,color:"#cc0000"}}/>{selectedQRIds.size} order{selectedQRIds.size===1?"":"s"} selected</div>
          <div style={{display:"flex",gap:8}}>
            <button className="btn btn-outline" style={{fontSize:12,color:"#bbb",borderColor:"#555"}} onClick={()=>setSelectedQRIds(new Set())}>Clear</button>
            <button className="btn btn-red" style={{fontSize:13}} onClick={()=>{
              const chosen=active.filter(o=>selectedQRIds.has(o.id));
              // One QR label per order — dedupe by group so a multi-size order only prints once.
              const seen=new Set();const dedupedChosen=chosen.filter(o=>{const gid=o.groupId||o.id;if(seen.has(gid))return false;seen.add(gid);return true;});
              printMultiQR(dedupedChosen);
            }}><i className="ti ti-printer"/>Print {selectedQRIds.size} QR{selectedQRIds.size===1?"":"s"}</button>
          </div>
        </div>
      )}

      {/* ── Inline Factory QR scan panel ── */}
      {scanMode&&(
        <div className="card" style={{marginBottom:18,border:`2px solid ${scanMode==="dispatch"?"#6a1bb5":"#1d9e75"}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div>
              <div style={{fontWeight:700,fontSize:15,color:scanMode==="dispatch"?"#6a1bb5":"#1d9e75"}}><i className="ti ti-qrcode" style={{marginRight:6}}/>{scanMode==="dispatch"?"Factory Scan & Dispatch":"Factory Scan & Deliver"}</div>
              <div style={{fontSize:11,color:"#888",marginTop:2}}>{scanMode==="dispatch"?"Mark an order as dispatched (In Transit) from the factory":"For customers picking up directly from the factory"}</div>
            </div>
            <button onClick={()=>{setScanMode(null);setScanResult(null);setScanMid("");}} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:"#bbb"}}><i className="ti ti-x"/></button>
          </div>

          {!scanResult?(
            <>
              <div style={{fontSize:12.5,color:"#777",marginBottom:12}}>
                {scanMode==="dispatch"?"Scan the order's QR code to mark it dispatched (In Transit).":"Scan the customer's order QR code. You can mark it delivered directly from here — no need to route through the Office."}
              </div>
              <QRScanner onResult={onScanDispatch} onError={()=>toast2("Camera error","err")}/>
              <div style={{display:"flex",alignItems:"center",gap:10,margin:"14px 0"}}>
                <div style={{flex:1,height:1,background:"#eee"}}/>
                <span style={{fontSize:11,color:"#bbb",flexShrink:0}}>OR SEARCH MANUALLY</span>
                <div style={{flex:1,height:1,background:"#eee"}}/>
              </div>
              <div style={{display:"flex",gap:8}}>
                <input className="inp" value={scanMid} onChange={e=>setScanMid(e.target.value)} placeholder="Order #, Order ID or Mobile" onKeyDown={e=>e.key==="Enter"&&searchScanDispatch()}/>
                <button className="btn btn-red" onClick={searchScanDispatch}><i className="ti ti-search"/></button>
              </div>
            </>
          ):(
            <>
              {/* ── Matched order — every size/sub-item from this one QR ── */}
              <div style={{background:"#e8f9f2",border:"1.5px solid #7dd8b5",borderRadius:12,padding:14,marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8,marginBottom:10}}>
                  <div>
                    <div style={{fontSize:20,fontWeight:900,color:"#0f6e56",marginBottom:2}}>{displayOrderNum(scanResult[0],orders)}{scanResult.length>1?` — ${scanResult.length} items`:""}</div>
                    <div style={{fontWeight:700,fontSize:15}}>{scanResult[0].customer}</div>
                    <div style={{fontSize:12,color:"#777"}}>{scanResult[0].mobile}</div>
                  </div>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {scanResult.map(o=>(
                    <div key={o.id} style={{background:"#fff",border:"1.5px solid #7dd8b5",borderRadius:10,padding:12}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:6}}>
                        <div style={{fontSize:13,fontWeight:700}}>{displayOrderNum(o,orders)} · <b className="size-strong-sm">{o.size}</b></div>
                        <StatusBadge s={o.status}/>
                      </div>
                      <div style={{fontSize:12,color:"#777",marginBottom:8}}>{o.product} · {o.wood} · Qty {o.qty}{scanMode!=="dispatch"&&o.status!==S.DELI?` · Total ${fmtM(orderTotalOf(o))} · Received ${fmtM(o.advance)} · Pending ${fmtM(o.pending)}`:""}</div>
                      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                        {scanMode==="dispatch"?(
                          <>
                            {o.status===S.PROD&&<button className="btn" style={{padding:"6px 12px",fontSize:12,background:"#6a1bb5",color:"#fff"}} onClick={()=>doScanDispatchItem(o)}><i className="ti ti-truck"/>Mark In Transit</button>}
                            {o.status===S.PEND&&<span style={{fontSize:11.5,color:"#cc0000",fontWeight:700}}>Not yet accepted — accept it first</span>}
                            {o.status===S.TRANSIT&&<span style={{fontSize:11.5,color:"#6a1bb5",fontWeight:700}}><i className="ti ti-truck" style={{marginRight:4}}/>Already In Transit</span>}
                            {o.status===S.DELI&&<span style={{fontSize:11.5,color:"#0f6e56",fontWeight:700}}><i className="ti ti-circle-check" style={{marginRight:4}}/>Already Delivered</span>}
                          </>
                        ):(
                          <>
                            {o.status!==S.DELI&&<button className="btn btn-green" style={{padding:"6px 12px",fontSize:12}} onClick={()=>markFactoryDelivered(o)}><i className="ti ti-package-export"/>Deliver{o.status===S.PEND?" (Auto-Accept)":""}</button>}
                            {o.status===S.DELI&&<span style={{fontSize:11.5,color:"#0f6e56",fontWeight:700}}><i className="ti ti-circle-check" style={{marginRight:4}}/>Already Delivered</span>}
                          </>
                        )}
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                <button className="btn btn-outline" style={{flex:1,justifyContent:"center"}} onClick={()=>{setScanResult(null);setScanMid("");}}>
                  <i className="ti ti-arrow-back-up"/>Scan Again
                </button>
                {scanMode==="dispatch"&&scanResult.filter(o=>o.status===S.PROD).length>1&&<button className="btn" style={{flex:1,justifyContent:"center",background:"#6a1bb5",color:"#fff",fontSize:14}} onClick={doScanDispatchAll}>
                  <i className="ti ti-truck"/>Mark All In Transit
                </button>}
                {scanMode==="deliver"&&scanResult.filter(o=>o.status!==S.DELI).length>1&&<button className="btn btn-green" style={{flex:1,justifyContent:"center",fontSize:14,fontWeight:700}} onClick={markFactoryDeliveredAll}>
                  <i className="ti ti-package-export"/>Deliver All
                </button>}
              </div>
            </>
          )}
        </div>
      )}

      <Section title="Pending Factory Acceptance" color="#cc0000" list={pendAccept} emptyMsg="Nothing awaiting acceptance"
        renderAction={o=><button className="btn btn-green" style={{padding:"7px 12px",fontSize:12}} onClick={e=>{e.stopPropagation();acceptOrder(o);}}><i className="ti ti-check"/>Accept</button>}/>

      <Section title="In Production" color="#854f0b" list={inProd} emptyMsg="Nothing currently in production"
        renderAction={o=><button className="btn" style={{padding:"7px 12px",fontSize:12,background:"#6a1bb5",color:"#fff"}} onClick={e=>{e.stopPropagation();setDispatchTarget(o);}}><i className="ti ti-truck"/>Dispatch</button>}/>

      <Section title="In Transit" color="#6a1bb5" list={inTransit} emptyMsg="Nothing currently in transit"
        renderAction={o=><span style={{fontSize:11,color:"#6a1bb5",fontWeight:600,padding:"7px 10px"}}><i className="ti ti-truck" style={{marginRight:4}}/>On the way</span>}/>

      <Section title="Factory Orders — Awaiting Delivery" color="#1d9e75" list={factoryAwaitingDelivery} emptyMsg="No factory orders awaiting delivery"
        renderAction={o=><button className="btn btn-green" style={{padding:"7px 12px",fontSize:12}} onClick={e=>{e.stopPropagation();markFactoryDelivered(o);}}><i className="ti ti-package-export"/>Deliver</button>}/>
    </div>
  );
}

// ── RECEIVE ──
// A single QR now represents the WHOLE order — scanning/searching loads every size/sub-item at once
// so staff can review and receive each of them (or all of them together) from this one screen.
function Receive({orders,updOrder,updOrderH,user,toast2}){
  const [foundGroup,setFoundGroup]=useState(null); // array of all sub-items belonging to the scanned order
  const [mid,setMid]=useState("");

  const onScan=useCallback(text=>{
    const g=findGroupByText(text,orders);
    if(g&&g.length){setFoundGroup(g);toast2("Order found: "+displayOrderNum(g[0],orders)+(g.length>1?` (${g.length} items)`:""));}
    else toast2("QR scanned but order not found: "+text,"err");
  },[orders,toast2]);

  const search=()=>{
    const g=findGroupByText(mid,orders);
    if(g&&g.length)setFoundGroup(g);else toast2("Order not found","err");
  };

  const receivable=o=>!isFactoryOrder(o)&&o.status===S.TRANSIT;
  const markRecvOne=o=>{
    const h=makeHistoryEntry("Received at Office","Office");
    updOrderH(o.id,{status:S.RECV,receivedAt:now2(),receivedBy:user.name},h);
  };
  const markRecvItem=o=>{
    if(isFactoryOrder(o)){toast2("Factory orders skip Receive/Scan — deliver them from Factory View","err");return;}
    if(o.status===S.RECV||o.status===S.DELI){toast2("Already received","err");return;}
    if(o.status===S.PEND){toast2("Order not yet accepted by factory","err");return;}
    if(o.status===S.PROD){toast2("Order not yet dispatched from factory","err");return;}
    markRecvOne(o);
    toast2("Marked as Received!");
    setFoundGroup(g=>g&&g.map(x=>x.id===o.id?{...x,status:S.RECV,receivedAt:now2(),receivedBy:user.name}:x));
  };
  const markRecvAll=()=>{
    const items=foundGroup.filter(receivable);
    items.forEach(markRecvOne);
    toast2(`Marked ${items.length} item${items.length===1?"":"s"} as Received!`);
    setFoundGroup(null);setMid("");
  };

  const primary=foundGroup&&foundGroup[0];
  return(
    <div style={{maxWidth:560,margin:"0 auto"}}>
      {!foundGroup&&(
        <div className="card">
          <div style={{fontWeight:700,fontSize:15,marginBottom:14}}>Scan QR Code to Receive</div>
          <QRScanner onResult={onScan} onError={()=>toast2("Camera error","err")}/>
          <div style={{display:"flex",alignItems:"center",gap:10,margin:"14px 0"}}>
            <div style={{flex:1,height:1,background:"#eee"}}/>
            <span style={{fontSize:11,color:"#bbb",flexShrink:0}}>OR SEARCH MANUALLY</span>
            <div style={{flex:1,height:1,background:"#eee"}}/>
          </div>
          <div style={{display:"flex",gap:8}}>
            <input className="inp" value={mid} onChange={e=>setMid(e.target.value)} placeholder="Order #, Order ID or Mobile" onKeyDown={e=>e.key==="Enter"&&search()}/>
            <button className="btn btn-red" onClick={search}><i className="ti ti-search"/></button>
          </div>
        </div>
      )}
      {foundGroup&&(
        <div className="card">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div style={{fontWeight:700,fontSize:16}}>Order Found{foundGroup.length>1?` — ${foundGroup.length} items`:""}</div>
            <button onClick={()=>{setFoundGroup(null);setMid("");}} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:"#bbb"}}><i className="ti ti-x"/></button>
          </div>
          <div style={{background:"#fafaf8",borderRadius:12,padding:14,marginBottom:14}}>
            <div style={{fontSize:22,fontWeight:900,color:"#cc0000",marginBottom:2}}>
              <OrderNumberEditor order={primary} orders={orders} updOrder={updOrder} user={user} toast2={toast2} onLocalUpdate={o=>setFoundGroup(g=>g.map(x=>x.id===primary.id?o:x))}/>
            </div>
            <div style={{fontWeight:700,fontSize:15,marginBottom:2}}>{primary.customer}</div>
            <div style={{fontSize:13,color:"#999"}}>{primary.mobile}</div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:14}}>
            {foundGroup.map(o=>(
              <div key={o.id} style={{border:"1px solid #eeebe6",borderRadius:10,padding:12}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:700}}>{displayOrderNum(o,orders)} · <b className="size-strong-sm">{o.size}</b></div>
                    <div style={{fontSize:11.5,color:"#999"}}>{o.product} · {o.wood} · Qty {o.qty}</div>
                  </div>
                  <StatusBadge s={o.status}/>
                </div>
                <div style={{marginTop:8}}>
                  {isFactoryOrder(o)
                    ?<div style={{padding:8,background:"#e1f5ee",borderRadius:8,color:"#0f6e56",fontWeight:600,fontSize:12,textAlign:"center"}}>🏭 Factory order — deliver from Factory View</div>
                    :o.status===S.TRANSIT
                    ?<button className="btn btn-green" style={{width:"100%",justifyContent:"center",fontSize:13}} onClick={()=>markRecvItem(o)}><i className="ti ti-check"/>Mark as Received</button>
                    :o.status===S.PEND
                    ?<div style={{padding:8,background:"#ffe9e9",borderRadius:8,color:"#cc0000",fontWeight:600,fontSize:12,textAlign:"center"}}>⏳ Not yet accepted by factory</div>
                    :o.status===S.PROD
                    ?<div style={{padding:8,background:"#faeeda",borderRadius:8,color:"#854f0b",fontWeight:600,fontSize:12,textAlign:"center"}}>🛠 Still in production</div>
                    :<div style={{padding:8,background:"#e1f5ee",borderRadius:8,color:"#0f6e56",fontWeight:600,fontSize:12,textAlign:"center"}}>✓ Already Received – {o.receivedAt}</div>}
                </div>
              </div>
            ))}
          </div>
          {foundGroup.filter(receivable).length>1&&(
            <button className="btn btn-green" style={{width:"100%",justifyContent:"center",fontSize:15}} onClick={markRecvAll}><i className="ti ti-checks"/>Mark All {foundGroup.filter(receivable).length} Items Received</button>
          )}
        </div>
      )}
    </div>
  );
}

// ── DELIVER ──
// A single QR represents the whole order — scanning/searching loads every size/sub-item so staff can
// pick any (or all) of them to deliver & collect payment from this one screen.
function Deliver({orders,updOrder,updOrderH,user,toast2}){
  const [foundGroup,setFoundGroup]=useState(null); // all sub-items belonging to the scanned order
  const [found,setFound]=useState(null); // the specific item currently being paid/delivered
  const [mid,setMid]=useState("");
  const [pm,setPm]=useState("Cash");
  const [pt,setPt]=useState("full");
  const [partial,setPartial]=useState("");
  const [loc,setLoc]=useState("At Office");
  const [justDelivered,setJustDelivered]=useState(null); // holds the completed order right after delivery

  const openItem=o=>{setFound(o);setLoc(o.status===S.RECV||o.status===S.DELI?"At Office":"At Production");setPt("full");setPartial("");};

  const onScan=useCallback(text=>{
    const g=findGroupByText(text,orders);
    if(g&&g.length){setFoundGroup(g);toast2("Order found: "+displayOrderNum(g[0],orders)+(g.length>1?` (${g.length} items)`:""));}
    else toast2("QR scanned but order not found: "+text,"err");
  },[orders,toast2]);

  const search=()=>{
    const g=findGroupByText(mid,orders);
    if(g&&g.length)setFoundGroup(g);else toast2("Order not found","err");
  };

  const deliverableFull=o=>!isFactoryOrder(o)&&o.status!==S.DELI&&o.status!==S.PEND;
  const markDel=()=>{
    if(isFactoryOrder(found)){toast2("Factory orders are delivered from Factory View","err");return;}
    if(found.status===S.PEND){toast2("Order not yet accepted by factory","err");return;}
    const pendFinal=pt==="full"?0:pt==="partial"?Math.max(0,found.pending-Number(partial)):found.pending;
    const updatedOrder={...found,status:S.DELI,pending:pendFinal,payMethod:pm,payAt:now2(),deliveredAt:now2(),deliveredBy:user.name,deliveredLocation:loc};
    const h=makeHistoryEntry("Delivered","Delivery");
    updOrderH(found.id,{status:S.DELI,pending:pendFinal,payMethod:pm,payAt:now2(),deliveredAt:now2(),deliveredBy:user.name,deliveredLocation:loc},h);
    toast2("Delivered & Paid!");
    setTimeout(()=>printInvoice(updatedOrder),400);
    setJustDelivered(updatedOrder);
    setFound(null);setFoundGroup(null);setMid("");setPt("full");setPartial("");setLoc("At Office");
  };
  const markDelAllFull=()=>{
    const items=foundGroup.filter(deliverableFull);
    items.forEach(o=>{
      const h=makeHistoryEntry("Delivered","Delivery");
      updOrderH(o.id,{status:S.DELI,pending:0,payMethod:pm,payAt:now2(),deliveredAt:now2(),deliveredBy:user.name,deliveredLocation:loc},h);
    });
    toast2(`Marked ${items.length} item${items.length===1?"":"s"} Delivered & Paid!`);
    setTimeout(()=>printInvoice({...items[0],status:S.DELI,pending:0,payMethod:pm,deliveredAt:now2()}),400);
    setJustDelivered({...items[0],status:S.DELI,pending:0,payMethod:pm,deliveredAt:now2()});
    setFoundGroup(null);setFound(null);setMid("");
  };

  // ── Success screen after marking delivered — offers immediate feedback request ──
  if(justDelivered) return(
    <div style={{maxWidth:480,margin:"0 auto"}}>
      <div className="card" style={{textAlign:"center"}}>
        <div style={{width:52,height:52,background:"#e1f5ee",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 12px"}}>
          <i className="ti ti-check" style={{fontSize:26,color:"#1d9e75"}}/>
        </div>
        <div style={{fontSize:17,fontWeight:700,marginBottom:2}}>Order Delivered!</div>
        {justDelivered.orderNum&&<div style={{fontSize:22,fontWeight:900,color:"#cc0000",marginBottom:2}}>Order {displayOrderNum(justDelivered,orders)}</div>}
        <div style={{fontSize:13,color:"#999",marginBottom:18}}>{justDelivered.customer} · {justDelivered.mobile}</div>

        <div style={{background:"#fafaf8",borderRadius:12,padding:14,marginBottom:18,textAlign:"left"}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}><span style={{color:"#999"}}>Order Date & Time</span><b>{orderDateTime(justDelivered).label}</b></div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}><span style={{color:"#999"}}>Total</span><b>{fmtM(orderTotalOf(justDelivered))}</b></div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}><span style={{color:"#999"}}>Payment Method</span><b>{justDelivered.payMethod}</b></div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:13}}><span style={{color:"#999"}}>Pending</span><b style={{color:justDelivered.pending>0?"#cc0000":"#1d9e75"}}>{fmtM(justDelivered.pending)}</b></div>
        </div>

        <div style={{fontSize:12,color:"#888",marginBottom:10}}>Want to ask the customer for feedback now?</div>
        <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
          <button className="btn" style={{background:"#25D366",color:"#fff",fontWeight:700,fontSize:14}}
            onClick={()=>{
              sendFeedbackRequest(justDelivered);
              const h=makeHistoryEntry("Google Review Request Sent","Delivery");
              updOrderH(justDelivered.id,{feedbackSent:true,feedbackSentAt:now2()},h);
              toast2("Feedback request sent on WhatsApp!");
              setJustDelivered(null);
            }}>
            <i className="ti ti-brand-whatsapp" style={{fontSize:18}}/>Send Feedback Request
          </button>
          <button className="btn btn-outline" onClick={()=>setJustDelivered(null)}>
            <i className="ti ti-qrcode"/>Scan Next Order
          </button>
        </div>
      </div>
    </div>
  );

  return(
    <div style={{maxWidth:560,margin:"0 auto"}}>
      {!foundGroup&&(
        <div className="card">
          <div style={{fontWeight:700,fontSize:15,marginBottom:14}}>Scan to Deliver & Collect Payment</div>
          <QRScanner onResult={onScan} onError={()=>toast2("Camera error","err")}/>
          <div style={{display:"flex",alignItems:"center",gap:10,margin:"14px 0"}}>
            <div style={{flex:1,height:1,background:"#eee"}}/>
            <span style={{fontSize:11,color:"#bbb",flexShrink:0}}>OR SEARCH MANUALLY</span>
            <div style={{flex:1,height:1,background:"#eee"}}/>
          </div>
          <div style={{display:"flex",gap:8}}>
            <input className="inp" value={mid} onChange={e=>setMid(e.target.value)} placeholder="Order #, Order ID or Mobile" onKeyDown={e=>e.key==="Enter"&&search()}/>
            <button className="btn btn-red" onClick={search}><i className="ti ti-search"/></button>
          </div>
        </div>
      )}
      {foundGroup&&!found&&(
        <div className="card">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div style={{fontWeight:700,fontSize:16}}>Order Found{foundGroup.length>1?` — ${foundGroup.length} items`:""}</div>
            <button onClick={()=>{setFoundGroup(null);setMid("");}} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:"#bbb"}}><i className="ti ti-x"/></button>
          </div>
          <div style={{background:"#fafaf8",borderRadius:12,padding:14,marginBottom:14}}>
            <div style={{fontSize:20,fontWeight:900,color:"#cc0000",marginBottom:2}}>{displayOrderNum(foundGroup[0],orders)}</div>
            <div style={{fontWeight:700,fontSize:14}}>{foundGroup[0].customer} · {foundGroup[0].mobile}</div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:14}}>
            {foundGroup.map(o=>(
              <div key={o.id} style={{border:"1px solid #eeebe6",borderRadius:10,padding:12,display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                <div>
                  <div style={{fontSize:13,fontWeight:700}}>{displayOrderNum(o,orders)} · <b className="size-strong-sm">{o.size}</b></div>
                  <div style={{fontSize:11.5,color:"#999"}}>{o.product} · {o.wood} · Qty {o.qty} · Pending {fmtM(o.pending)}</div>
                </div>
                {o.status===S.DELI
                  ?<StatusBadge s={o.status}/>
                  :isFactoryOrder(o)
                  ?<span style={{fontSize:11,color:"#0f6e56",fontWeight:600}}>🏭 Use Factory View</span>
                  :o.status===S.PEND
                  ?<span style={{fontSize:11,color:"#cc0000",fontWeight:600}}>⏳ Not accepted yet</span>
                  :<button className="btn btn-red" style={{padding:"6px 12px",fontSize:12}} onClick={()=>openItem(o)}><i className="ti ti-truck-delivery"/>Deliver</button>}
              </div>
            ))}
          </div>
          {foundGroup.filter(deliverableFull).length>1&&(
            <div style={{background:"#fafaf8",borderRadius:10,padding:12,marginBottom:8}}>
              <div style={{fontSize:11.5,fontWeight:600,color:"#777",marginBottom:7}}>Deliver all remaining items · Full payment · Same method</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8}}>
                {PAY_M.map(m=>(<button key={m} className="btn" onClick={()=>setPm(m)} style={{background:pm===m?"#1a1a1a":"#fff",color:pm===m?"#fff":"#555",border:`1.5px solid ${pm===m?"#1a1a1a":"#ddd"}`,fontSize:12}}>{m}</button>))}
              </div>
              <button className="btn btn-green" style={{width:"100%",justifyContent:"center",fontSize:14}} onClick={markDelAllFull}><i className="ti ti-checks"/>Deliver All {foundGroup.filter(deliverableFull).length} Items (Full Payment)</button>
            </div>
          )}
        </div>
      )}
      {found&&(
        <div className="card">
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
            <div style={{fontWeight:700,fontSize:16}}>Payment & Delivery</div>
            <button onClick={()=>{setFound(null);setLoc("At Office");}} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:"#bbb"}}><i className="ti ti-x"/></button>
          </div>
          <div style={{background:"#fafaf8",borderRadius:12,padding:13,marginBottom:13}}>
            <div style={{fontSize:20,fontWeight:900,color:"#cc0000",marginBottom:2}}>
              <OrderNumberEditor order={found} orders={orders} updOrder={updOrder} user={user} toast2={toast2} onLocalUpdate={setFound}/>
            </div>
            <div style={{fontSize:11,color:"#aaa",marginBottom:3}}>{found.id}</div>
            <div style={{fontWeight:700,fontSize:14}}>{found.customer} · {found.mobile}</div>
            <div style={{fontSize:11,color:"#aaa",marginTop:2}}>{orderDateTime(found).label}</div>
            <div style={{fontSize:11,color:"#854f0b",fontWeight:600,marginTop:2}}><i className="ti ti-map-pin" style={{marginRight:3}}/>{collectionLocationOf(found)}</div>
            <div style={{fontSize:12,color:"#777",marginTop:2}}>{found.product} · {found.wood} · <b className="size-strong-sm">{found.size}</b> · Qty {found.qty}</div>
          </div>
          {!isFactoryOrder(found)&&found.status===S.PEND&&<div style={{padding:12,background:"#ffe9e9",borderRadius:10,color:"#cc0000",fontWeight:600,fontSize:13,textAlign:"center",marginBottom:13}}>⏳ Order not yet accepted by factory</div>}
          <div style={{background:"#fff8f8",border:"1px solid #ffe0e0",borderRadius:12,padding:13,marginBottom:13}}>
            <div style={{fontSize:12,fontWeight:700,color:"#cc0000",marginBottom:8}}>Payment Summary</div>
            {[["Total Amount",fmtM(orderTotalOf(found))],["Advance Paid",fmtM(found.advance)],["Pending Amount",fmtM(found.pending)]].map(([k,v])=>(
              <div key={k} style={{display:"flex",justifyContent:"space-between",fontSize:13,padding:"4px 0",borderBottom:"1px solid #ffe0e0"}}>
                <span style={{color:"#aaa"}}>{k}</span><b style={{color:k==="Pending Amount"?"#cc0000":"#1a1a1a"}}>{v}</b>
              </div>
            ))}
          </div>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:11.5,fontWeight:600,color:"#777",marginBottom:7}}>Delivery Location</div>
            <div style={{display:"flex",gap:8}}>
              {DELIVERY_LOCATIONS.map(l=>(

// ── DESIGN (orders that need to be sent to the design shop) ──
function Design({orders,updOrder,updOrderH,toast2,user}){
  const canViewFinancial=["Admin","Accountant"].includes(user.role);
  const [dateSel,setDateSel]=useState(todayKey());
  const flagged=orders.filter(o=>o.needsDesign);
  const pending=flagged.filter(o=>o.designStatus!=="Done");
  const done=flagged.filter(o=>o.designStatus==="Done");

  const markDone=o=>{
    const h=makeHistoryEntry("Sent to Design","Design");
    updOrderH(o.id,{designStatus:"Done"},h);
    toast2("Marked as design done!");
  };
  const markPending=o=>{updOrder(o.id,{designStatus:"Pending"});toast2("Moved back to pending");};

  // ── Today's design collection ──
  const todayStr=todayKey();
  const todayDesign=flagged.filter(o=>{
    const p=parseLocaleDate(o.created);
    return p&&p.dateKey===todayStr&&designCostOf(o)>0;
  });
  const todayDesignTotal=todayDesign.reduce((a,o)=>a+designCostOf(o),0);

  // ── Selected date collection ──
  const selDesign=flagged.filter(o=>{
    const p=parseLocaleDate(o.created);
    return p&&p.dateKey===dateSel&&designCostOf(o)>0;
  });
  const selDesignTotal=selDesign.reduce((a,o)=>a+designCostOf(o),0);

  // ── Daily history — group all design orders by date ──
  const historyMap={};
  flagged.filter(o=>designCostOf(o)>0).forEach(o=>{
    const p=parseLocaleDate(o.created);
    if(!p) return;
    if(!historyMap[p.dateKey]) historyMap[p.dateKey]={dateKey:p.dateKey,label:new Date(p.y,p.m-1,p.d).toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"}),total:0,count:0};
    historyMap[p.dateKey].total+=designCostOf(o);
    historyMap[p.dateKey].count++;
  });
  const history=Object.values(historyMap).sort((a,b)=>b.dateKey.localeCompare(a.dateKey));

  const Row=({o,action})=>(
    <div className="card" style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",flexWrap:"wrap",border:"1px solid #eeebe6"}}>
      <div style={{width:44,height:44,background:"#fff3e0",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
        <i className="ti ti-pencil-ruler" style={{color:"#a35a00",fontSize:19}}/>
      </div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          {o.orderNum&&<span style={{fontWeight:900,color:"#cc0000",fontSize:14}}>{displayOrderNum(o,orders)}</span>}
          <span style={{fontWeight:600,fontSize:14}}>{o.customer}</span>
        </div>
        <div style={{fontSize:11,color:"#aaa"}}>{orderDateTime(o).label}</div>
        <div style={{fontSize:12,color:"#999"}}>{o.product} · {o.wood} · <b className="size-strong-sm">{o.size}</b> · Qty {o.qty}</div>
        {canViewFinancial&&<div style={{display:"inline-flex",alignItems:"center",gap:6,background:"#fff3e0",color:"#a35a00",border:"1px solid #ffd9a0",borderRadius:8,padding:"4px 9px",fontSize:11.5,fontWeight:700,marginTop:6}}>
          <span>{o.designType||"Design"}</span><span>·</span>
          <span style={{fontSize:13,color:"#cc6600"}}>{fmtM(designCostOf(o))}</span>
        </div>}
        {canViewFinancial&&<div style={{fontSize:11,color:"#999",marginTop:4}}>Total: {totalFormulaText(o)}</div>}
        {o.notes&&<div style={{fontSize:11.5,color:"#a35a00",marginTop:2}}>📝 {o.notes}</div>}
      </div>
      <StatusBadge s={o.status}/>
      {action}
    </div>
  );

  return(
    <div>
      {/* ── Today's Design Collection — prominent summary card ── */}
      {canViewFinancial&&<div className="card" style={{marginBottom:16,background:"linear-gradient(135deg,#a35a00,#cc7a00)",border:"none"}}>
        <div style={{fontSize:11,color:"rgba(255,255,255,.7)",fontWeight:700,textTransform:"uppercase",letterSpacing:.6,marginBottom:6}}>Today's Design Collection</div>
        <div style={{fontSize:36,fontWeight:900,color:"#fff",marginBottom:4}}>{fmtM(todayDesignTotal)}</div>
        <div style={{fontSize:12.5,color:"rgba(255,255,255,.8)"}}>{todayDesign.length} design order{todayDesign.length===1?"":"s"} today</div>
        {todayDesign.length>0&&(
          <div style={{marginTop:10,paddingTop:10,borderTop:"1px solid rgba(255,255,255,.2)",display:"flex",flexWrap:"wrap",gap:8}}>
            {todayDesign.map(o=>(
              <div key={o.id} style={{background:"rgba(255,255,255,.15)",borderRadius:8,padding:"4px 10px",fontSize:12}}>
                <span style={{color:"#fff",fontWeight:700}}>{o.orderNum?displayOrderNum(o,orders):o.id}</span>
                <span style={{color:"rgba(255,255,255,.8)"}}> · {o.designType||"Design"} · {fmtM(designCostOf(o))}</span>
              </div>
            ))}
          </div>
        )}
      </div>}

      {/* ── Info banner ── */}
      <div style={{background:"#fff3e0",border:"1px solid #ffd9a0",borderRadius:12,padding:"10px 14px",marginBottom:16,fontSize:12.5,color:"#a35a00"}}>
        <i className="ti ti-info-circle" style={{marginRight:6}}/>
        Orders marked <b>"Send for Design"</b> appear here. Use today's total to verify with the design department at end of day.
      </div>

      {/* ── Pending & Done lists ── */}
      <div style={{fontSize:12,fontWeight:700,color:"#cc0000",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>
        To Be Sent for Design ({pending.length})
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:9,marginBottom:24}}>
        {pending.length===0&&<div style={{textAlign:"center",padding:30,color:"#bbb",background:"#fff",borderRadius:14}}>Nothing pending — all caught up!</div>}
        {pending.map(o=>(<Row key={o.id} o={o} action={<button className="btn btn-green" style={{padding:"7px 12px",fontSize:12}} onClick={()=>markDone(o)}><i className="ti ti-check"/>Mark Sent</button>}/>))}
      </div>

      {done.length>0&&<>
        <div style={{fontSize:12,fontWeight:700,color:"#999",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Already Sent ({done.length})</div>
        <div style={{display:"flex",flexDirection:"column",gap:9,marginBottom:24}}>
          {done.map(o=>(<Row key={o.id} o={o} action={<button className="btn btn-outline" style={{padding:"7px 12px",fontSize:12}} onClick={()=>markPending(o)}><i className="ti ti-arrow-back-up"/>Undo</button>}/>))}
        </div>
      </>}

      {/* ── Daily Collection History ── */}
      {canViewFinancial&&<><div style={{fontSize:12,fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:.5,marginBottom:12}}>Daily Design Collection History</div>

      {/* Date picker to drill into a specific day */}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,flexWrap:"wrap"}}>
        <label style={{fontSize:12.5,fontWeight:600,color:"#777"}}>View date:</label>
        <input type="date" className="inp" style={{width:"auto"}} value={dateSel} onChange={e=>setDateSel(e.target.value)}/>
        {dateSel===todayStr&&<span style={{fontSize:11,color:"#1d9e75",fontWeight:600}}>● Today</span>}
      </div>
      {dateSel&&(
        <div className="card" style={{marginBottom:16,padding:"14px 16px",border:"1.5px solid #ffd9a0"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:selDesign.length?12:0,flexWrap:"wrap",gap:8}}>
            <div style={{fontSize:13,fontWeight:700,color:"#a35a00"}}>{new Date(dateSel+"T00:00:00").toLocaleDateString("en-IN",{day:"numeric",month:"long",year:"numeric"})}</div>
            <div style={{fontSize:20,fontWeight:900,color:"#cc6600"}}>{fmtM(selDesignTotal)}</div>
          </div>
          {selDesign.length>0?(
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {selDesign.map(o=>(
                <div key={o.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:12.5,padding:"6px 0",borderBottom:"1px solid #faf0e0",flexWrap:"wrap",gap:4}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    {o.orderNum&&<span style={{fontWeight:700,color:"#cc0000"}}>{displayOrderNum(o,orders)}</span>}
                    <span style={{color:"#555"}}>{o.customer}</span>
                    <span style={{color:"#bbb"}}>·</span>
                    <span style={{color:"#777"}}>{o.designType||"Design"}</span>
                  </div>
                  <span style={{fontWeight:700,color:"#cc6600"}}>{fmtM(designCostOf(o))}</span>
                </div>
              ))}
              <div style={{display:"flex",justifyContent:"space-between",fontWeight:700,fontSize:13,marginTop:4,paddingTop:6,borderTop:"2px solid #ffd9a0"}}>
                <span style={{color:"#a35a00"}}>{selDesign.length} order{selDesign.length===1?"":"s"}</span>
                <span style={{color:"#cc6600"}}>{fmtM(selDesignTotal)}</span>
              </div>
            </div>
          ):<div style={{fontSize:12,color:"#bbb",textAlign:"center",padding:"8px 0"}}>No design orders on this date</div>}
        </div>
      )}

      {/* Scrollable history table */}
      {history.length>0&&(
        <div className="card" style={{padding:0,overflow:"hidden"}}>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead><tr style={{background:"#fafaf8"}}>
                {["Date","Orders","Design Revenue"].map(h=><th key={h} style={{padding:"10px 14px",textAlign:"left",fontWeight:600,color:"#bbb",fontSize:11,borderBottom:"1px solid #eeebe6"}}>{h}</th>)}
              </tr></thead>
              <tbody>
                {history.map((h,i)=>(
                  <tr key={h.dateKey} style={{borderBottom:"1px solid #fafaf8",background:h.dateKey===todayStr?"#fffbf0":i%2===0?"#fff":"#fdfcfb",cursor:"pointer"}}
                    onClick={()=>setDateSel(h.dateKey)}>
                    <td style={{padding:"10px 14px",fontWeight:600,color:h.dateKey===todayStr?"#a35a00":"#333"}}>
                      {h.label}{h.dateKey===todayStr&&<span style={{marginLeft:6,fontSize:10,background:"#ff8c00",color:"#fff",borderRadius:6,padding:"1px 6px"}}>Today</span>}
                    </td>
                    <td style={{padding:"10px 14px",color:"#777"}}>{h.count}</td>
                    <td style={{padding:"10px 14px",fontWeight:700,color:"#cc6600"}}>{fmtM(h.total)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}
      {history.length===0&&<div style={{textAlign:"center",padding:30,color:"#bbb",background:"#fff",borderRadius:14}}>No design collection history yet</div>}
      </>}
    </div>
  );
}

// ── WHOLESALE MODULE ──
// A self-contained module (mirrors the Design module's structure) for managing wholesale
// firms and their orders. Wholesale orders are created through NewOrder like any other order —
// they just carry orderType:"Wholesale" + wholesaleCustomerId, so they flow through the same
// production/delivery pipeline and automatically count in overall revenue & reports, while still
// being fully filterable/separable as their own order type.
function WholesaleBadge({size}){
  return <span style={{display:"inline-flex",alignItems:"center",gap:3,background:"#eef2ff",color:"#4338ca",border:"1px solid #c7d2fe",borderRadius:7,padding:size==="sm"?"1px 7px":"2px 9px",fontSize:size==="sm"?10:11,fontWeight:700}}><i className="ti ti-building-store" style={{fontSize:size==="sm"?10:12}}/>Wholesale</span>;
}

function wholesaleStatsFor(customerId,orders){
  const custOrders=orders.filter(o=>o.wholesaleCustomerId===customerId);
  const billable=custOrders.filter(o=>!/cancel/i.test(o.status||""));
  const totalBusiness=billable.reduce((a,o)=>a+orderTotalOf(o),0);
  const outstanding=billable.reduce((a,o)=>a+Number(o.pending||0),0);
  const lastOrder=custOrders.reduce((latest,o)=>{const ms=parseLocaleDateMs(o.created)||0;return ms>latest?ms:latest;},0);
  return {custOrders,billable,totalBusiness,outstanding,orderCount:custOrders.length,lastOrder};
}

function WholesaleCustomerModal({initial,onSave,onCancel}){
  const [firmName,setFirmName]=useState(initial?.firmName||"");
  const [contactPerson,setContactPerson]=useState(initial?.contactPerson||"");
  const [mobile,setMobile]=useState(initial?.mobile||"");
  const [address,setAddress]=useState(initial?.address||"");
  const [gstNumber,setGstNumber]=useState(initial?.gstNumber||"");
  const [notes,setNotes]=useState(initial?.notes||"");
  const submit=e=>{
    e.preventDefault();
    if(!firmName.trim()){return;}
    onSave({firmName:firmName.trim(),contactPerson:contactPerson.trim(),mobile:mobile.trim(),address:address.trim(),gstNumber:gstNumber.trim(),notes:notes.trim()});
  };
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={onCancel}>
      <div className="card" style={{maxWidth:460,width:"100%",maxHeight:"90vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
        <div style={{fontWeight:700,fontSize:15,marginBottom:14}}>{initial?"Edit Wholesale Customer":"Add Wholesale Customer"}</div>
        <form onSubmit={submit} style={{display:"flex",flexDirection:"column",gap:12}}>
          <div><label style={{fontSize:11,fontWeight:600,color:"#888",display:"block",marginBottom:4}}>Firm / Customer Name *</label><input className="inp" value={firmName} onChange={e=>setFirmName(e.target.value)} placeholder="e.g. Shree Balaji Timber Traders" required autoFocus/></div>
          <div><label style={{fontSize:11,fontWeight:600,color:"#888",display:"block",marginBottom:4}}>Contact Person</label><input className="inp" value={contactPerson} onChange={e=>setContactPerson(e.target.value)} placeholder="e.g. Ramesh Gupta"/></div>
          <div><label style={{fontSize:11,fontWeight:600,color:"#888",display:"block",marginBottom:4}}>Mobile</label><input className="inp" value={mobile} onChange={e=>setMobile(e.target.value)} placeholder="10-digit mobile number"/></div>
          <div><label style={{fontSize:11,fontWeight:600,color:"#888",display:"block",marginBottom:4}}>Address</label><textarea className="inp" rows={2} value={address} onChange={e=>setAddress(e.target.value)} placeholder="Firm address"/></div>
          <div><label style={{fontSize:11,fontWeight:600,color:"#888",display:"block",marginBottom:4}}>GST Number (optional)</label><input className="inp" value={gstNumber} onChange={e=>setGstNumber(e.target.value)}/></div>
          <div><label style={{fontSize:11,fontWeight:600,color:"#888",display:"block",marginBottom:4}}>Notes</label><textarea className="inp" rows={2} value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Pricing terms, credit period, etc."/></div>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:4}}>
            <button type="button" className="btn btn-outline" onClick={onCancel}>Cancel</button>
            <button type="submit" className="btn btn-red">{initial?"Save Changes":"Add Customer"}</button>
          </div>
        </form>
      </div>
    </div>
  );
}

function WholesaleCustomerProfile({customer,orders,allOrders,updOrder,updOrderH,user,toast2,addOrder,onBack,onEdit,onArchive}){
  const canManage=["Admin","Office Staff"].includes(user.role);
  const [tab,setTab]=useState("orders");
  const [creating,setCreating]=useState(false);
  const [orderQ,setOrderQ]=useState("");
  const {custOrders,billable,totalBusiness,outstanding,orderCount,lastOrder}=wholesaleStatsFor(customer.id,orders);

  const filteredOrders=useMemo(()=>{
    const q=orderQ.trim().toLowerCase();
    const sorted=[...custOrders].sort((a,b)=>(parseLocaleDateMs(b.created)||0)-(parseLocaleDateMs(a.created)||0));
    if(!q) return sorted;
    return sorted.filter(o=>displayOrderNum(o,allOrders).toLowerCase().includes(q)||(o.product||"").toLowerCase().includes(q)||(o.status||"").toLowerCase().includes(q));
  },[custOrders,orderQ,allOrders]);

  const transactions=useMemo(()=>{
    const all=[];
    custOrders.forEach(o=>all.push(...transactionsForOrder(o)));
    return all.sort((a,b)=>b.ts-a.ts);
  },[custOrders]);

  if(creating) return(
    <div>
      <button className="btn btn-outline" style={{marginBottom:16}} onClick={()=>setCreating(false)}><i className="ti ti-arrow-left"/>Back to {customer.firmName}</button>

        orderType="Wholesale" presetCustomer={{name:customer.firmName,mobile:customer.mobile}} wholesaleCustomerId={customer.id}
        goto={()=>{}} onDone={()=>{}}/>
    </div>
  );

  return(
    <div>
      <button className="btn btn-outline" style={{marginBottom:16}} onClick={onBack}><i className="ti ti-arrow-left"/>All Wholesale Customers</button>

      <div className="card" style={{marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12,marginBottom:16}}>
          <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
            <div style={{width:48,height:48,borderRadius:12,background:"#eef2ff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><i className="ti ti-building-store" style={{color:"#4338ca",fontSize:22}}/></div>
            <div>
              <div style={{fontWeight:900,fontSize:19,color:"#1a1a1a"}}>{customer.firmName}</div>
              {customer.contactPerson&&<div style={{fontSize:12.5,color:"#888",marginTop:2}}>{customer.contactPerson}{customer.mobile?` · ${customer.mobile}`:""}</div>}
              {customer.address&&<div style={{fontSize:11.5,color:"#bbb",marginTop:2}}>{customer.address}</div>}
              {customer.gstNumber&&<div style={{fontSize:11.5,color:"#bbb",marginTop:2}}>GST: {customer.gstNumber}</div>}
            </div>
          </div>
          {canManage&&<div style={{display:"flex",gap:8}}>
            <button className="btn btn-outline" style={{padding:"7px 12px",fontSize:12}} onClick={onEdit}><i className="ti ti-edit"/>Edit</button>
            <button className="btn btn-red" style={{padding:"7px 12px",fontSize:12}} onClick={()=>setCreating(true)}><i className="ti ti-plus"/>New Wholesale Order</button>
            {user.role==="Admin"&&<button className="btn btn-danger" style={{padding:"7px 12px",fontSize:12}} onClick={onArchive}><i className="ti ti-archive"/></button>}
          </div>}
        </div>
        {customer.notes&&<div style={{background:"#fafaf8",borderRadius:10,padding:"8px 12px",fontSize:12,color:"#777",marginBottom:14}}><i className="ti ti-note" style={{marginRight:6}}/>{customer.notes}</div>}

// Parse "DD/M/YYYY, h:mm:ss am/pm" (en-IN locale string) into date parts
function parseLocaleDate(str){
  if(!str) return null;
  const datePart=str.split(",")[0].trim();
  const bits=datePart.split("/").map(Number);
  if(bits.length!==3||bits.some(isNaN)) return null;
  const [d,m,y]=bits;
  return {d,m,y,dateKey:`${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`,monthKey:`${y}-${String(m).padStart(2,"0")}`,monthLabel:new Date(y,m-1,1).toLocaleDateString("en-IN",{month:"long",year:"numeric"})};
}
// Returns milliseconds timestamp for an en-IN locale datetime string "DD/M/YYYY, h:mm:ss am/pm"
// Parses BOTH date and time so orders created on the same day still sort correctly (newest first).
function parseLocaleDateMs(str){
  if(!str) return null;
  const parts=str.split(",");
  const datePart=(parts[0]||"").trim();
  const bits=datePart.split("/").map(Number);
  if(bits.length!==3||bits.some(isNaN)) return null;
  const [d,m,y]=bits;
  let hh=0,mm=0,ss=0;
  const timePart=parts.slice(1).join(",").trim();
  if(timePart){
    const timeMatch=timePart.match(/(\d{1,2}):(\d{2}):?(\d{2})?\s*(am|pm)?/i);
    if(timeMatch){
      hh=Number(timeMatch[1])||0;
      mm=Number(timeMatch[2])||0;
      ss=Number(timeMatch[3])||0;
      const ampm=(timeMatch[4]||"").toLowerCase();
      if(ampm==="pm"&&hh<12) hh+=12;
      if(ampm==="am"&&hh===12) hh=0;
    }
  }
  return new Date(y,m-1,d,hh,mm,ss).getTime();
}
const todayKey=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;};
