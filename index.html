// QR encodes ONLY the order ID — short = simple = easy to scan
function buildQRText(o){return o.id;}

function drawQROnCanvas(canvas,text,size){
  try{
    const qr=qrcode(0,"M");qr.addData(text);qr.make();
    const count=qr.getModuleCount(),cell=Math.floor(size/count),actual=cell*count;
    canvas.width=actual;canvas.height=actual;
    const ctx=canvas.getContext("2d");
    ctx.fillStyle="#fff";ctx.fillRect(0,0,actual,actual);
    ctx.fillStyle="#000";
    for(let r=0;r<count;r++)for(let c=0;c<count;c++)if(qr.isDark(r,c))ctx.fillRect(c*cell,r*cell,cell,cell);
    return canvas;
  }catch(e){console.error("QR error",e);return null;}
}

function QRSvg({order,size=180}){
  const ref=useRef(null);
  useEffect(()=>{if(!ref.current||!order)return;drawQROnCanvas(ref.current,buildQRText(order),size);},[order&&order.id,size]);
  if(!order)return null;
  return <canvas ref={ref} style={{display:"block",imageRendering:"pixelated",width:size,height:size}}/>;
}

function downloadQR(o){
  const size=220,padX=24,padTop=o.orderNum?72:56,padBot=48;
  const W=size+padX*2,H=size+padTop+padBot;
  const out=document.createElement("canvas");out.width=W;out.height=H;
  const ctx=out.getContext("2d");
  ctx.fillStyle="#fff";ctx.fillRect(0,0,W,H);
  ctx.strokeStyle="#cc0000";ctx.lineWidth=3;ctx.beginPath();ctx.roundRect(2,2,W-4,H-4,12);ctx.stroke();
  ctx.fillStyle="#cc0000";ctx.font="bold 22px Arial";ctx.textAlign="center";ctx.fillText("HSM",W/2,26);
  ctx.fillStyle="#999";ctx.font="8px Arial";ctx.fillText("HANUMAN SAW MILL",W/2,38);
  if(o.orderNum){ctx.fillStyle="#cc0000";ctx.font="bold 17px Arial";ctx.fillText("Order "+fmtON(o.orderNum),W/2,58);}
  const tmp=document.createElement("canvas");
  if(!drawQROnCanvas(tmp,buildQRText(o),size)){alert("QR failed");return;}
  ctx.drawImage(tmp,padX,padTop,size,size);
  ctx.fillStyle="#1a1a1a";ctx.font="bold 11px Arial";ctx.fillText(o.id,W/2,padTop+size+14);
  ctx.fillStyle="#555";ctx.font="10px Arial";ctx.fillText(o.customer+" · "+o.mobile,W/2,padTop+size+28);
  const a=document.createElement("a");a.download="QR-"+o.id+".png";a.href=out.toDataURL("image/png");a.click();
}

// ── SHARED QR SCANNER COMPONENT (getUserMedia + jsQR — works across mobile/laptop/tablet) ──
function QRScanner({onResult,onError}){
  const vidRef=useRef(null);
  const canvasRef=useRef(null);
  const streamRef=useRef(null);
  const rafRef=useRef(null);
  const lastRef=useRef("");
  const [active,setActive]=useState(false);
  const [err,setErr]=useState("");
  const [devices,setDevices]=useState([]);
  const [deviceId,setDeviceId]=useState("");

  // Enumerate cameras once (helps on tablets/laptops with multiple cameras)
  useEffect(()=>{
    if(!navigator.mediaDevices?.enumerateDevices) return;
    navigator.mediaDevices.enumerateDevices().then(list=>{
      const cams=list.filter(d=>d.kind==="videoinput");
      setDevices(cams);
    }).catch(()=>{});
  },[]);

  const stop=useCallback(()=>{
    if(rafRef.current){cancelAnimationFrame(rafRef.current);rafRef.current=null;}
    if(streamRef.current){streamRef.current.getTracks().forEach(t=>t.stop());streamRef.current=null;}
    if(vidRef.current){vidRef.current.srcObject=null;}
    setActive(false);
  },[]);

  const tick=useCallback(()=>{
    const video=vidRef.current,canvas=canvasRef.current;
    if(!video||!canvas){rafRef.current=requestAnimationFrame(tick);return;}
    if(video.readyState===video.HAVE_ENOUGH_DATA && video.videoWidth>0){
      canvas.width=video.videoWidth;
      canvas.height=video.videoHeight;
      const ctx=canvas.getContext("2d",{willReadFrequently:true});
      ctx.drawImage(video,0,0,canvas.width,canvas.height);
      try{
        const img=ctx.getImageData(0,0,canvas.width,canvas.height);
        if(window.jsQR){
          const code=window.jsQR(img.data,img.width,img.height,{inversionAttempts:"attemptBoth"});
          if(code&&code.data){
            if(code.data!==lastRef.current){
              lastRef.current=code.data;
              stop();
              onResult(code.data);
              return;
            }
          }
        }
      }catch(e){/* ignore frame errors */}
    }
    rafRef.current=requestAnimationFrame(tick);
  },[onResult,stop]);

  const start=useCallback(async(forceDeviceId)=>{
    setErr("");
    if(!window.jsQR){setErr("Scanner library still loading — please wait a moment and tap Start again.");return;}
    if(!navigator.mediaDevices?.getUserMedia){setErr("Camera not supported on this browser.");return;}
    try{
      // Stop any existing stream first
      if(streamRef.current){streamRef.current.getTracks().forEach(t=>t.stop());streamRef.current=null;}
      const idToUse=forceDeviceId||deviceId;
      const constraints=idToUse
        ?{video:{deviceId:{exact:idToUse}}}
        :{video:{facingMode:{ideal:"environment"}}};
      let stream;
      try{
        stream=await navigator.mediaDevices.getUserMedia(constraints);
      }catch(e1){
        // Fallback to any camera if the preferred one fails
        stream=await navigator.mediaDevices.getUserMedia({video:true});
      }
      streamRef.current=stream;
      lastRef.current="";
      const video=vidRef.current;
      video.srcObject=stream;
      video.setAttribute("playsinline","true");
      video.setAttribute("muted","true");
      video.muted=true;
      await video.play().catch(()=>{});
      // refresh device list with labels now that permission is granted
      if(navigator.mediaDevices?.enumerateDevices){
        navigator.mediaDevices.enumerateDevices().then(list=>{
          setDevices(list.filter(d=>d.kind==="videoinput"));
        }).catch(()=>{});
      }
      setActive(true);
      rafRef.current=requestAnimationFrame(tick);
    }catch(e){
      console.error("Camera error",e);
      let msg="Camera access denied. Please allow camera permission in your browser settings and try again.";
      if(e.name==="NotFoundError") msg="No camera found on this device.";
      if(e.name==="NotAllowedError") msg="Camera permission denied. Please allow camera access for this site.";
      if(e.name==="NotReadableError") msg="Camera is being used by another app. Close it and try again.";
      setErr(msg);
      if(onError) onError(e);
      setActive(false);
    }
  },[deviceId,tick,onResult,onError]);

  useEffect(()=>()=>stop(),[stop]);

  const switchCamera=e=>{
    const id=e.target.value;
    setDeviceId(id);
    if(active) start(id);
  };

  return(
    <div>
      <div style={{background:"#1a1a1a",borderRadius:13,overflow:"hidden",marginBottom:12,position:"relative",minHeight:240}}>
        <video ref={vidRef} playsInline muted autoPlay style={{width:"100%",display:"block",maxHeight:280,objectFit:"cover"}}/>
        <canvas ref={canvasRef} style={{display:"none"}}/>
        {!active&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:8}}>
          <i className="ti ti-qrcode" style={{fontSize:48,color:"#444"}}/>
          <div style={{color:"#666",fontSize:13}}>Camera not active</div>
        </div>}
        {active&&<div style={{position:"absolute",inset:0,pointerEvents:"none"}}>
          <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:190,height:190,border:"3px solid #cc0000",borderRadius:14,boxShadow:"0 0 0 9999px rgba(0,0,0,.35)"}}/>
          <div style={{position:"absolute",bottom:12,width:"100%",textAlign:"center",color:"#fff",fontSize:12,fontWeight:600,textShadow:"0 1px 3px rgba(0,0,0,.8)"}}>Point camera at QR code</div>
        </div>}
      </div>
      {err&&<div style={{background:"#fff8f8",border:"1px solid #ffe0e0",borderRadius:10,padding:"10px 14px",fontSize:12,color:"#cc0000",marginBottom:12}}>{err}</div>}
      {devices.length>1&&<select className="inp" style={{marginBottom:10}} value={deviceId} onChange={switchCamera}>
        <option value="">Auto (Back Camera)</option>
        {devices.map((d,i)=><option key={d.deviceId} value={d.deviceId}>{d.label||`Camera ${i+1}`}</option>)}
      </select>}
      {!active
        ?<button className="btn btn-red" style={{width:"100%",justifyContent:"center"}} onClick={()=>start()}><i className="ti ti-camera"/>Start Camera Scan</button>
        :<button className="btn btn-outline" style={{width:"100%",justifyContent:"center"}} onClick={stop}><i className="ti ti-player-stop"/>Stop Camera</button>}
    </div>
  );
}

// ── NEW ORDER ──
const LBL={fontSize:11.5,fontWeight:600,color:"#777",display:"block",marginBottom:4};
const emptyItem=()=>({product:PRODUCTS[0],wood:"Khair",dimL:"",dimW:"",dimT:"",qty:"",total:"",advance:"",advPayMethod:"Cash",notes:"",needsDesign:false});
const DRAFT_KEY="hsm_order_draft_v1";

function NewOrder({user,onAdd,toast2,orders,goto}){
  const usedNums=orders.map(o=>o.orderNum).filter(Boolean);
  const suggestNum=usedNums.length>0?Math.max(...usedNums)+1:1;

  const [customer,setCustomer]=useState("");
  const [mobile,setMobile]=useState("");
  const [delivery,setDelivery]=useState("");
  const [orderNumInput,setOrderNumInput]=useState(String(suggestNum));
  const [items,setItems]=useState([emptyItem()]);
  const [done,setDone]=useState(null);
  const [draftLoaded,setDraftLoaded]=useState(false);
  const fieldRefs=useRef({});

  // ── Load draft on mount ──
  useEffect(()=>{
    try{
      const raw=localStorage.getItem(DRAFT_KEY);
      if(raw){
        const d=JSON.parse(raw);
        if(d.customer||d.mobile||(d.items&&d.items.some(it=>it.dimL||it.qty||it.total))){
          setCustomer(d.customer||"");setMobile(d.mobile||"");setDelivery(d.delivery||"");
          if(d.orderNumInput) setOrderNumInput(d.orderNumInput);
          if(d.items&&d.items.length) setItems(d.items.map(it=>({...emptyItem(),...it})));
          toast2("Restored your unsaved order draft");
        }
      }
    }catch(e){/* ignore */}
    setDraftLoaded(true);
  },[]);

  // ── Auto-save draft on every change ──
  useEffect(()=>{
    if(!draftLoaded) return;
    try{
      localStorage.setItem(DRAFT_KEY,JSON.stringify({customer,mobile,delivery,orderNumInput,items}));
    }catch(e){/* ignore */}
  },[customer,mobile,delivery,orderNumInput,items,draftLoaded]);

  const clearDraft=()=>{try{localStorage.removeItem(DRAFT_KEY);}catch(e){}};

  const [custSuggestions,setCustSuggestions]=useState([]);
  const [showSugg,setShowSugg]=useState(false);

  // Build unique customers list from orders
  const knownCustomers=useMemo(()=>{
    const seen={};
    orders.forEach(o=>{if(o.customer&&o.mobile)seen[o.mobile]={name:o.customer,mobile:o.mobile,count:orders.filter(x=>x.mobile===o.mobile).length};});
    return Object.values(seen);
  },[orders]);

  const onCustomerChange=v=>{
    setCustomer(v);
    if(v.trim().length>=1){
      const q=v.toLowerCase();
      const matches=knownCustomers.filter(c=>c.name.toLowerCase().includes(q)).slice(0,5);
      setCustSuggestions(matches);
      setShowSugg(matches.length>0);
    } else {
      setShowSugg(false);
    }
  };

  const pickCustomer=c=>{
    setCustomer(c.name);
    setMobile(c.mobile);
    setShowSugg(false);
    // Show their previous orders count
    toast2(`${c.name} — ${c.count} previous order${c.count===1?"":"s"} on record`);
  };

  // Previous orders for this customer (by name match)
  const prevOrders=customer.trim().length>=2
    ?orders.filter(o=>o.customer.toLowerCase().includes(customer.toLowerCase().trim())).slice(0,3)
    :[];

  const updItem=(i,k,v)=>setItems(p=>{
    const n=[...p];n[i]={...n[i],[k]:v};
    if(k==="advance"||k==="total")n[i].pending=Math.max(0,Number(n[i].total||0)-Number(n[i].advance||0));
    return n;
  });
  const addItem=()=>setItems(p=>[...p,emptyItem()]);
  const removeItem=i=>setItems(p=>p.filter((_,idx)=>idx!==i));

  // ── Enter-key navigation ──
  const fieldOrder=["customer","mobile","orderNum","delivery"];
  items.forEach((_,i)=>{
    ["product","wood","dimL","dimW","dimT","qty","total","advance","advPayMethod","notes"].forEach(f=>fieldOrder.push(`${f}-${i}`));
  });
  fieldOrder.push("submit");
  const setRef=key=>el=>{fieldRefs.current[key]=el;};
  const onEnter=key=>e=>{
    if(e.key!=="Enter") return;
    if(e.target.tagName==="TEXTAREA"&&e.shiftKey) return; // allow Shift+Enter newline in notes
    e.preventDefault();
    const idx=fieldOrder.indexOf(key);
    for(let j=idx+1;j<fieldOrder.length;j++){
      const el=fieldRefs.current[fieldOrder[j]];
      if(el){el.focus();if(el.select)try{el.select();}catch(_){};break;}
    }
  };

  const sub=e=>{
    e.preventDefault();
    if(!customer||!mobile){toast2("Enter customer name and mobile","err");return;}
    const num=parseInt(orderNumInput)||suggestNum;
    if(orders.some(o=>o.orderNum===num)){toast2("Order number "+fmtON(num)+" already exists!","err");return;}
    const created=[];
    for(let i=0;i<items.length;i++){
      const it=items[i];
      if(!it.dimL||!it.dimW||!it.dimT||!it.qty){toast2(`Fill all dimensions & qty for item ${i+1}`,"err");return;}
      const size=it.dimL+'"x'+it.dimW+'"x'+it.dimT+'"';
      created.push({
        id:genId(),orderNum:i===0?num:null,
        customer,mobile,delivery,
        product:it.product,wood:it.wood,size,qty:Number(it.qty),
        total:Number(it.total)||0,advance:Number(it.advance)||0,
        pending:Math.max(0,(Number(it.total)||0)-(Number(it.advance)||0)),
        advPayMethod:it.advPayMethod||"Cash",
        notes:it.notes,
        needsDesign:!!it.needsDesign,designStatus:it.needsDesign?"Pending":"",
        status:S.PEND,created:now2(),createdBy:user.name,
        payMethod:"",payAt:"",receivedAt:"",receivedBy:"",deliveredAt:"",deliveredBy:"",deliveredLocation:"",
        acceptedAt:"",acceptedBy:"",dispatchedAt:"",dispatchedBy:"",
        feedbackSent:false,feedbackSentAt:"",customerRating:null,customerReviewText:"",
      });
    }
    const groupId=created[0].id;
    created.forEach((o,i)=>{if(i>0)o.groupId=groupId;});
    created[0].groupId=groupId;
    Promise.all(created.map(o=>onAdd(o))).then(()=>{clearDraft();setDone(created);});
  };

  if(done) return(
    <div style={{maxWidth:520,margin:"0 auto"}}>
      <div className="card" style={{textAlign:"center"}}>
        <div style={{width:52,height:52,background:"#e1f5ee",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 10px"}}><i className="ti ti-check" style={{fontSize:26,color:"#1d9e75"}}/></div>
        <div style={{fontSize:17,fontWeight:700,marginBottom:2}}>{done.length>1?`${done.length} Orders Created!`:"Order Created!"}</div>
        <div style={{fontSize:26,fontWeight:900,color:"#cc0000",marginBottom:2}}>{done[0].orderNum?`Order ${fmtON(done[0].orderNum)}`:done[0].id}</div>
        <div style={{fontSize:11,color:"#aaa",marginBottom:16}}>{done[0].customer} · {done[0].mobile}</div>

        {/* WhatsApp + Design buttons */}
        <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap",marginBottom:16}}>
          <button className="btn" style={{background:"#25D366",color:"#fff",fontSize:14,fontWeight:700}} onClick={()=>sendWhatsApp(done)}>
            <i className="ti ti-brand-whatsapp" style={{fontSize:18}}/>Send on WhatsApp
          </button>
          {done.some(o=>o.needsDesign)&&<button className="btn btn-outline" style={{fontSize:13}} onClick={()=>goto("design")}>
            <i className="ti ti-pencil-ruler"/>View in Design Queue
          </button>}
        </div>

        <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:16}}>
          {done.map((o,i)=>(
            <div key={o.id} style={{background:"#fafaf8",borderRadius:12,padding:12}}>
              <div style={{fontSize:12,fontWeight:700,color:"#cc0000",marginBottom:4}}>{i===0&&o.orderNum?`Order ${fmtON(o.orderNum)} · `:""}{o.id}</div>
              <div style={{fontSize:12,color:"#777",marginBottom:8}}>{o.product} · {o.wood} · {o.size} · Qty {o.qty}</div>
              {o.needsDesign&&<div style={{display:"inline-block",background:"#fff3e0",color:"#a35a00",border:"1px solid #ffd9a0",borderRadius:8,padding:"3px 10px",fontSize:11,fontWeight:700,marginBottom:8}}><i className="ti ti-pencil-ruler" style={{marginRight:4}}/>Sent for Design</div>}
              <div style={{background:"#fff",borderRadius:10,padding:8,display:"inline-block"}}><QRSvg order={o} size={140}/></div>
              <div style={{display:"flex",gap:8,justifyContent:"center",marginTop:8,flexWrap:"wrap"}}>
                <button className="btn btn-red" style={{padding:"7px 12px",fontSize:12}} onClick={()=>printQR(o)}><i className="ti ti-printer"/>Print</button>
                <button className="btn btn-green" style={{padding:"7px 12px",fontSize:12}} onClick={()=>downloadQR(o)}><i className="ti ti-download"/>Download</button>
              </div>
            </div>
          ))}
        </div>
        <button className="btn btn-outline" onClick={()=>{setDone(null);setCustomer("");setMobile("");setDelivery("");setOrderNumInput(String(suggestNum+1));setItems([emptyItem()]);clearDraft();}}><i className="ti ti-plus"/>New Order</button>
      </div>
    </div>
  );

  return(
    <div style={{maxWidth:680,margin:"0 auto"}}>
      <div className="card">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18,flexWrap:"wrap",gap:8}}>
          <div style={{fontWeight:700,fontSize:15}}>Create New Order</div>
          <div style={{fontSize:10.5,color:"#bbb",display:"flex",alignItems:"center",gap:4}}><i className="ti ti-device-floppy"/>Draft auto-saved</div>
        </div>
        <form onSubmit={sub}>
          {/* ── Customer info ── */}
          <div style={{background:"#fafaf8",borderRadius:12,padding:14,marginBottom:16}}>
            <div style={{fontSize:12,fontWeight:700,color:"#888",marginBottom:10,textTransform:"uppercase",letterSpacing:.5}}>Customer Details</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:13}}>
              <div style={{position:"relative"}}>
                <label style={LBL}>Customer Name *</label>
                <input
                  ref={setRef("customer")}
                  onKeyDown={onEnter("customer")}
                  className="inp"
                  value={customer}
                  onChange={e=>onCustomerChange(e.target.value)}
                  onBlur={()=>setTimeout(()=>setShowSugg(false),150)}
                  onFocus={()=>{if(custSuggestions.length>0)setShowSugg(true);}}
                  placeholder="Full name"
                  autoComplete="off"
                />
                {/* Suggestions dropdown */}
                {showSugg&&(
                  <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:50,background:"#fff",border:"1.5px solid #e0ddd8",borderRadius:10,boxShadow:"0 4px 16px rgba(0,0,0,.1)",overflow:"hidden",marginTop:4}}>
                    {custSuggestions.map(c=>(
                      <div key={c.mobile} onMouseDown={()=>pickCustomer(c)} style={{padding:"10px 14px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid #f5f5f3"}}
                        onMouseEnter={e=>e.currentTarget.style.background="#fafaf8"}
                        onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
                        <div>
                          <div style={{fontWeight:600,fontSize:13}}>{c.name}</div>
                          <div style={{fontSize:11,color:"#bbb"}}>{c.mobile}</div>
                        </div>
                        <div style={{fontSize:11,color:"#cc0000",fontWeight:600}}>{c.count} order{c.count===1?"":"s"}</div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
              <div><label style={LBL}>Mobile Number *</label>
                <div style={{display:"flex",gap:8}}>
                  <input ref={setRef("mobile")} onKeyDown={onEnter("mobile")} className="inp" value={mobile} onChange={e=>setMobile(e.target.value)} placeholder="10-digit mobile" style={{flex:1}}/>
                  {mobile.length>=10&&<a href={"tel:"+mobile} className="btn btn-green" style={{padding:"10px 14px",textDecoration:"none",whiteSpace:"nowrap"}}><i className="ti ti-phone"/>Call</a>}
                </div>
              </div>
              <div>
                <label style={LBL}>Order Number *</label>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <span style={{fontWeight:700,color:"#cc0000",fontSize:16,flexShrink:0}}>#</span>
                  <input ref={setRef("orderNum")} onKeyDown={onEnter("orderNum")} className="inp" type="number" value={orderNumInput} onChange={e=>setOrderNumInput(e.target.value)} placeholder={String(suggestNum)} style={{flex:1}}/>
                </div>
                <div style={{fontSize:10.5,color:"#bbb",marginTop:3}}>Suggested: {fmtON(suggestNum)} · Change if needed</div>
              </div>
              <div><label style={LBL}>Delivery Date</label><input ref={setRef("delivery")} onKeyDown={onEnter("delivery")} type="date" className="inp" value={delivery} onChange={e=>setDelivery(e.target.value)}/></div>
            </div>
          </div>

          {/* ── Previous orders for this customer ── */}
          {prevOrders.length>0&&(
            <div style={{background:"#fff8f8",border:"1px solid #ffdddd",borderRadius:10,padding:"10px 14px",marginBottom:16}}>
              <div style={{fontSize:11,fontWeight:700,color:"#cc0000",marginBottom:8,textTransform:"uppercase",letterSpacing:.4}}>
                <i className="ti ti-history" style={{marginRight:5}}/>Previous Orders ({orders.filter(o=>o.customer.toLowerCase().includes(customer.toLowerCase().trim())).length} total)
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {prevOrders.map(o=>(
                  <div key={o.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:12,flexWrap:"wrap",gap:4}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      {o.orderNum&&<span style={{fontWeight:700,color:"#cc0000",minWidth:32}}>{fmtON(o.orderNum)}</span>}
                      <span style={{color:"#555"}}>{o.product} · {o.wood} · {o.size}</span>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <span style={{color:"#bbb"}}>{o.created?o.created.split(",")[0]:"—"}</span>
                      <StatusBadge s={o.status}/>
                    </div>
                  </div>
                ))}
                {orders.filter(o=>o.customer.toLowerCase().includes(customer.toLowerCase().trim())).length>3&&(
                  <div style={{fontSize:11,color:"#bbb",marginTop:2}}>+ {orders.filter(o=>o.customer.toLowerCase().includes(customer.toLowerCase().trim())).length-3} more orders</div>
                )}
              </div>
            </div>
          )}
          <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:14}}>
            {items.map((it,i)=>(
              <div key={i} style={{border:"1.5px solid #eeebe6",borderRadius:13,padding:14,position:"relative"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <div style={{fontSize:12,fontWeight:700,color:"#cc0000",textTransform:"uppercase",letterSpacing:.5}}>
                    {items.length>1?`Item ${i+1}`:"Order Item"}
                  </div>
                  {items.length>1&&<button type="button" onClick={()=>removeItem(i)} style={{background:"#fff0f0",border:"1px solid #ffcccc",borderRadius:7,padding:"3px 8px",cursor:"pointer",color:"#cc0000",fontSize:12,fontWeight:600,display:"flex",alignItems:"center",gap:4}}><i className="ti ti-x" style={{fontSize:12}}/>Remove</button>}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:11}}>
                  <div><label style={LBL}>Product Type *</label><select ref={setRef(`product-${i}`)} onKeyDown={onEnter(`product-${i}`)} className="inp" value={it.product} onChange={e=>updItem(i,"product",e.target.value)}>{PRODUCTS.map(p=><option key={p}>{p}</option>)}</select></div>
                  <div><label style={LBL}>Wood Type *</label><select ref={setRef(`wood-${i}`)} onKeyDown={onEnter(`wood-${i}`)} className="inp" value={it.wood} onChange={e=>updItem(i,"wood",e.target.value)}>{WOODS.map(w=><option key={w}>{w}</option>)}</select></div>
                  <div style={{gridColumn:"span 2"}}>
                    <label style={LBL}>Size / Dimensions (inches) *</label>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                      <div><label style={{fontSize:11,color:"#999",display:"block",marginBottom:3}}>Length</label><input ref={setRef(`dimL-${i}`)} onKeyDown={onEnter(`dimL-${i}`)} type="number" step="0.1" className="inp" value={it.dimL} onChange={e=>updItem(i,"dimL",e.target.value)} placeholder="e.g. 10"/></div>
                      <div><label style={{fontSize:11,color:"#999",display:"block",marginBottom:3}}>Width</label><input ref={setRef(`dimW-${i}`)} onKeyDown={onEnter(`dimW-${i}`)} type="number" step="0.1" className="inp" value={it.dimW} onChange={e=>updItem(i,"dimW",e.target.value)} placeholder="e.g. 4"/></div>
                      <div><label style={{fontSize:11,color:"#999",display:"block",marginBottom:3}}>Thickness</label><input ref={setRef(`dimT-${i}`)} onKeyDown={onEnter(`dimT-${i}`)} type="number" step="0.1" className="inp" value={it.dimT} onChange={e=>updItem(i,"dimT",e.target.value)} placeholder="e.g. 2"/></div>
                    </div>
                  </div>
                  <div><label style={LBL}>Quantity *</label><input ref={setRef(`qty-${i}`)} onKeyDown={onEnter(`qty-${i}`)} type="number" className="inp" value={it.qty} onChange={e=>updItem(i,"qty",e.target.value)} placeholder="Units"/></div>
                  <div><label style={LBL}>Total Amount (₹)</label><input ref={setRef(`total-${i}`)} onKeyDown={onEnter(`total-${i}`)} type="number" className="inp" value={it.total} onChange={e=>updItem(i,"total",e.target.value)} placeholder="0"/></div>
                  <div><label style={LBL}>Advance Paid (₹)</label><input ref={setRef(`advance-${i}`)} onKeyDown={onEnter(`advance-${i}`)} type="number" className="inp" value={it.advance} onChange={e=>updItem(i,"advance",e.target.value)} placeholder="0"/></div>
                  <div><label style={LBL}>Pending (₹)</label><input type="number" className="inp" readOnly value={Math.max(0,(Number(it.total)||0)-(Number(it.advance)||0))} style={{background:"#fafaf8",color:"#999"}} placeholder="Auto"/></div>
                  <div>
                    <label style={LBL}>Advance Payment Method</label>
                    <select ref={setRef(`advPayMethod-${i}`)} onKeyDown={onEnter(`advPayMethod-${i}`)} className="inp" value={it.advPayMethod} onChange={e=>updItem(i,"advPayMethod",e.target.value)}>
                      {PAY_M.map(m=><option key={m}>{m}</option>)}
                    </select>
                    <div style={{fontSize:10.5,color:"#bbb",marginTop:3}}>Defaults to Cash — change only if paid via UPI/Bank</div>
                  </div>
                  <div><label style={LBL}>Notes</label><textarea ref={setRef(`notes-${i}`)} onKeyDown={onEnter(`notes-${i}`)} className="inp" rows={2} value={it.notes} onChange={e=>updItem(i,"notes",e.target.value)} placeholder="Special instructions... (Shift+Enter for new line)"/></div>
                  <div style={{gridColumn:"span 2"}}>
                    <button type="button" onClick={()=>updItem(i,"needsDesign",!it.needsDesign)}
                      className="btn" style={{width:"100%",justifyContent:"center",
                        background:it.needsDesign?"#fff3e0":"#fff",
                        color:it.needsDesign?"#a35a00":"#777",
                        border:`1.5px solid ${it.needsDesign?"#ffb74d":"#ddd"}`}}>
                      <i className="ti ti-pencil-ruler"/>
                      {it.needsDesign?"Marked for Design — this order needs to go to the design shop":"Send for Design? (tap to mark)"}
                    </button>
                  </div>
                </div>
              </div>
            ))}
          </div>

          <button type="button" onClick={addItem} className="btn btn-outline" style={{marginBottom:16,width:"100%",justifyContent:"center",borderStyle:"dashed"}}>
            <i className="ti ti-plus"/>Add Another Item / Size
          </button>

          <button ref={setRef("submit")} type="submit" className="btn btn-red" style={{width:"100%",justifyContent:"center",fontSize:15}}>
            <i className="ti ti-check"/>Create {items.length>1?`${items.length} Orders`:"Order"} & Generate QR{items.length>1?"s":""}
          </button>
        </form>
      </div>
    </div>
  );
}

// ── EDIT ORDER (Admin only) ──
function EditOrder({order,orders,onSave,onCancel,toast2}){
  const [f,setF]=useState({
    customer:order.customer||"",
    mobile:order.mobile||"",
    product:order.product||PRODUCTS[0],
    wood:order.wood||"Khair",
    dimL:order.size?order.size.replace(/"/g,"").split("x")[0]:"",
    dimW:order.size?order.size.replace(/"/g,"").split("x")[1]:"",
    dimT:order.size?order.size.replace(/"/g,"").split("x")[2]:"",
    qty:String(order.qty||""),
    total:String(order.total||""),
    advance:String(order.advance||""),
    advPayMethod:order.advPayMethod||"Cash",
    delivery:order.delivery||"",
    notes:order.notes||"",
    needsDesign:!!order.needsDesign,
  });
  const upd=(k,v)=>setF(p=>{
    const n={...p,[k]:v};
    if(k==="advance"||k==="total") n.pending=Math.max(0,(Number(n.total)||0)-(Number(n.advance)||0));
    return n;
  });
  const pending=Math.max(0,(Number(f.total)||0)-(Number(f.advance)||0));

  const sub=e=>{
    e.preventDefault();
    if(!f.customer||!f.mobile||!f.dimL||!f.dimW||!f.dimT||!f.qty){toast2("Fill all required fields","err");return;}
    const size=f.dimL+'"x'+f.dimW+'"x'+f.dimT+'"';
    onSave(order.id,{
      customer:f.customer,mobile:f.mobile,product:f.product,wood:f.wood,
      size,qty:Number(f.qty),total:Number(f.total)||0,advance:Number(f.advance)||0,
      pending,advPayMethod:f.advPayMethod,delivery:f.delivery,notes:f.notes,needsDesign:f.needsDesign,
      designStatus:f.needsDesign?(order.designStatus||"Pending"):order.designStatus,
    });
  };

  const lbl={fontSize:11.5,fontWeight:600,color:"#777",display:"block",marginBottom:4};
  return(
    <div style={{maxWidth:660,margin:"0 auto"}}>
      <button className="btn btn-outline" style={{marginBottom:14,padding:"7px 14px",fontSize:12}} onClick={onCancel}>← Cancel</button>
      <div className="card">
        {/* Edit header with change indicator */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4,flexWrap:"wrap",gap:8}}>
          <div style={{fontWeight:700,fontSize:15}}>Edit Order</div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            {order.orderNum&&<span style={{fontWeight:900,color:"#cc0000",fontSize:16}}>Order {fmtON(order.orderNum)}</span>}
            <StatusBadge s={order.status}/>
          </div>
        </div>
        <div style={{fontSize:11,color:"#bbb",marginBottom:18}}>
          Created {order.created} by {order.createdBy}
          {order.lastEditedAt&&` · Last edited ${order.lastEditedAt} by ${order.lastEditedBy}`}
        </div>

        {/* Warning for delivered orders */}
        {order.status===S.DELI&&<div style={{background:"#fffbea",border:"1px solid #ffe58f",borderRadius:10,padding:"10px 14px",fontSize:12,color:"#7a5c00",marginBottom:16}}>
          <i className="ti ti-alert-triangle" style={{marginRight:6}}/>This order is already delivered. Changes will update the record but not affect the invoice already printed.
        </div>}

        <form onSubmit={sub}>
          <div style={{background:"#fafaf8",borderRadius:12,padding:14,marginBottom:14}}>
            <div style={{fontSize:11,fontWeight:700,color:"#888",marginBottom:10,textTransform:"uppercase",letterSpacing:.5}}>Customer</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <div><label style={lbl}>Customer Name *</label><input className="inp" value={f.customer} onChange={e=>upd("customer",e.target.value)} placeholder="Full name"/></div>
              <div><label style={lbl}>Mobile Number *</label><input className="inp" value={f.mobile} onChange={e=>upd("mobile",e.target.value)} placeholder="10-digit mobile"/></div>
            </div>
          </div>

          <div style={{border:"1.5px solid #eeebe6",borderRadius:13,padding:14,marginBottom:14}}>
            <div style={{fontSize:11,fontWeight:700,color:"#cc0000",marginBottom:10,textTransform:"uppercase",letterSpacing:.5}}>Order Details</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <div><label style={lbl}>Product Type *</label><select className="inp" value={f.product} onChange={e=>upd("product",e.target.value)}>{PRODUCTS.map(p=><option key={p}>{p}</option>)}</select></div>
              <div><label style={lbl}>Wood Type *</label><select className="inp" value={f.wood} onChange={e=>upd("wood",e.target.value)}>{WOODS.map(w=><option key={w}>{w}</option>)}</select></div>
              <div style={{gridColumn:"span 2"}}>
                <label style={lbl}>Size / Dimensions (inches) *</label>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                  <div><label style={{fontSize:11,color:"#999",display:"block",marginBottom:3}}>Length</label><input type="number" step="0.1" className="inp" value={f.dimL} onChange={e=>upd("dimL",e.target.value)} placeholder="10"/></div>
                  <div><label style={{fontSize:11,color:"#999",display:"block",marginBottom:3}}>Width</label><input type="number" step="0.1" className="inp" value={f.dimW} onChange={e=>upd("dimW",e.target.value)} placeholder="4"/></div>
                  <div><label style={{fontSize:11,color:"#999",display:"block",marginBottom:3}}>Thickness</label><input type="number" step="0.1" className="inp" value={f.dimT} onChange={e=>upd("dimT",e.target.value)} placeholder="2"/></div>
                </div>
              </div>
              <div><label style={lbl}>Quantity *</label><input type="number" className="inp" value={f.qty} onChange={e=>upd("qty",e.target.value)} placeholder="Units"/></div>
              <div><label style={lbl}>Delivery Date</label><input type="date" className="inp" value={f.delivery} onChange={e=>upd("delivery",e.target.value)}/></div>
              <div style={{gridColumn:"span 2"}}><label style={lbl}>Notes</label><textarea className="inp" rows={2} value={f.notes} onChange={e=>upd("notes",e.target.value)} placeholder="Special instructions..."/></div>
            </div>
          </div>

          <div style={{border:"1.5px solid #eeebe6",borderRadius:13,padding:14,marginBottom:14}}>
            <div style={{fontSize:11,fontWeight:700,color:"#888",marginBottom:10,textTransform:"uppercase",letterSpacing:.5}}>Payment</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <div><label style={lbl}>Total Amount (₹)</label><input type="number" className="inp" value={f.total} onChange={e=>upd("total",e.target.value)} placeholder="0"/></div>
              <div><label style={lbl}>Advance Paid (₹)</label><input type="number" className="inp" value={f.advance} onChange={e=>upd("advance",e.target.value)} placeholder="0"/></div>
              <div><label style={lbl}>Pending (₹)</label><input type="number" className="inp" readOnly value={pending} style={{background:"#fafaf8",color:"#999"}}/></div>
              <div>
                <label style={lbl}>Advance Payment Method</label>
                <select className="inp" value={f.advPayMethod} onChange={e=>upd("advPayMethod",e.target.value)}>{PAY_M.map(m=><option key={m}>{m}</option>)}</select>
              </div>
            </div>
          </div>

          <div style={{marginBottom:16}}>
            <button type="button" onClick={()=>upd("needsDesign",!f.needsDesign)} className="btn" style={{width:"100%",justifyContent:"center",background:f.needsDesign?"#fff3e0":"#fff",color:f.needsDesign?"#a35a00":"#777",border:`1.5px solid ${f.needsDesign?"#ffb74d":"#ddd"}`}}>
              <i className="ti ti-pencil-ruler"/>{f.needsDesign?"Marked for Design":"Send for Design? (tap to mark)"}
            </button>
          </div>

          <div style={{display:"flex",gap:10}}>
            <button type="button" className="btn btn-outline" style={{flex:1,justifyContent:"center"}} onClick={onCancel}>Cancel</button>
            <button type="submit" className="btn btn-red" style={{flex:2,justifyContent:"center",fontSize:15}}><i className="ti ti-device-floppy"/>Save Changes</button>
          </div>
        </form>
      </div>
    </div>
  );
}

// ── ORDER LIST ──
function OrderList({orders,updOrder,delOrder,toast2,user}){
  const [q,setQ]=useState("");
  const [fl,setFl]=useState("all");
  const [sel,setSel]=useState(null);
  const [delTarget,setDelTarget]=useState(null);
  const [editTarget,setEditTarget]=useState(null);

  const matchQ=(o,q)=>{
    if(!q) return true;
    const t=q.toLowerCase().trim();
    return o.customer.toLowerCase().includes(t)||o.mobile.includes(t)||o.id.toLowerCase().includes(t)||
      (o.orderNum&&(String(o.orderNum)===t||fmtON(o.orderNum).toLowerCase()===t||("#"+String(o.orderNum))===t));
  };
  const filtered=orders.filter(o=>matchQ(o,q)&&(fl==="all"||o.status===fl));
  const doDelete=(o)=>{setDelTarget(o);setSel(null);};

  // ── EDIT VIEW ──
  if(editTarget) return(
    <EditOrder
      order={editTarget}
      orders={orders}
      onSave={(id,patch)=>{
        updOrder(id,{...patch,lastEditedAt:now2(),lastEditedBy:user.name});
        toast2("Order updated successfully!");
        setSel({...editTarget,...patch,lastEditedAt:now2(),lastEditedBy:user.name});
        setEditTarget(null);
      }}
      onCancel={()=>setEditTarget(null)}
      toast2={toast2}
    />
  );

  if(sel) return(
    <div style={{maxWidth:560,margin:"0 auto"}}>
      <button className="btn btn-outline" style={{marginBottom:14,padding:"7px 14px",fontSize:12}} onClick={()=>setSel(null)}>← Back</button>
      <div className="card">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18,flexWrap:"wrap",gap:8}}>
          <div>
            {sel.orderNum&&<div style={{fontSize:22,fontWeight:900,color:"#cc0000",marginBottom:2}}>Order {fmtON(sel.orderNum)}</div>}
            <div style={{fontSize:12,color:"#aaa",marginBottom:2}}>{sel.id}</div>
            <div style={{fontSize:17,fontWeight:700}}>{sel.customer}</div>
            <div style={{fontSize:13,color:"#999"}}>{sel.mobile}</div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"flex-start",flexWrap:"wrap"}}>
            <StatusBadge s={sel.status}/>
            {["Admin"].includes(user.role)&&<button className="btn btn-outline" style={{padding:"5px 10px",fontSize:12}} onClick={()=>setEditTarget(sel)}><i className="ti ti-edit"/>Edit</button>}
            {["Admin"].includes(user.role)&&<button className="btn btn-danger" style={{padding:"5px 10px",fontSize:12}} onClick={()=>doDelete(sel)}><i className="ti ti-trash"/>Delete</button>}
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,fontSize:13,marginBottom:18}}>
          {[["Product",sel.product],["Wood",sel.wood],["Size",sel.size],["Quantity",sel.qty],
            ...(["Admin","Accountant"].includes(user.role)?[["Total",fmtM(sel.total)],["Advance",fmtM(sel.advance)],["Advance Via",sel.advPayMethod||"—"],["Pending",fmtM(sel.pending)]]:[] ),
            ["Delivery",fmtD(sel.delivery)],
            ...(sel.deliveredLocation?[["Collected",sel.deliveredLocation]]:[]),
            ...(sel.lastEditedAt?[["Last Edited",sel.lastEditedAt+" by "+sel.lastEditedBy]]:[])
          ].map(([k,v])=>(
            <div key={k} style={{gridColumn:k==="Last Edited"?"span 2":undefined}}>
              <div style={{fontSize:10.5,color:"#bbb",marginBottom:2}}>{k}</div>
              <div style={{fontWeight:600,fontSize:k==="Last Edited"?11:13,color:k==="Last Edited"?"#bbb":"#1a1a1a"}}>{v}</div>
            </div>
          ))}
          {sel.notes&&<div style={{gridColumn:"span 2"}}><div style={{fontSize:10.5,color:"#bbb",marginBottom:2}}>Notes</div><div style={{color:"#555",fontSize:12}}>{sel.notes}</div></div>}
        </div>
        <div style={{display:"flex",justifyContent:"center",marginBottom:14}}><QRSvg order={sel}/></div>
        <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
          <button className="btn btn-red" onClick={()=>printQR(sel)}><i className="ti ti-printer"/>Print QR</button>
          <button className="btn btn-green" onClick={()=>downloadQR(sel)}><i className="ti ti-download"/>Download QR</button>
          {sel.status===S.DELI&&<button className="btn btn-outline" onClick={()=>printInvoice(sel)}><i className="ti ti-file-invoice"/>Invoice</button>}
        </div>

        {/* ── Feedback section — only for Delivered & Paid orders ── */}
        {sel.status===S.DELI&&(
          <div style={{marginTop:18,paddingTop:18,borderTop:"1px solid #f0ede8"}}>
            <div style={{fontSize:11,fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Customer Feedback</div>

            {sel.customerRating?(
              <div style={{background:"#fafaf8",borderRadius:12,padding:14,textAlign:"center"}}>
                <div style={{fontSize:22,marginBottom:4}}>{"⭐".repeat(sel.customerRating)}</div>
                <div style={{fontSize:13,fontWeight:700,color:"#1a1a1a"}}>{sel.customerRating}/5 Rating</div>
                {sel.customerReviewText&&<div style={{fontSize:12,color:"#777",marginTop:6,fontStyle:"italic"}}>"{sel.customerReviewText}"</div>}
              </div>
            ):(
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
                <div style={{fontSize:12,color:"#999"}}>
                  {sel.feedbackSent
                    ?<><i className="ti ti-check" style={{color:"#1d9e75",marginRight:4}}/>Feedback request sent {sel.feedbackSentAt}</>
                    :"No feedback requested yet"}
                </div>
                <button className="btn" style={{background:"#25D366",color:"#fff",fontWeight:700,fontSize:13}}
                  onClick={()=>{
                    sendFeedbackRequest(sel);
                    updOrder(sel.id,{feedbackSent:true,feedbackSentAt:now2()});
                    setSel({...sel,feedbackSent:true,feedbackSentAt:now2()});
                    toast2("Feedback request sent on WhatsApp!");
                  }}>
                  <i className="ti ti-brand-whatsapp" style={{fontSize:17}}/>Send Feedback Request
                </button>
              </div>
            )}

            {/* Clickable rating links — opens WhatsApp with a prefilled reply for that rating */}
            {!sel.customerRating&&sel.feedbackSent&&(
              <div style={{marginTop:12}}>
                <div style={{fontSize:11,color:"#bbb",marginBottom:6}}>Clickable rating options:</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:7}}>
                  {[5,4,3,2,1].map(n=>(
                    <button key={n} className="btn btn-outline" style={{padding:"9px 11px",fontSize:12.5,justifyContent:"center"}}
                      onClick={()=>{
                        sendRatingReply(sel,n);
                        updOrder(sel.id,{customerRating:n});
                        setSel({...sel,customerRating:n});
                        toast2(n+"-star rating recorded");
                      }}>
                      {RATING_LABEL[n]}
                    </button>
                  ))}
                </div>
                <div style={{marginTop:12,padding:"11px 12px",background:"#fafaf8",borderRadius:10,fontSize:12.5,color:"#777",lineHeight:1.45}}>
                  <div>If you are happy with our service, we would greatly appreciate a Google Review.</div>
                  <div style={{fontWeight:700,color:"#1a1a1a",marginTop:5}}>Google Review:</div>
                  <a href={GOOGLE_REVIEW_URL} target="_blank" style={{color:"#cc0000",fontWeight:700,wordBreak:"break-word"}}>{GOOGLE_REVIEW_URL}</a>
                </div>
              </div>
            )}
          </div>
        )}
      </div>
      {delTarget&&<DeleteConfirm order={delTarget} onCancel={()=>setDelTarget(null)} onConfirm={()=>{delOrder(delTarget.id);setDelTarget(null);setSel(null);toast2("Order deleted");}}/>}
    </div>
  );

  return(
    <div>
      {delTarget&&<DeleteConfirm order={delTarget} onCancel={()=>setDelTarget(null)} onConfirm={()=>{delOrder(delTarget.id);setDelTarget(null);toast2("Order deleted");}}/>}
      <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
        <div style={{flex:1,minWidth:180,position:"relative"}}>
          <i className="ti ti-search" style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",color:"#bbb",fontSize:14}}/>
          <input className="inp" style={{paddingLeft:34}} value={q} onChange={e=>setQ(e.target.value)} placeholder="Search name, mobile, ID, order #..."/>
        </div>
        <select className="inp" style={{width:"auto",minWidth:160}} value={fl} onChange={e=>setFl(e.target.value)}>
          <option value="all">All Status</option>
          <option value={S.PEND}>Pending Factory Acceptance</option>
          <option value={S.PROD}>In Production</option>
          <option value={S.TRANSIT}>In Transit</option>
          <option value={S.RECV}>Received at Office</option>
          <option value={S.DELI}>Delivered & Paid</option>
        </select>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:9}}>
        {filtered.length===0&&<div style={{textAlign:"center",padding:40,color:"#bbb",background:"#fff",borderRadius:14}}>No orders found</div>}
        {filtered.map(o=>(
          <div key={o.id} className="card" style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",flexWrap:"wrap",border:"1px solid #eeebe6"}}>
            <div onClick={()=>setSel(o)} style={{display:"flex",alignItems:"center",gap:12,flex:1,minWidth:0,cursor:"pointer"}}>
              <div style={{width:44,height:44,background:"#fff3f3",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <span style={{fontSize:11,fontWeight:900,color:"#cc0000",textAlign:"center",lineHeight:1.1}}>{o.orderNum?fmtON(o.orderNum):"—"}</span>
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:600,fontSize:14,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{o.customer}</div>
                <div style={{fontSize:11,color:"#aaa"}}>{o.id}</div>
                <div style={{fontSize:12,color:"#777"}}>{o.product} · {o.wood} · Qty {o.qty}</div>
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
              {["Admin","Accountant"].includes(user.role)&&<div style={{textAlign:"right"}}>
                <div style={{fontWeight:700,fontSize:13}}>{fmtM(o.total)}</div>
                {o.pending>0&&<div style={{fontSize:11,color:"#cc0000"}}>Due: {fmtM(o.pending)}</div>}
              </div>}
              <StatusBadge s={o.status}/>
              {["Admin"].includes(user.role)&&<button className="btn btn-danger" style={{padding:"6px 10px",fontSize:12,flexShrink:0}} onClick={e=>{e.stopPropagation();doDelete(o);}}><i className="ti ti-trash"/></button>}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── DISPATCH CONFIRM MODAL (scan QR + confirm to mark In Transit) ──
function DispatchModal({order,onConfirm,onCancel,toast2}){
  const [scanned,setScanned]=useState(false);
  const onScan=text=>{
    if(text.trim()===order.id){setScanned(true);toast2("QR matched!");}
    else toast2("This QR doesn't match this order","err");
  };
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#fff",borderRadius:16,padding:22,maxWidth:420,width:"100%"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={{fontWeight:700,fontSize:16}}>Dispatch Order</div>
          <button onClick={onCancel} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:"#bbb"}}><i className="ti ti-x"/></button>
        </div>
        <div style={{background:"#fafaf8",borderRadius:10,padding:12,marginBottom:14}}>
          {order.orderNum&&<div style={{fontSize:18,fontWeight:900,color:"#cc0000"}}>Order {fmtON(order.orderNum)}</div>}
          <div style={{fontSize:13,fontWeight:600}}>{order.customer}</div>
          <div style={{fontSize:12,color:"#999"}}>{order.product} · {order.wood} · {order.size} · Qty {order.qty}</div>
        </div>
        {!scanned?(
          <>
            <div style={{fontSize:12.5,color:"#777",marginBottom:10}}>Scan this order's QR code to confirm it's being loaded for transport.</div>
            <QRScanner onResult={onScan} onError={()=>toast2("Camera error","err")}/>
          </>
        ):(
          <div style={{padding:14,background:"#e1f5ee",borderRadius:10,color:"#0f6e56",fontWeight:600,fontSize:13,textAlign:"center",marginBottom:14}}>
            <i className="ti ti-circle-check" style={{marginRight:6}}/>QR Scanned & Matched
          </div>
        )}
        <div style={{display:"flex",gap:10,marginTop:14}}>
          <button className="btn btn-outline" style={{flex:1,justifyContent:"center"}} onClick={onCancel}>Cancel</button>
          <button className="btn btn-red" disabled={!scanned} style={{flex:1,justifyContent:"center",opacity:scanned?1:.5,cursor:scanned?"pointer":"not-allowed"}} onClick={()=>scanned&&onConfirm()}><i className="ti ti-truck"/>OK — Mark In Transit</button>
        </div>
      </div>
    </div>
  );
}

// ── FACTORY ──
function Factory({orders,delOrder,updOrder,user,onAdd,toast2,goto}){
  const pendAccept=orders.filter(o=>o.status===S.PEND);
  const inProd=orders.filter(o=>o.status===S.PROD);
  const inTransit=orders.filter(o=>o.status===S.TRANSIT);
  const active=[...pendAccept,...inProd,...inTransit];
  const [sel,setSel]=useState(null);
  const [delTarget,setDelTarget]=useState(null);
  const [dispatchTarget,setDispatchTarget]=useState(null);
  const [showNewOrder,setShowNewOrder]=useState(false);
  const [showScanDispatch,setShowScanDispatch]=useState(false);
  const [scanResult,setScanResult]=useState(null); // the matched order after scan

  const acceptOrder=o=>{updOrder(o.id,{status:S.PROD,acceptedAt:now2(),acceptedBy:user.name});toast2("Order accepted — now In Production");setSel(null);};
  const confirmDispatch=o=>{updOrder(o.id,{status:S.TRANSIT,dispatchedAt:now2(),dispatchedBy:user.name});toast2("Order marked In Transit!");setDispatchTarget(null);setSel(null);};

  const onScanDispatch=useCallback(text=>{
    const id=text.trim();
    const o=orders.find(x=>x.id===id);
    if(!o){toast2("QR scanned but order not found","err");return;}
    if(o.status!==S.PROD){
      if(o.status===S.PEND) toast2("Order not yet accepted by factory","err");
      else if(o.status===S.TRANSIT) toast2("Already dispatched","err");
      else toast2("Order is not in production","err");
      return;
    }
    setScanResult(o);
    toast2("Order found: "+(o.orderNum?fmtON(o.orderNum):o.id));
  },[orders,toast2]);

  if(showNewOrder) return(
    <div>
      <button className="btn btn-outline" style={{marginBottom:14,padding:"7px 14px",fontSize:12}} onClick={()=>setShowNewOrder(false)}>← Back to Factory View</button>
      <NewOrder user={user} onAdd={onAdd} toast2={toast2} orders={orders} goto={goto||(()=>setShowNewOrder(false))}/>
    </div>
  );

  if(sel) return(
    <div style={{maxWidth:440,margin:"0 auto"}}>
      {delTarget&&<DeleteConfirm order={delTarget} onCancel={()=>setDelTarget(null)} onConfirm={()=>{delOrder(delTarget.id);setDelTarget(null);setSel(null);}}/>}
      {dispatchTarget&&<DispatchModal order={dispatchTarget} toast2={toast2} onCancel={()=>setDispatchTarget(null)} onConfirm={()=>confirmDispatch(dispatchTarget)}/>}
      <button className="btn btn-outline" style={{marginBottom:14,padding:"7px 14px",fontSize:12}} onClick={()=>setSel(null)}>← Back</button>
      <div className="card" style={{textAlign:"center"}}>
        {sel.orderNum&&<div style={{fontSize:22,fontWeight:900,color:"#cc0000",marginBottom:2}}>Order {fmtON(sel.orderNum)}</div>}
        <div style={{fontSize:12,color:"#aaa",marginBottom:4}}>{sel.id}</div>
        <div style={{fontSize:17,fontWeight:700,marginBottom:2}}>{sel.customer}</div>
        <div style={{fontSize:13,color:"#999",marginBottom:10}}>{sel.mobile}</div>
        <div style={{marginBottom:14}}><StatusBadge s={sel.status}/></div>
        <div style={{background:"#fafaf8",borderRadius:12,padding:14,display:"inline-block",marginBottom:14}}><QRSvg order={sel}/></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,fontSize:12.5,marginBottom:16,textAlign:"left"}}>
          {[["Product",sel.product],["Wood",sel.wood],["Size",sel.size],["Qty",sel.qty],["Delivery",fmtD(sel.delivery)]].map(([k,v])=>(
            <div key={k} style={{background:"#fafaf8",borderRadius:9,padding:"9px 11px"}}><div style={{fontSize:10,color:"#bbb"}}>{k}</div><div style={{fontWeight:600}}>{v}</div></div>
          ))}
          {sel.notes&&<div style={{gridColumn:"span 2",background:"#fff8f8",borderRadius:9,padding:"9px 11px",border:"1px solid #ffe0e0"}}><div style={{fontSize:10,color:"#cc0000",marginBottom:2}}>Notes</div><div style={{fontSize:12}}>{sel.notes}</div></div>}
        </div>
        <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
          {sel.status===S.PEND&&<button className="btn btn-green" style={{fontSize:14}} onClick={()=>acceptOrder(sel)}><i className="ti ti-check"/>Accept Order</button>}
          {sel.status===S.PROD&&<button className="btn" style={{background:"#6a1bb5",color:"#fff",fontSize:14}} onClick={()=>setDispatchTarget(sel)}><i className="ti ti-truck"/>Dispatch</button>}
          {sel.status===S.TRANSIT&&<div style={{padding:"10px 16px",background:"#f0e6fb",borderRadius:10,color:"#6a1bb5",fontWeight:600,fontSize:13}}><i className="ti ti-truck" style={{marginRight:6}}/>In Transit since {sel.dispatchedAt}</div>}
          <button className="btn btn-red" onClick={()=>printQR(sel)}><i className="ti ti-printer"/>Print QR</button>
          {["Admin"].includes(user.role)&&<button className="btn btn-danger" onClick={()=>setDelTarget(sel)}><i className="ti ti-trash"/>Delete</button>}
        </div>
      </div>
    </div>
  );

  const Section=({title,list,color,emptyMsg,renderAction})=>(
    <div style={{marginBottom:22}}>
      <div style={{fontSize:12,fontWeight:700,color,textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>{title} ({list.length})</div>
      <div style={{display:"flex",flexDirection:"column",gap:9}}>
        {list.length===0&&<div style={{textAlign:"center",padding:24,color:"#bbb",background:"#fff",borderRadius:14,fontSize:13}}>{emptyMsg}</div>}
        {list.map(o=>(
          <div key={o.id} className="card" style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",flexWrap:"wrap",border:"1px solid #eeebe6"}}>
            <div onClick={()=>setSel(o)} style={{display:"flex",alignItems:"center",gap:12,flex:1,cursor:"pointer",minWidth:0}}>
              <div style={{width:44,height:44,background:"#fff3f3",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <span style={{fontSize:11,fontWeight:900,color:"#cc0000"}}>{o.orderNum?fmtON(o.orderNum):"—"}</span>
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:700,color:"#1a1a1a",fontSize:14}}>{o.customer}</div>
                <div style={{fontSize:12,color:"#999"}}>{o.product} · {o.wood} · {o.size} · Qty {o.qty}</div>
              </div>
              <div style={{textAlign:"right",marginRight:4,flexShrink:0}}>
                <div style={{fontSize:11,color:"#bbb"}}>Delivery</div>
                <div style={{fontWeight:600,fontSize:13}}>{fmtD(o.delivery)}</div>
              </div>
            </div>
            <div style={{display:"flex",gap:6,flexShrink:0,flexWrap:"wrap"}}>
              {renderAction(o)}
              {["Admin"].includes(user.role)&&<button className="btn btn-danger" style={{padding:"6px 10px",fontSize:12}} onClick={e=>{e.stopPropagation();setDelTarget(o);}}><i className="ti ti-trash"/></button>}
            </div>
          </div>
        ))}
      </div>
    </div>
  );

  const doScanDispatch=()=>{
    if(!scanResult) return;
    updOrder(scanResult.id,{status:S.TRANSIT,dispatchedAt:now2(),dispatchedBy:user.name});
    toast2("Order "+( scanResult.orderNum?fmtON(scanResult.orderNum):scanResult.id)+" marked In Transit!");
    setScanResult(null);
    setShowScanDispatch(false);
  };

  return(
    <div>
      {delTarget&&<DeleteConfirm order={delTarget} onCancel={()=>setDelTarget(null)} onConfirm={()=>{delOrder(delTarget.id);setDelTarget(null);}}/>}
      {dispatchTarget&&<DispatchModal order={dispatchTarget} toast2={toast2} onCancel={()=>setDispatchTarget(null)} onConfirm={()=>confirmDispatch(dispatchTarget)}/>}

      {/* ── Top action bar ── */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:10}}>
        <div style={{fontSize:13,color:"#999"}}>{active.length} active orders in factory</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <button className="btn" style={{background:"#6a1bb5",color:"#fff"}} onClick={()=>{setShowScanDispatch(p=>!p);setScanResult(null);}}>
            <i className="ti ti-qrcode"/>Scan to Dispatch
          </button>
          <button className="btn btn-red" onClick={()=>setShowNewOrder(true)}>
            <i className="ti ti-plus"/>Add New Order
          </button>
        </div>
      </div>

      {/* ── Inline Scan-to-Dispatch panel ── */}
      {showScanDispatch&&(
        <div className="card" style={{marginBottom:18,border:"2px solid #6a1bb5"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div style={{fontWeight:700,fontSize:15,color:"#6a1bb5"}}><i className="ti ti-qrcode" style={{marginRight:6}}/>Scan to Dispatch</div>
            <button onClick={()=>{setShowScanDispatch(false);setScanResult(null);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:"#bbb"}}><i className="ti ti-x"/></button>
          </div>

          {!scanResult?(
            <>
              <div style={{fontSize:12.5,color:"#777",marginBottom:12}}>
                Point the camera at any <b>In Production</b> order's QR code — it will be detected automatically.
              </div>
              <QRScanner onResult={onScanDispatch} onError={()=>toast2("Camera error","err")}/>
            </>
          ):(
            <>
              {/* ── Matched order card ── */}
              <div style={{background:"#f4eeff",border:"1.5px solid #c9a3f5",borderRadius:12,padding:14,marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
                  <div>
                    {scanResult.orderNum&&<div style={{fontSize:20,fontWeight:900,color:"#6a1bb5",marginBottom:2}}>Order {fmtON(scanResult.orderNum)}</div>}
                    <div style={{fontSize:11,color:"#999",marginBottom:4}}>{scanResult.id}</div>
                    <div style={{fontWeight:700,fontSize:15}}>{scanResult.customer}</div>
                    <div style={{fontSize:12,color:"#777"}}>{scanResult.mobile}</div>
                  </div>
                  <StatusBadge s={scanResult.status}/>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginTop:12}}>
                  {[["Product",scanResult.product],["Wood",scanResult.wood],["Size",scanResult.size],["Qty",scanResult.qty],["Delivery",fmtD(scanResult.delivery)]].map(([k,v])=>(
                    <div key={k} style={{background:"#fff",borderRadius:8,padding:"8px 10px"}}>
                      <div style={{fontSize:10,color:"#bbb",marginBottom:2}}>{k}</div>
                      <div style={{fontWeight:700,fontSize:12.5,color:"#1a1a1a"}}>{v}</div>
                    </div>
                  ))}
                </div>
                {scanResult.notes&&<div style={{marginTop:10,background:"#fff8f8",borderRadius:8,padding:"8px 10px",fontSize:12,color:"#a35a00"}}>📝 {scanResult.notes}</div>}
              </div>

              <div style={{display:"flex",gap:10}}>
                <button className="btn btn-outline" style={{flex:1,justifyContent:"center"}} onClick={()=>{setScanResult(null);}}>
                  <i className="ti ti-arrow-back-up"/>Scan Again
                </button>
                <button className="btn" style={{flex:2,justifyContent:"center",background:"#6a1bb5",color:"#fff",fontSize:15}} onClick={doScanDispatch}>
                  <i className="ti ti-truck"/>Confirm Dispatch — Mark In Transit
                </button>
              </div>
            </>
          )}
        </div>
      )}

      <Section title="Pending Factory Acceptance" color="#cc0000" list={pendAccept} emptyMsg="Nothing awaiting acceptance"
        renderAction={o=><button className="btn btn-green" style={{padding:"7px 12px",fontSize:12}} onClick={e=>{e.stopPropagation();acceptOrder(o);}}><i className="ti ti-check"/>Accept</button>}/>

      <Section title="In Production" color="#854f0b" list={inProd} emptyMsg="Nothing currently in production"

    </div>
  );
}

// ── RECEIVE ──
function Receive({orders,updOrder,user,toast2}){
  const [found,setFound]=useState(null);
  const [mid,setMid]=useState("");

  const findByText=useCallback(text=>{
    const t=text.trim();
    return orders.find(x=>x.id===t||x.mobile===t||(x.orderNum&&(String(x.orderNum)===t||fmtON(x.orderNum)===t||("#"+String(x.orderNum))===t)));
  },[orders]);

  const onScan=useCallback(text=>{
    const o=findByText(text);
    if(o){setFound(o);toast2("Order found: "+(o.orderNum?fmtON(o.orderNum):o.id));}
    else toast2("QR scanned but order not found: "+text,"err");
  },[findByText,toast2]);

  const search=()=>{const o=findByText(mid);o?setFound(o):toast2("Order not found","err");};
  const markRecv=()=>{
    if(found.status===S.RECV||found.status===S.DELI){toast2("Already received","err");return;}
    if(found.status===S.PEND){toast2("Order not yet accepted by factory","err");return;}
    if(found.status===S.PROD){toast2("Order not yet dispatched from factory","err");return;}
    updOrder(found.id,{status:S.RECV,receivedAt:now2(),receivedBy:user.name});
    toast2("Marked as Received!");setFound(null);setMid("");
  };

  return(
    <div style={{maxWidth:500,margin:"0 auto"}}>
      {!found&&(
        <div className="card">
          <div style={{fontWeight:700,fontSize:15,marginBottom:14}}>Scan QR Code to Receive</div>
          <QRScanner onResult={onScan} onError={()=>toast2("Camera error","err")}/>
          <div style={{display:"flex",alignItems:"center",gap:10,margin:"14px 0"}}>
            <div style={{flex:1,height:1,background:"#eee"}}/>
            <span style={{fontSize:11,color:"#bbb",flexShrink:0}}>OR SEARCH MANUALLY</span>
            <div style={{flex:1,height:1,background:"#eee"}}/>
          </div>
          <div style={{display:"flex",gap:8}}>
            <input className="inp" value={mid} onChange={e=>setMid(e.target.value)} placeholder="Order #, Order ID or Mobile" onKeyDown={e=>e.key==="Enter"&&search()}/>
            <button className="btn btn-red" onClick={search}><i className="ti ti-search"/></button>
          </div>
        </div>
      )}
      {found&&(
        <div className="card">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div style={{fontWeight:700,fontSize:16}}>Order Found</div>
            <button onClick={()=>{setFound(null);setMid("");}} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:"#bbb"}}><i className="ti ti-x"/></button>
          </div>
          <div style={{background:"#fafaf8",borderRadius:12,padding:14,marginBottom:14}}>
            {found.orderNum&&<div style={{fontSize:22,fontWeight:900,color:"#cc0000",marginBottom:2}}>Order {fmtON(found.orderNum)}</div>}
            <div style={{fontSize:11,color:"#aaa",marginBottom:4}}>{found.id}</div>
            <div style={{fontWeight:700,fontSize:15,marginBottom:2}}>{found.customer}</div>
            <div style={{fontSize:13,color:"#999",marginBottom:12}}>{found.mobile}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,fontSize:12.5}}>
              {[["Product",found.product],["Wood",found.wood],["Size",found.size],["Qty",found.qty],["Total",fmtM(found.total)],["Pending",fmtM(found.pending)]].map(([k,v])=>(
                <div key={k}><span style={{color:"#bbb"}}>{k}: </span><b>{v}</b></div>
              ))}
            </div>
          </div>
          <div style={{marginBottom:14}}><StatusBadge s={found.status}/></div>
          {found.status===S.TRANSIT
            ?<button className="btn btn-green" style={{width:"100%",justifyContent:"center",fontSize:15}} onClick={markRecv}><i className="ti ti-check"/>Mark as Received at Office</button>
            :found.status===S.PEND
            ?<div style={{padding:12,background:"#ffe9e9",borderRadius:10,color:"#cc0000",fontWeight:600,fontSize:13,textAlign:"center"}}>⏳ Order not yet accepted by factory</div>

}

// ── DELIVER ──
function Deliver({orders,updOrder,user,toast2}){
  const [found,setFound]=useState(null);
  const [mid,setMid]=useState("");
  const [pm,setPm]=useState("Cash");
  const [pt,setPt]=useState("full");
  const [partial,setPartial]=useState("");
  const [loc,setLoc]=useState("At Office");
  const [justDelivered,setJustDelivered]=useState(null); // holds the completed order right after delivery

  const findByText=useCallback(text=>{
    const t=text.trim();
    return orders.find(x=>x.id===t||x.mobile===t||(x.orderNum&&(String(x.orderNum)===t||fmtON(x.orderNum)===t||("#"+String(x.orderNum))===t)));
  },[orders]);

  const onScan=useCallback(text=>{
    const o=findByText(text);
    if(o){
      setFound(o);
      setLoc(o.status===S.RECV||o.status===S.DELI?"At Office":"At Production");
      toast2("Order found: "+(o.orderNum?fmtON(o.orderNum):o.id));

  };
  const markDel=()=>{
    if(found.status===S.PEND){toast2("Order not yet accepted by factory","err");return;}
    const pendFinal=pt==="full"?0:pt==="partial"?Math.max(0,found.pending-Number(partial)):found.pending;
    const updatedOrder={...found,status:S.DELI,pending:pendFinal,payMethod:pm,payAt:now2(),deliveredAt:now2(),deliveredBy:user.name,deliveredLocation:loc};
    updOrder(found.id,{status:S.DELI,pending:pendFinal,payMethod:pm,payAt:now2(),deliveredAt:now2(),deliveredBy:user.name,deliveredLocation:loc});
    toast2("Delivered & Paid!");

  // ── Success screen after marking delivered — offers immediate feedback request ──

          <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}><span style={{color:"#999"}}>Payment Method</span><b>{justDelivered.payMethod}</b></div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:13}}><span style={{color:"#999"}}>Pending</span><b style={{color:justDelivered.pending>0?"#cc0000":"#1d9e75"}}>{fmtM(justDelivered.pending)}</b></div>
        </div>

              sendFeedbackRequest(justDelivered);

// Parse "DD/M/YYYY, h:mm:ss am/pm" (en-IN locale string) into date parts
function parseLocaleDate(str){
  if(!str) return null;
  const datePart=str.split(",")[0].trim();
  const bits=datePart.split("/").map(Number);
  if(bits.length!==3||bits.some(isNaN)) return null;
  const [d,m,y]=bits;
  return {d,m,y,dateKey:`${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`,monthKey:`${y}-${String(m).padStart(2,"0")}`,monthLabel:new Date(y,m-1,1).toLocaleDateString("en-IN",{month:"long",year:"numeric"})};
}
const todayKey=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;};

// ── CUSTOMER TAB (used inside Reports) ──
function CustomerTab({orders,custQ,setCustQ}){
  const [expanded,setExpanded]=useState(null); // mobile key of expanded customer

    const seen={};
    orders.forEach(o=>{
      if(!o.mobile) return;
      if(!seen[o.mobile]) seen[o.mobile]=[];
      seen[o.mobile].push(o);
    });
    return Object.entries(seen)
      .map(([mob,cos])=>({mobile:mob,name:cos[0].customer,orders:cos.sort((a,b)=>(b.created||"").localeCompare(a.created||""))}))
      .sort((a,b)=>a.name.localeCompare(b.name));
  },[orders]);

  const filtered=custQ.trim()
    ?allCustomers.filter(c=>c.name.toLowerCase().includes(custQ.toLowerCase().trim()))

  const statusColor={[S.PEND]:"#cc0000",[S.PROD]:"#854f0b",[S.TRANSIT]:"#6a1bb5",[S.RECV]:"#0f6e56",[S.DELI]:"#185fa5"};
