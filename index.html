// ── QR CONTENT BUILDER ──
function buildQRText(o){
  // Keep it concise so QR stays scannable
  return "HSM ORDER\n"+
    "ID:"+o.id+"\n"+
    "Customer:"+o.customer+"\n"+
    "Mobile:"+o.mobile+"\n"+
    "Product:"+o.product+" ("+o.wood+")\n"+
    "Size:"+o.size+" Qty:"+o.qty+"\n"+
    "Total:"+fmtM(o.total)+"\n"+
    "Advance:"+fmtM(o.advance)+"\n"+
    "Pending:"+fmtM(o.pending)+"\n"+
    "Delivery:"+(o.delivery?fmtD(o.delivery):"—")+"\n"+
    "Status:"+o.status+
    (o.notes?"\nNotes:"+o.notes:"");
}

// ── DRAW QR ON CANVAS ──
function drawQROnCanvas(canvas, text, size){
  try{
    const qr=qrcode(0,"M");
    qr.addData(text);
    qr.make();
    const count=qr.getModuleCount();
    const cell=Math.floor(size/count);
    const actual=cell*count;
    canvas.width=actual;
    canvas.height=actual;
    const ctx=canvas.getContext("2d");
    ctx.fillStyle="#ffffff";
    ctx.fillRect(0,0,actual,actual);
    ctx.fillStyle="#000000";
    for(let r=0;r<count;r++){
      for(let c=0;c<count;c++){
        if(qr.isDark(r,c)){
          ctx.fillRect(c*cell,r*cell,cell,cell);
        }
      }
    }
    return canvas;
  }catch(e){
    console.error("QR draw error",e);
    return null;
  }
}

// ── REAL QR COMPONENT ──
function QRSvg({order,size=180}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current||!order) return;
    const text=buildQRText(order);
    drawQROnCanvas(ref.current, text, size);
  },[order&&order.id, size]);
  if(!order) return null;
  return(
    <canvas ref={ref} style={{display:"block",imageRendering:"pixelated",width:size,height:size}}/>
  );
}

// ── DOWNLOAD QR ──
function downloadQR(o){
  const size=220;
  const padX=24, padTop=56, padBot=44;
  const W=size+padX*2, H=size+padTop+padBot;
  const out=document.createElement("canvas");
  out.width=W; out.height=H;
  const ctx=out.getContext("2d");

  // background + border
  ctx.fillStyle="#ffffff";
  ctx.fillRect(0,0,W,H);
  ctx.strokeStyle="#cc0000";
  ctx.lineWidth=3;
  ctx.beginPath();
  ctx.roundRect(2,2,W-4,H-4,12);
  ctx.stroke();

  // logo
  ctx.fillStyle="#cc0000";
  ctx.font="bold 22px Arial";
  ctx.textAlign="center";
  ctx.fillText("HSM",W/2,28);
  ctx.fillStyle="#999999";
  ctx.font="8px Arial";
  ctx.fillText("HANUMAN SAW MILL",W/2,40);

  // draw QR onto a temp canvas then blit
  const tmp=document.createElement("canvas");
  const drawn=drawQROnCanvas(tmp, buildQRText(o), size);
  if(!drawn){alert("QR generation failed");return;}
  ctx.drawImage(tmp, padX, padTop, size, size);

  // order id + customer
  ctx.fillStyle="#1a1a1a";
  ctx.font="bold 12px Arial";
  ctx.fillText(o.id, W/2, padTop+size+16);
  ctx.fillStyle="#555555";
  ctx.font="10px Arial";
  ctx.fillText(o.customer+" · "+o.mobile, W/2, padTop+size+30);

  const link=document.createElement("a");
  link.download="QR-"+o.id+".png";
  link.href=out.toDataURL("image/png");
  link.click();
}

            <i className="ti ti-alert-triangle" style={{fontSize:14}}/>
            Running in local mode — Firebase not configured. Orders are not shared across devices.
          </div>
        )}

        <main style={{flex:1,overflow:"auto",padding:20}}>
          {page==="dashboard"&&<Dashboard orders={orders} goto={goto} user={user}/>}
          {page==="new-order"&&<NewOrder user={user} onAdd={addOrder} toast2={toast2}/>}
          {page==="orders"&&<OrderList orders={orders} updOrder={updOrder} toast2={toast2} user={user}/>}
          {page==="factory"&&<Factory orders={orders}/>}
          {page==="receive"&&<Receive orders={orders} updOrder={updOrder} user={user} toast2={toast2}/>}
          {page==="deliver"&&<Deliver orders={orders} updOrder={updOrder} user={user} toast2={toast2}/>}
          {page==="reports"&&["Admin","Accountant"].includes(user.role)&&<Reports orders={orders}/>}
        </main>
      </div>

      {toast&&(
        <div style={{position:"fixed",bottom:24,right:24,background:toast.type==="ok"?"#1d9e75":"#cc0000",color:"#fff",padding:"12px 20px",borderRadius:12,fontSize:13.5,fontWeight:600,zIndex:9999,boxShadow:"0 4px 20px rgba(0,0,0,.15)",maxWidth:320}}>
          <i className={`ti ${toast.type==="ok"?"ti-check":"ti-alert-circle"}`} style={{marginRight:6}}/>{toast.msg}
        </div>
      )}
    </div>
  );
}

// ── NEW ORDER ──
const NEW_ORDER_DEF={customer:"",mobile:"",address:"",product:PRODUCTS[0],wood:WOODS[0],size:"",qty:"",advance:"",pending:"",total:"",delivery:"",notes:""};
const NEW_ORDER_LBL={fontSize:11.5,fontWeight:600,color:"#777",display:"block",marginBottom:4};
function NewOrder({user,onAdd,toast2}){
  const [f,setF]=useState(NEW_ORDER_DEF);
  const [done,setDone]=useState(null);
  const upd=(k,v)=>setF(p=>{const n={...p,[k]:v};if(k==="advance"||k==="total")n.pending=Math.max(0,Number(n.total||0)-Number(n.advance||0)).toString();return n;});
  const sub=e=>{
    e.preventDefault();
    if(!f.customer||!f.mobile||!f.size||!f.qty){toast2("Fill all required fields","err");return;}
    const o={...f,id:genId(),status:S.PROD,created:now2(),createdBy:user.name,qty:Number(f.qty),advance:Number(f.advance)||0,pending:Number(f.pending)||0,total:Number(f.total)||0,payMethod:"",payAt:"",receivedAt:"",receivedBy:"",deliveredAt:"",deliveredBy:""};
    onAdd(o);setDone(o);
  };
  if(done) return(
    <div style={{maxWidth:480,margin:"0 auto"}}>
      <div className="card" style={{textAlign:"center"}}>
        <div style={{width:52,height:52,background:"#e1f5ee",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px"}}>
          <i className="ti ti-check" style={{fontSize:26,color:"#1d9e75"}}/>
        </div>
        <div style={{fontSize:17,fontWeight:700,marginBottom:4}}>Order Created!</div>
        <div style={{fontSize:13,color:"#999",marginBottom:18}}>{done.id}</div>
        <div style={{background:"#fafaf8",borderRadius:12,padding:14,display:"inline-block",marginBottom:18}}>
          <QRSvg order={done}/>
        </div>
        <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
          <button className="btn btn-red" onClick={()=>printQR(done)}><i className="ti ti-printer"/>Print QR</button>
          <button className="btn btn-green" onClick={()=>downloadQR(done)}><i className="ti ti-download"/>Download QR</button>
          <button className="btn btn-outline" onClick={()=>{setDone(null);setF(NEW_ORDER_DEF);}}><i className="ti ti-plus"/>New Order</button>

  return(
    <div style={{maxWidth:660,margin:"0 auto"}}>
      <div className="card">
        <div style={{fontWeight:700,fontSize:15,marginBottom:18}}>Create New Order</div>
        <form onSubmit={sub}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:13}}>
            <div><label style={lbl}>Customer Name *</label><input className="inp" value={f.customer} onChange={e=>upd("customer",e.target.value)} placeholder="Full name"/></div>
            <div><label style={lbl}>Mobile Number *</label><input className="inp" value={f.mobile} onChange={e=>upd("mobile",e.target.value)} placeholder="10-digit mobile"/></div>
            <div><label style={lbl}>Address (optional)</label><input className="inp" value={f.address} onChange={e=>upd("address",e.target.value)} placeholder="Optional"/></div>
            <div><label style={lbl}>Product Type *</label>
              <select className="inp" value={f.product} onChange={e=>upd("product",e.target.value)}>{PRODUCTS.map(p=><option key={p}>{p}</option>)}</select></div>
            <div><label style={lbl}>Wood Type *</label>
              <select className="inp" value={f.wood} onChange={e=>upd("wood",e.target.value)}>{WOODS.map(w=><option key={w}>{w}</option>)}</select></div>
            <div><label style={lbl}>Size / Dimensions *</label><input className="inp" value={f.size} onChange={e=>upd("size",e.target.value)} placeholder='e.g. 2"x4"x10ft'/></div>
            <div><label style={lbl}>Quantity *</label><input type="number" className="inp" value={f.qty} onChange={e=>upd("qty",e.target.value)} placeholder="Units"/></div>
            <div><label style={lbl}>Total Amount (₹)</label><input type="number" className="inp" value={f.total} onChange={e=>upd("total",e.target.value)} placeholder="0"/></div>
            <div><label style={lbl}>Advance Paid (₹)</label><input type="number" className="inp" value={f.advance} onChange={e=>upd("advance",e.target.value)} placeholder="0"/></div>
            <div><label style={lbl}>Pending Amount (₹)</label><input type="number" className="inp" value={f.pending} onChange={e=>upd("pending",e.target.value)} placeholder="Auto-calculated"/></div>
            <div><label style={lbl}>Delivery Date</label><input type="date" className="inp" value={f.delivery} onChange={e=>upd("delivery",e.target.value)}/></div>
            <div style={{gridColumn:"span 2"}}>
              <label style={lbl}>Notes / Special Instructions</label>
              <textarea className="inp" rows={2} value={f.notes} onChange={e=>upd("notes",e.target.value)} placeholder="Special instructions..."/>
            </div>
          </div>
          <button type="submit" className="btn btn-red" style={{marginTop:18}}><i className="ti ti-check"/>Create Order & Generate QR</button>
        </form>
      </div>

  );

// ── RECEIVE ──
function Receive({orders,updOrder,user,toast2}){
  const [found,setFound]=useState(null);
  const [mid,setMid]=useState("");
  const [scanning,setScanning]=useState(false);
  const vidRef=useRef(null);
  const stRef=useRef(null);
  const ivRef=useRef(null);

  const stopCam=useCallback(()=>{
    if(ivRef.current) clearInterval(ivRef.current);
    if(stRef.current) stRef.current.getTracks().forEach(t=>t.stop());
    stRef.current=null;setScanning(false);
  },[]);

  const startCam=async()=>{
    try{
      const st=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
      stRef.current=st;
      if(vidRef.current) vidRef.current.srcObject=st;
      setScanning(true);
      ivRef.current=setInterval(()=>{
        if(!vidRef.current||!window.jsQR) return;
        const cv=document.createElement("canvas");cv.width=vidRef.current.videoWidth;cv.height=vidRef.current.videoHeight;
        const ctx=cv.getContext("2d");ctx.drawImage(vidRef.current,0,0);
        const img=ctx.getImageData(0,0,cv.width,cv.height);
        const code=window.jsQR(img.data,img.width,img.height);
        if(code){const o=orders.find(x=>code.data.includes(x.id));if(o){stopCam();setFound(o);}}
      },300);
    }catch(e){toast2("Camera access denied","err");}
  };

  const search=()=>{
    const o=orders.find(x=>x.id.toLowerCase()===mid.toLowerCase().trim()||x.mobile===mid.trim());
    o?setFound(o):toast2("Order not found","err");
  };

  const markRecv=()=>{
    if(found.status!==S.PROD){toast2("Already received","err");return;}
    updOrder(found.id,{status:S.RECV,receivedAt:now2(),receivedBy:user.name});
    toast2("Marked as Received at Office!");setFound(null);setMid("");
  };

  useEffect(()=>()=>stopCam(),[stopCam]);

  return(
    <div style={{maxWidth:500,margin:"0 auto"}}>
      <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"/>
      {!found&&(
        <div className="card">
          <div style={{fontWeight:700,fontSize:15,marginBottom:14}}>Scan QR Code to Receive</div>
          <div style={{background:"#1a1a1a",borderRadius:13,overflow:"hidden",marginBottom:12,position:"relative",minHeight:210}}>
            <video ref={vidRef} autoPlay playsInline muted style={{width:"100%",display:"block",maxHeight:270,objectFit:"cover"}}/>
            {!scanning&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:8}}>
              <i className="ti ti-qrcode" style={{fontSize:44,color:"#444"}}/>
              <div style={{color:"#666",fontSize:13}}>Camera not active</div>
            </div>}
            {scanning&&<div style={{position:"absolute",inset:0,border:"3px solid #cc0000",borderRadius:13,pointerEvents:"none"}}/>}
          </div>
          <div style={{marginBottom:16}}>
            {!scanning
              ?<button className="btn btn-red" style={{width:"100%",justifyContent:"center"}} onClick={startCam}><i className="ti ti-camera"/>Start Camera Scan</button>
              :<button className="btn btn-outline" style={{width:"100%",justifyContent:"center"}} onClick={stopCam}><i className="ti ti-player-stop"/>Stop Camera</button>}
          </div>
          <div style={{display:"flex",gap:8}}>
            <input className="inp" value={mid} onChange={e=>setMid(e.target.value)} placeholder="Order ID or Mobile Number" onKeyDown={e=>e.key==="Enter"&&search()}/>
            <button className="btn btn-red" onClick={search}><i className="ti ti-search"/></button>
          </div>
        </div>
      )}
      {found&&(
        <div className="card">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div style={{fontWeight:700,fontSize:16}}>Order Found</div>
            <button onClick={()=>setFound(null)} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:"#bbb"}}><i className="ti ti-x"/></button>
          </div>
          <div style={{background:"#fafaf8",borderRadius:12,padding:14,marginBottom:14}}>
            <div style={{fontWeight:700,color:"#cc0000",fontSize:12,marginBottom:4}}>{found.id}</div>
            <div style={{fontWeight:700,fontSize:15,marginBottom:2}}>{found.customer}</div>
            <div style={{fontSize:13,color:"#999",marginBottom:12}}>{found.mobile}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,fontSize:12.5}}>
              {[["Product",found.product],["Wood",found.wood],["Size",found.size],["Qty",found.qty],["Total",fmtM(found.total)],["Pending",fmtM(found.pending)]].map(([k,v])=>(
                <div key={k}><span style={{color:"#bbb"}}>{k}: </span><b>{v}</b></div>
              ))}
            </div>
          </div>
          <div style={{marginBottom:14}}><StatusBadge s={found.status}/></div>
          {found.status===S.PROD
            ?<button className="btn btn-green" style={{width:"100%",justifyContent:"center",fontSize:15}} onClick={markRecv}><i className="ti ti-check"/>Mark as Received at Office</button>
            :<div style={{padding:12,background:"#e1f5ee",borderRadius:10,color:"#0f6e56",fontWeight:600,fontSize:13,textAlign:"center"}}>✓ Already Received – {found.receivedAt}</div>}
        </div>
      )}
    </div>
  );
}

// ── DELIVER ──
function Deliver({orders,updOrder,user,toast2}){
  const [found,setFound]=useState(null);
  const [mid,setMid]=useState("");
  const [pm,setPm]=useState("Cash");
  const [pt,setPt]=useState("full");
  const [partial,setPartial]=useState("");
  const [scanning,setScanning]=useState(false);
  const vidRef=useRef(null);
  const stRef=useRef(null);
  const ivRef=useRef(null);

  const stopCam=useCallback(()=>{
    if(ivRef.current) clearInterval(ivRef.current);
    if(stRef.current) stRef.current.getTracks().forEach(t=>t.stop());
    stRef.current=null;setScanning(false);
  },[]);

  const startCam=async()=>{
    try{
      const st=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
      stRef.current=st;
      if(vidRef.current) vidRef.current.srcObject=st;
      setScanning(true);
      ivRef.current=setInterval(()=>{
        if(!vidRef.current||!window.jsQR) return;
        const cv=document.createElement("canvas");cv.width=vidRef.current.videoWidth;cv.height=vidRef.current.videoHeight;
        const ctx=cv.getContext("2d");ctx.drawImage(vidRef.current,0,0);
        const img=ctx.getImageData(0,0,cv.width,cv.height);
        const code=window.jsQR(img.data,img.width,img.height);
        if(code){const o=orders.find(x=>code.data.includes(x.id));if(o){stopCam();setFound(o);}}
      },300);
    }catch(e){toast2("Camera denied","err");}
  };

  const search=()=>{
    const o=orders.find(x=>x.id.toLowerCase()===mid.toLowerCase().trim()||x.mobile===mid.trim());
    o?setFound(o):toast2("Order not found","err");
  };

  const markDel=()=>{
    if(found.status===S.PROD){toast2("Not yet received at office","err");return;}
    const pendFinal=pt==="full"?0:pt==="partial"?Math.max(0,found.pending-Number(partial)):found.pending;
    updOrder(found.id,{status:S.DELI,pending:pendFinal,payMethod:pm,payAt:now2(),deliveredAt:now2(),deliveredBy:user.name});
    toast2("Delivered & Paid!");
    const updated={...found,status:S.DELI,pending:pendFinal,payMethod:pm,deliveredAt:now2()};
    setTimeout(()=>printInvoice(updated),400);
    setFound(null);setMid("");setPt("full");setPartial("");
  };

  useEffect(()=>()=>stopCam(),[stopCam]);

  return(
    <div style={{maxWidth:500,margin:"0 auto"}}>
      <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"/>
      {!found&&(
        <div className="card">
          <div style={{fontWeight:700,fontSize:15,marginBottom:14}}>Scan to Deliver & Collect Payment</div>
          <div style={{background:"#1a1a1a",borderRadius:13,overflow:"hidden",marginBottom:12,position:"relative",minHeight:200}}>
            <video ref={vidRef} autoPlay playsInline muted style={{width:"100%",display:"block",maxHeight:250,objectFit:"cover"}}/>
            {!scanning&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:8}}>
              <i className="ti ti-qrcode" style={{fontSize:44,color:"#444"}}/>
              <div style={{color:"#666",fontSize:13}}>Camera not active</div>
            </div>}
          </div>
          <div style={{marginBottom:14}}>
            {!scanning
              ?<button className="btn btn-red" style={{width:"100%",justifyContent:"center"}} onClick={startCam}><i className="ti ti-camera"/>Start Camera</button>
              :<button className="btn btn-outline" style={{width:"100%",justifyContent:"center"}} onClick={stopCam}><i className="ti ti-player-stop"/>Stop</button>}
          </div>
          <div style={{display:"flex",gap:8}}>
            <input className="inp" value={mid} onChange={e=>setMid(e.target.value)} placeholder="Order ID or Mobile" onKeyDown={e=>e.key==="Enter"&&search()}/>
            <button className="btn btn-red" onClick={search}><i className="ti ti-search"/></button>
          </div>
        </div>
      )}
      {found&&(
        <div className="card">
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
            <div style={{fontWeight:700,fontSize:16}}>Payment & Delivery</div>
            <button onClick={()=>setFound(null)} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:"#bbb"}}><i className="ti ti-x"/></button>
          </div>
          <div style={{background:"#fafaf8",borderRadius:12,padding:13,marginBottom:13}}>
            <div style={{fontWeight:700,color:"#cc0000",fontSize:12,marginBottom:3}}>{found.id}</div>
            <div style={{fontWeight:700,fontSize:14}}>{found.customer} · {found.mobile}</div>
            <div style={{fontSize:12,color:"#777",marginTop:2}}>{found.product} · {found.wood} · {found.size} · Qty {found.qty}</div>
          </div>
          <div style={{background:"#fff8f8",border:"1px solid #ffe0e0",borderRadius:12,padding:13,marginBottom:13}}>
            <div style={{fontSize:12,fontWeight:700,color:"#cc0000",marginBottom:8}}>Payment Summary</div>
            {[["Total Amount",fmtM(found.total)],["Advance Paid",fmtM(found.advance)],["Pending Amount",fmtM(found.pending)]].map(([k,v])=>(
              <div key={k} style={{display:"flex",justifyContent:"space-between",fontSize:13,padding:"4px 0",borderBottom:"1px solid #ffe0e0"}}>
                <span style={{color:"#aaa"}}>{k}</span><b style={{color:k==="Pending Amount"?"#cc0000":"#1a1a1a"}}>{v}</b>
              </div>
            ))}
          </div>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:11.5,fontWeight:600,color:"#777",marginBottom:7}}>Payment Status</div>
            <div style={{display:"flex",gap:8}}>
              {[["full","Paid"],["partial","Partial"],["pending","Pending"]].map(([k,l])=>(
                <button key={k} className="btn" onClick={()=>setPt(k)} style={{flex:1,justifyContent:"center",background:pt===k?"#cc0000":"#fff",color:pt===k?"#fff":"#555",border:`1.5px solid ${pt===k?"#cc0000":"#ddd"}`}}>{l}</button>
              ))}
            </div>
          </div>
          {pt==="partial"&&(
            <div style={{marginBottom:12}}>
              <label style={{fontSize:11.5,fontWeight:600,color:"#777",display:"block",marginBottom:4}}>Amount Collected (₹)</label>
              <input type="number" className="inp" value={partial} onChange={e=>setPartial(e.target.value)} placeholder="Enter amount received"/>
            </div>
          )}
          <div style={{marginBottom:16}}>
            <div style={{fontSize:11.5,fontWeight:600,color:"#777",marginBottom:7}}>Payment Method</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {PAY_M.map(m=>(
                <button key={m} className="btn" onClick={()=>setPm(m)} style={{background:pm===m?"#1a1a1a":"#fff",color:pm===m?"#fff":"#555",border:`1.5px solid ${pm===m?"#1a1a1a":"#ddd"}`}}>{m}</button>
              ))}
            </div>
          </div>
          {found.status===S.DELI
            ?<div style={{padding:12,background:"#e1f5ee",borderRadius:10,color:"#0f6e56",fontWeight:600,textAlign:"center",fontSize:13}}>✓ Already Delivered & Paid</div>
            :<button className="btn btn-red" style={{width:"100%",justifyContent:"center",fontSize:15}} onClick={markDel}><i className="ti ti-truck-delivery"/>Mark Delivered & Print Invoice</button>}
        </div>
      )}
    </div>
  );
}

// ── REPORTS ──
function Reports({orders}){
  const [tab,setTab]=useState("daily");
  const deli=orders.filter(o=>o.status===S.DELI);
  const pend=orders.filter(o=>o.status!==S.DELI&&o.pending>0);
  const tabs=[["daily","Daily Sales"],["pending","Pending Payments"],["delivered","Delivered"],["customers","Customer History"]];
  const TRow=({o,cols})=>{
    const fv=(k,v)=>{
      if(["total","advance","pending"].includes(k)) return fmtM(v);
      if(k==="status") return <StatusBadge s={v}/>;
      return v||"—";
    };
    return<tr style={{borderBottom:"1px solid #fafaf8"}}>{cols.map(c=><td key={c} style={{padding:"9px 10px",fontSize:12.5,color:c==="id"?"#cc0000":c==="pending"&&o.pending>0?"#cc0000":"#333",fontWeight:c==="id"?"700":"400"}}>{fv(c,o[c])}</td>)}</tr>;
  };
  const labels={id:"Order ID",customer:"Customer",mobile:"Mobile",product:"Product",wood:"Wood",qty:"Qty",total:"Total",advance:"Advance",pending:"Pending",status:"Status",payMethod:"Payment",deliveredAt:"Delivered",deliveredBy:"By"};
  const Table=({rows,cols})=>rows.length===0
    ?<div style={{textAlign:"center",padding:40,color:"#bbb",background:"#fff",borderRadius:14}}>No records</div>
    :<div style={{background:"#fff",borderRadius:14,border:"1px solid #eeebe6",overflow:"hidden"}}><div style={{overflowX:"auto"}}>
      <table style={{width:"100%",borderCollapse:"collapse"}}>
        <thead><tr style={{background:"#fafaf8"}}>{cols.map(c=><th key={c} style={{padding:"9px 10px",textAlign:"left",fontWeight:600,color:"#bbb",fontSize:11,borderBottom:"1px solid #eeebe6"}}>{labels[c]||c}</th>)}</tr></thead>
        <tbody>{rows.map(o=><TRow key={o.id} o={o} cols={cols}/>)}</tbody>
      </table></div></div>;
  return(
    <div>
      <div style={{display:"flex",gap:8,marginBottom:18,flexWrap:"wrap"}}>
        {tabs.map(([k,l])=>(
          <button key={k} className="btn" onClick={()=>setTab(k)} style={{background:tab===k?"#cc0000":"#fff",color:tab===k?"#fff":"#555",border:`1.5px solid ${tab===k?"#cc0000":"#ddd"}`}}>{l}</button>
        ))}
      </div>
      {tab==="daily"&&(
        <div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:12,marginBottom:18}}>
            {[["Total Revenue",fmtM(deli.reduce((a,o)=>a+o.total,0)),"#1d9e75"],["Orders Delivered",deli.length,"#185fa5"],["Avg Order",fmtM(deli.length?Math.round(deli.reduce((a,o)=>a+o.total,0)/deli.length):0),"#854f0b"]].map(([l,v,c])=>(
              <div key={l} className="card" style={{padding:"14px 16px"}}><div style={{fontSize:10.5,color:"#bbb",marginBottom:5}}>{l}</div><div style={{fontSize:22,fontWeight:700,color:c}}>{v}</div></div>
            ))}
          </div>
          <Table rows={deli} cols={["id","customer","product","qty","total","payMethod","deliveredAt"]}/>
        </div>
      )}
      {tab==="pending"&&(
        <div>
          <div style={{background:"#fff8f8",border:"1px solid #ffe0e0",borderRadius:12,padding:"11px 16px",marginBottom:14,fontWeight:700,color:"#cc0000",fontSize:14}}>
            Total Pending: {fmtM(pend.reduce((a,o)=>a+o.pending,0))}
          </div>
          <Table rows={pend} cols={["id","customer","mobile","total","advance","pending","status"]}/>
        </div>
      )}
      {tab==="delivered"&&<Table rows={deli} cols={["id","customer","product","wood","qty","total","deliveredAt","deliveredBy"]}/>}
      {tab==="customers"&&(
        <div style={{display:"flex",flexDirection:"column",gap:9}}>
          {[...new Set(orders.map(o=>o.mobile))].map(mob=>{
            const co=orders.filter(o=>o.mobile===mob);const c=co[0];
            return(
              <div key={mob} className="card" style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8,padding:"13px 16px"}}>
                <div><div style={{fontWeight:700,fontSize:14}}>{c.customer}</div><div style={{fontSize:12,color:"#999"}}>{c.mobile}</div></div>
                <div style={{textAlign:"right"}}><div style={{fontWeight:700}}>{co.length} orders</div><div style={{fontSize:12,color:"#1d9e75",fontWeight:600}}>{fmtM(co.reduce((a,o)=>a+o.total,0))} total</div></div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
