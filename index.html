// ── REPORTS ──
function Reports({orders}){
  const [tab,setTab]=useState("daily");
  const [dateSel,setDateSel]=useState(todayKey());
  const [custQ,setCustQ]=useState("");
  const [cashTally,setCashTally]=useState("");

  const deli=orders.filter(o=>o.status===S.DELI);
  const pend=orders.filter(o=>o.status!==S.DELI&&o.pending>0);
  const rated=orders.filter(o=>o.customerRating);
  const tabs=[["daily","Daily Sales"],["monthly","Monthly Reports"],["design","Design Revenue"],["wholesale","Wholesale"],["pending","Pending"],["delivered","Delivered"],["customers","Customers"],["feedback","Feedback"]];
  const labels={orderNum:"Order #",factoryOrder:"Factory",id:"Order ID",customer:"Customer",mobile:"Mobile",product:"Product",wood:"Wood",size:"Size",qty:"Qty",total:"Total",designType:"Design Type",designCost:"Design Cost",advance:"Advance",pending:"Pending",status:"Status",payMethod:"Payment",created:"Order Date & Time",deliveryCollectionLocation:"Collection Location",deliveredAt:"Delivered",deliveredLocation:"Location"};
  const fv=(k,v,o={})=>{
    if(k==="orderNum") return v?displayOrderNum(o,orders):"—";
    if(k==="factoryOrder") return isFactoryOrder(o)?"F":"—";
    if(k==="deliveryCollectionLocation") return collectionLocationOf(o);
    if(k==="created") return orderDateTime({created:v}).label;
    if(k==="total") return fmtM(orderTotalOf(o));
    if(k==="designType") return o.needsDesign?(v||"—"):"—";
    if(k==="designCost") return o.needsDesign?fmtM(designCostOf(o)):"—";
    if(["advance","pending"].includes(k)) return fmtM(v);
    if(k==="status") return <StatusBadge s={v}/>;
    return v||"—";
  };
  const Table=({rows,cols})=>rows.length===0
    ?<div style={{textAlign:"center",padding:40,color:"#bbb",background:"#fff",borderRadius:14}}>No records</div>
    :<div style={{background:"#fff",borderRadius:14,border:"1px solid #eeebe6",overflow:"hidden"}}><div style={{overflowX:"auto"}}>
      <table style={{width:"100%",borderCollapse:"collapse"}}>
        <thead><tr style={{background:"#fafaf8"}}>{cols.map(c=><th key={c} style={{padding:"9px 10px",textAlign:"left",fontWeight:600,color:"#bbb",fontSize:11,borderBottom:"1px solid #eeebe6"}}>{labels[c]||c}</th>)}</tr></thead>
        <tbody>{rows.map(o=><tr key={o.id} style={{borderBottom:"1px solid #fafaf8"}}>{cols.map(c=><td key={c} className={c==="size"?"size-strong-sm":""} style={{padding:"9px 10px",fontSize:c==="size"?14:12.5,fontWeight:c==="size"?900:c==="orderNum"?700:400,color:c==="orderNum"?"#cc0000":c==="id"?"#888":c==="pending"&&o.pending>0?"#cc0000":c==="size"?"#111":"#333"}}>{fv(c,o[c],o)}</td>)}</tr>)}</tbody>
      </table></div></div>;

  // ── DAILY TAB ──
  const dayDeli=deli.filter(o=>{const p=parseLocaleDate(o.deliveredAt);return p&&p.dateKey===dateSel;});
  const dayPlaced=orders.filter(o=>{const p=parseLocaleDate(o.created);return p&&p.dateKey===dateSel;}); // all orders placed on this day
  // Daily Sales Revenue = total worth of every order PLACED this day (product + design, regardless of delivery/payment status),
  // so it already includes outstanding balances and advance received — not just money actually collected.
  const dayRevenue=dayPlaced.reduce((a,o)=>a+orderTotalOf(o),0);
  const cashOrders=dayDeli.filter(o=>o.payMethod==="Cash");
  const upiOrders=dayDeli.filter(o=>o.payMethod==="UPI");
  const otherOrders=dayDeli.filter(o=>o.payMethod&&o.payMethod!=="Cash"&&o.payMethod!=="UPI");
  const cashTotal=cashOrders.reduce((a,o)=>a+orderTotalOf(o),0);
  const upiTotal=upiOrders.reduce((a,o)=>a+orderTotalOf(o),0);
  const atOffice=dayDeli.filter(o=>o.deliveredLocation==="At Office").length;
  const atProduction=dayDeli.filter(o=>o.deliveredLocation==="At Production").length;

  // Advance cash received on this day (orders created today with Cash advance)
  const dayAdvOrders=orders.filter(o=>{const p=parseLocaleDate(o.created);return p&&p.dateKey===dateSel&&Number(o.advance)>0;});
  const dayAdvCash=dayAdvOrders.filter(o=>!o.advPayMethod||o.advPayMethod==="Cash").reduce((a,o)=>a+Number(o.advance),0);
  const dayAdvUPI=dayAdvOrders.filter(o=>o.advPayMethod==="UPI").reduce((a,o)=>a+Number(o.advance),0);
  // Total cash in hand = final cash payments + advance cash received today
  const totalCashInHand=cashTotal+dayAdvCash;

  // Outstanding amount for this day (orders placed on this day that still have a pending balance)
  const dayOutstandingOrders=dayPlaced.filter(o=>o.pending>0);
  const dayOutstanding=dayOutstandingOrders.reduce((a,o)=>a+Number(o.pending),0);

  // ── Cash Tally (per-date, stored in localStorage) ──
  useEffect(()=>{
    try{
      const raw=localStorage.getItem("hsm_cash_tally_"+dateSel);
      setCashTally(raw!==null?raw:"");
    }catch(e){setCashTally("");}
  },[dateSel]);
  const saveCashTally=v=>{
    setCashTally(v);
    try{localStorage.setItem("hsm_cash_tally_"+dateSel,v);}catch(e){}
  };
  const tallyEntered=cashTally!==""&&!isNaN(Number(cashTally));
  const diff=tallyEntered?Number(cashTally)-totalCashInHand:0;

  // ── MONTHLY TAB — includes both orders placed AND delivered, plus advance cash ──
  const placedMonthMap={};
  orders.forEach(o=>{
    const p=parseLocaleDate(o.created);
    if(!p) return;
    if(!placedMonthMap[p.monthKey]) placedMonthMap[p.monthKey]={label:p.monthLabel,count:0,value:0};
    placedMonthMap[p.monthKey].count++;
    placedMonthMap[p.monthKey].value+=orderTotalOf(o);
  });

  const monthMap={};
  const getMonthEntry=key=>{
    if(!monthMap[key]) monthMap[key]={label:"",orders:[],placedCount:0,revenue:0,cashCount:0,cashTotal:0,upiCount:0,upiTotal:0,office:0,production:0,advCash:0,advUPI:0,outstanding:0};
    return monthMap[key];
  };
  // Seed every month from orders PLACED that month — this is the source of "Monthly Revenue": the
  // total worth of every order created that month (product + design), which already includes
  // outstanding balances and advance received, regardless of whether it's been delivered/paid yet.
  // This also ensures a month shows up here even before any of its orders have been delivered.
  orders.forEach(o=>{
    const p=parseLocaleDate(o.created);
    if(!p) return;
    const m=getMonthEntry(p.monthKey);
    m.label=p.monthLabel;
    m.placedCount++;
    m.revenue+=orderTotalOf(o);
    if(Number(o.pending)>0) m.outstanding+=Number(o.pending)||0;
    if(Number(o.advance)>0){
      if(o.advPayMethod==="UPI") m.advUPI+=Number(o.advance)||0;
      else m.advCash+=Number(o.advance)||0; // default/Cash
    }
  });
  // Overlay delivery-specific stats (final payment method breakdown, delivery location counts),
  // grouped by the month the order was actually delivered in.
  deli.forEach(o=>{
    const p=parseLocaleDate(o.deliveredAt);
    if(!p) return;
    const m=getMonthEntry(p.monthKey);
    m.label=m.label||p.monthLabel;
    m.orders.push(o);
    if(o.payMethod==="Cash"){m.cashCount++;m.cashTotal+=orderTotalOf(o);}
    if(o.payMethod==="UPI"){m.upiCount++;m.upiTotal+=orderTotalOf(o);}
    if(o.deliveredLocation==="At Office")m.office++;
    if(o.deliveredLocation==="At Production")m.production++;
  });
  const months=Object.entries(monthMap).sort((a,b)=>b[0].localeCompare(a[0]));

  // Month-over-month trend for placed orders
  const placedMonths=Object.entries(placedMonthMap).sort((a,b)=>b[0].localeCompare(a[0]));
  const thisMPlaced=placedMonths[0]?placedMonths[0][1]:{count:0,value:0};
  const lastMPlaced=placedMonths[1]?placedMonths[1][1]:{count:0,value:0};
  const trendPct=lastMPlaced.count>0?Math.round(((thisMPlaced.count-lastMPlaced.count)/lastMPlaced.count)*100):null;
  const custFiltered=[...new Set(orders.map(o=>o.mobile))]
    .map(mob=>orders.filter(o=>o.mobile===mob))
    .filter(co=>!custQ||co[0].customer.toLowerCase().includes(custQ.toLowerCase().trim()));

  return(
    <div>
      <div style={{display:"flex",gap:8,marginBottom:18,flexWrap:"wrap"}}>
        {tabs.map(([k,l])=>(<button key={k} className="btn" onClick={()=>setTab(k)} style={{background:tab===k?"#cc0000":"#fff",color:tab===k?"#fff":"#555",border:`1.5px solid ${tab===k?"#cc0000":"#ddd"}`}}>{l}</button>))}
      </div>

      {tab==="daily"&&(
        <div>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,flexWrap:"wrap"}}>
            <label style={{fontSize:12.5,fontWeight:600,color:"#777"}}>Date:</label>
            <input type="date" className="inp" style={{width:"auto"}} value={dateSel} onChange={e=>setDateSel(e.target.value)}/>
            {dateSel===todayKey()&&<span style={{fontSize:11,color:"#1d9e75",fontWeight:600}}>● Today</span>}
          </div>

          {/* Orders summary row */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
            <div className="card" style={{padding:"14px 16px",background:"linear-gradient(135deg,#cc0000,#8b0000)",border:"none"}}>
              <div style={{fontSize:10.5,color:"rgba(255,255,255,.7)",marginBottom:4,fontWeight:600,textTransform:"uppercase",letterSpacing:.4}}>Orders Placed</div>
              <div style={{fontSize:32,fontWeight:900,color:"#fff"}}>{dayPlaced.length}</div>
              <div style={{fontSize:11.5,color:"rgba(255,255,255,.7)",marginTop:2}}>new orders on this day</div>
            </div>
            <div className="card" style={{padding:"14px 16px"}}>
              <div style={{fontSize:10.5,color:"#bbb",marginBottom:4,fontWeight:600,textTransform:"uppercase",letterSpacing:.4}}>Orders Delivered</div>
              <div style={{fontSize:32,fontWeight:900,color:"#0f6e56"}}>{dayDeli.length}</div>
              <div style={{fontSize:11.5,color:"#bbb",marginTop:2}}>completed this day</div>
            </div>
          </div>

          {/* Daily Sales Revenue — prominent — total worth of orders placed this day, incl. outstanding & advance */}
          <div className="card" style={{marginBottom:16,background:"linear-gradient(135deg,#1d9e75,#0f6e56)",border:"none"}}>
            <div style={{fontSize:11,color:"#d8f5ea",marginBottom:4,fontWeight:600,textTransform:"uppercase",letterSpacing:.5}}>Daily Sales Revenue (Order Value)</div>
            <div style={{fontSize:34,fontWeight:900,color:"#fff"}}>{fmtM(dayRevenue)}</div>
            <div style={{fontSize:12,color:"#d8f5ea",marginTop:4}}>{dayPlaced.length} order{dayPlaced.length===1?"":"s"} placed · {dayDeli.length} delivered · total worth incl. outstanding & advance</div>
          </div>

          {/* Outstanding Amount for this day */}
          <div className="card" style={{marginBottom:16,background:"linear-gradient(135deg,#e6482e,#cc0000)",border:"none"}}>
            <div style={{fontSize:11,color:"#ffe0da",marginBottom:4,fontWeight:600,textTransform:"uppercase",letterSpacing:.5}}>Outstanding Amount</div>
            <div style={{fontSize:34,fontWeight:900,color:"#fff"}}>{fmtM(dayOutstanding)}</div>
            <div style={{fontSize:12,color:"#ffe0da",marginTop:4}}>{dayOutstandingOrders.length} order{dayOutstandingOrders.length===1?"":"s"} still pending from this day</div>
          </div>

          {/* Payment Method Breakdown */}
          <div style={{fontSize:12,fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Payment Method Breakdown</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:12,marginBottom:18}}>
            <div className="card" style={{padding:"14px 16px"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                <div style={{width:32,height:32,borderRadius:9,background:"#e1f5ee",display:"flex",alignItems:"center",justifyContent:"center"}}><i className="ti ti-cash" style={{color:"#1d9e75",fontSize:16}}/></div>
                <div style={{fontSize:11,color:"#999",fontWeight:600}}>Cash</div>
              </div>
              <div style={{fontSize:22,fontWeight:700,color:"#1d9e75"}}>{fmtM(cashTotal)}</div>
              <div style={{fontSize:11.5,color:"#bbb",marginTop:2}}>{cashOrders.length} order{cashOrders.length===1?"":"s"}</div>
            </div>
            <div className="card" style={{padding:"14px 16px"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                <div style={{width:32,height:32,borderRadius:9,background:"#e6f1fb",display:"flex",alignItems:"center",justifyContent:"center"}}><i className="ti ti-qrcode" style={{color:"#185fa5",fontSize:16}}/></div>
                <div style={{fontSize:11,color:"#999",fontWeight:600}}>UPI</div>
              </div>
              <div style={{fontSize:22,fontWeight:700,color:"#185fa5"}}>{fmtM(upiTotal)}</div>
              <div style={{fontSize:11.5,color:"#bbb",marginTop:2}}>{upiOrders.length} order{upiOrders.length===1?"":"s"}</div>
            </div>
            {otherOrders.length>0&&<div className="card" style={{padding:"14px 16px"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                <div style={{width:32,height:32,borderRadius:9,background:"#faeeda",display:"flex",alignItems:"center",justifyContent:"center"}}><i className="ti ti-building-bank" style={{color:"#854f0b",fontSize:16}}/></div>
                <div style={{fontSize:11,color:"#999",fontWeight:600}}>Other</div>
              </div>
              <div style={{fontSize:22,fontWeight:700,color:"#854f0b"}}>{fmtM(otherOrders.reduce((a,o)=>a+orderTotalOf(o),0))}</div>
              <div style={{fontSize:11.5,color:"#bbb",marginTop:2}}>{otherOrders.length} order{otherOrders.length===1?"":"s"}</div>
            </div>}
          </div>

          {/* Location Breakdown */}
          <div style={{fontSize:12,fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Delivery Location</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:12,marginBottom:18}}>
            <div className="card" style={{padding:"14px 16px"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                <div style={{width:32,height:32,borderRadius:9,background:"#e1f5ee",display:"flex",alignItems:"center",justifyContent:"center"}}><i className="ti ti-building-store" style={{color:"#0f6e56",fontSize:16}}/></div>
                <div style={{fontSize:11,color:"#999",fontWeight:600}}>At Office</div>
              </div>
              <div style={{fontSize:22,fontWeight:700,color:"#0f6e56"}}>{atOffice}</div>
            </div>
            <div className="card" style={{padding:"14px 16px"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                <div style={{width:32,height:32,borderRadius:9,background:"#faeeda",display:"flex",alignItems:"center",justifyContent:"center"}}><i className="ti ti-tool" style={{color:"#854f0b",fontSize:16}}/></div>
                <div style={{fontSize:11,color:"#999",fontWeight:600}}>At Production</div>
              </div>
              <div style={{fontSize:22,fontWeight:700,color:"#854f0b"}}>{atProduction}</div>
            </div>
          </div>

          {/* Cash Tally Check */}
          <div style={{fontSize:12,fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Cash Tally Check</div>
          <div className="card" style={{marginBottom:18}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
              <div>
                <div style={{fontSize:10.5,color:"#bbb",marginBottom:6}}>System Cash (calculated)</div>
                <div style={{fontSize:20,fontWeight:700,color:"#1a1a1a"}}>{fmtM(totalCashInHand)}</div>
                <div style={{marginTop:8,display:"flex",flexDirection:"column",gap:4}}>
                  <div style={{fontSize:11.5,color:"#555"}}>
                    <span style={{color:"#bbb"}}>Final payments: </span>
                    <b>{fmtM(cashTotal)}</b>
                    <span style={{color:"#bbb",fontSize:10.5}}> ({cashOrders.length} orders)</span>
                  </div>
                  {dayAdvCash>0&&<div style={{fontSize:11.5,color:"#555"}}>
                    <span style={{color:"#bbb"}}>Advances received: </span>
                    <b>{fmtM(dayAdvCash)}</b>
                    <span style={{color:"#bbb",fontSize:10.5}}> ({dayAdvOrders.filter(o=>!o.advPayMethod||o.advPayMethod==="Cash").length} orders)</span>
                  </div>}
                  {dayAdvUPI>0&&<div style={{fontSize:11,color:"#185fa5"}}>+ UPI advances: {fmtM(dayAdvUPI)}</div>}
                </div>
              </div>
              <div>
                <label style={{fontSize:11.5,fontWeight:600,color:"#777",display:"block",marginBottom:4}}>Physical Cash Counted (₹)</label>
                <input type="number" className="inp" value={cashTally} onChange={e=>saveCashTally(e.target.value)} placeholder="Enter actual cash in drawer"/>
              </div>
            </div>
            {tallyEntered&&(
              diff===0
                ?<div style={{padding:"10px 14px",background:"#e1f5ee",borderRadius:10,color:"#0f6e56",fontWeight:700,fontSize:13,textAlign:"center"}}>
                    <i className="ti ti-check" style={{marginRight:6}}/>Cash matches exactly — no discrepancy
                  </div>
                :<div style={{padding:"10px 14px",background:diff>0?"#fff3e0":"#fff0f0",border:`1.5px solid ${diff>0?"#ffb74d":"#ffcccc"}`,borderRadius:10,color:diff>0?"#a35a00":"#cc0000",fontWeight:700,fontSize:13,textAlign:"center"}}>
                    <i className="ti ti-alert-triangle" style={{marginRight:6}}/>
                    {diff>0?`Surplus of ${fmtM(diff)} — drawer has more cash than expected`:`Shortage of ${fmtM(Math.abs(diff))} — drawer is short by ${fmtM(Math.abs(diff))}`}
                  </div>
            )}
          </div>

          <Table rows={dayDeli} cols={["orderNum","factoryOrder","created","id","customer","product","size","qty","designType","designCost","total","payMethod","deliveryCollectionLocation","deliveredLocation","deliveredAt"]}/>
        </div>
      )}

      {tab==="monthly"&&(
        <div>
          {/* Orders Placed Trend */}
          <div style={{fontSize:12,fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Orders Placed — Month over Month</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:12,marginBottom:18}}>
            {placedMonths.slice(0,3).map(([key,m],i)=>(
              <div key={key} className="card" style={{padding:"14px 16px",border:i===0?"2px solid #cc0000":"1px solid #eeebe6"}}>
                <div style={{fontSize:10.5,color:i===0?"#cc0000":"#bbb",fontWeight:600,marginBottom:5}}>{m.label}{i===0?" (current)":""}</div>
                <div style={{fontSize:24,fontWeight:700,color:"#1a1a1a"}}>{m.count}</div>
                <div style={{fontSize:11.5,color:"#777",marginTop:2}}>orders placed</div>
                <div style={{fontSize:12,color:"#1d9e75",fontWeight:600}}>{fmtM(m.value)} value</div>
              </div>
            ))}
            {trendPct!==null&&<div className="card" style={{padding:"14px 16px",display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center"}}>
              <div style={{fontSize:28,fontWeight:900,color:trendPct>=0?"#1d9e75":"#cc0000"}}>{trendPct>=0?"+":""}{trendPct}%</div>
              <div style={{fontSize:11,color:"#bbb",textAlign:"center",marginTop:4}}>vs last month</div>
            </div>}
          </div>

          {/* Monthly Revenue breakdown — total worth of orders PLACED each month, incl. outstanding & advance */}
          <div style={{fontSize:12,fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Monthly Revenue (Orders Placed — Total Order Value)</div>
          {months.length===0&&<div style={{textAlign:"center",padding:40,color:"#bbb",background:"#fff",borderRadius:14}}>No orders yet</div>}
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            {months.map(([key,m])=>(
              <div key={key} className="card">
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2,flexWrap:"wrap",gap:8}}>
                  <div style={{fontWeight:700,fontSize:16}}>{m.label}</div>
                  <div style={{fontSize:22,fontWeight:900,color:"#1d9e75"}}>{fmtM(m.revenue)}</div>
                </div>
                <div style={{fontSize:10.5,color:"#bbb",marginBottom:12}}>{m.placedCount} order{m.placedCount===1?"":"s"} placed · total worth incl. outstanding & advance received</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:10,marginBottom:12}}>
                  {[
                    ["Orders Placed",m.placedCount,"#cc0000","ti-clipboard-list"],
                    ["Orders Delivered",m.orders.length,"#185fa5","ti-circle-check"],
                    ["Cash (Final)",`${m.cashCount} · ${fmtM(m.cashTotal)}`,"#1d9e75","ti-cash"],
                    ["UPI (Final)",`${m.upiCount} · ${fmtM(m.upiTotal)}`,"#185fa5","ti-qrcode"],
                    ["At Office",m.office,"#0f6e56","ti-building-store"],
                    ["At Production",m.production,"#854f0b","ti-tool"],
                    ["Outstanding",fmtM(m.outstanding),"#cc0000","ti-alert-circle"],
                  ].map(([l,v,c,icon])=>(
                    <div key={l} style={{background:"#fafaf8",borderRadius:10,padding:"10px 12px"}}>
                      <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:3}}><i className={`ti ${icon}`} style={{color:c,fontSize:12}}/><div style={{fontSize:10,color:"#bbb"}}>{l}</div></div>
                      <div style={{fontWeight:700,fontSize:13,color:c}}>{v}</div>
                    </div>
                  ))}
                </div>
                {/* Advance cash collected this month */}
                {(m.advCash>0||m.advUPI>0)&&<div style={{background:"#fafaf8",borderRadius:10,padding:"10px 14px",fontSize:12}}>
                  <div style={{fontWeight:600,color:"#888",marginBottom:6,fontSize:11,textTransform:"uppercase",letterSpacing:.3}}>Advance Payments Received</div>
                  <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
                    {m.advCash>0&&<div><span style={{color:"#bbb"}}>Cash Advance: </span><b style={{color:"#1d9e75"}}>{fmtM(m.advCash)}</b></div>}
                    {m.advUPI>0&&<div><span style={{color:"#bbb"}}>UPI Advance: </span><b style={{color:"#185fa5"}}>{fmtM(m.advUPI)}</b></div>}
                    <div><span style={{color:"#bbb"}}>Total: </span><b>{fmtM(m.advCash+m.advUPI)}</b></div>
                  </div>
                </div>}
              </div>
            ))}
          </div>
        </div>
      )}

      {tab==="pending"&&(
        <div>
          <div style={{background:"#fff8f8",border:"1px solid #ffe0e0",borderRadius:12,padding:"11px 16px",marginBottom:14,fontWeight:700,color:"#cc0000",fontSize:14}}>
            Total Pending: {fmtM(pend.reduce((a,o)=>a+o.pending,0))}
          </div>
          <Table rows={pend} cols={["orderNum","factoryOrder","created","id","customer","mobile","size","deliveryCollectionLocation","designType","designCost","total","advance","pending","status"]}/>
        </div>
      )}

      {tab==="delivered"&&<Table rows={deli} cols={["orderNum","factoryOrder","created","id","customer","product","wood","size","qty","deliveryCollectionLocation","designType","designCost","total","payMethod","deliveredLocation","deliveredAt"]}/>}

      {tab==="customers"&&(
        <CustomerTab orders={orders} custQ={custQ} setCustQ={setCustQ}/>
      )}

      {tab==="design"&&(
        <DesignRevenueTab orders={orders}/>
      )}

      {tab==="wholesale"&&(
        <WholesaleReportTab orders={orders}/>
      )}

      {tab==="feedback"&&(
        <FeedbackTab orders={orders} rated={rated}/>
      )}
    </div>
  );
}

// ── DESIGN REVENUE TAB (Reports) ──
function DesignRevenueTab({orders}){
  const [range,setRange]=useState("today");
  const [dateFrom,setDateFrom]=useState(todayKey());
  const [dateTo,setDateTo]=useState(todayKey());

  const designOrders=orders.filter(o=>o.needsDesign&&designCostOf(o)>0);

  // Filter helper
  const inRange=o=>{
    const p=parseLocaleDate(o.created);
    if(!p) return false;
    const dk=p.dateKey;
    const today=todayKey();
    const d=new Date();
    if(range==="today") return dk===today;
    if(range==="yesterday"){const y=new Date(d);y.setDate(d.getDate()-1);return dk===`${y.getFullYear()}-${String(y.getMonth()+1).padStart(2,"0")}-${String(y.getDate()).padStart(2,"0")}`;}
    if(range==="week"){const w=new Date(d);w.setDate(d.getDate()-6);return dk>=`${w.getFullYear()}-${String(w.getMonth()+1).padStart(2,"0")}-${String(w.getDate()).padStart(2,"0")}`&&dk<=today;}
    if(range==="month"){return p.monthKey===today.slice(0,7);}
    if(range==="custom") return dk>=dateFrom&&dk<=dateTo;
    return true;
  };
  const filtered=designOrders.filter(inRange);
  const totalRev=filtered.reduce((a,o)=>a+designCostOf(o),0);

  // Group by type
  const byType={};
  filtered.forEach(o=>{const t=o.designType||"Design";if(!byType[t])byType[t]={count:0,total:0};byType[t].count++;byType[t].total+=designCostOf(o);});

  // Group by day for chart
  const byDay={};
  filtered.forEach(o=>{const p=parseLocaleDate(o.created);if(!p)return;if(!byDay[p.dateKey])byDay[p.dateKey]={label:new Date(p.y,p.m-1,p.d).toLocaleDateString("en-IN",{day:"numeric",month:"short"}),total:0,count:0};byDay[p.dateKey].total+=designCostOf(o);byDay[p.dateKey].count++;});
  const days=Object.entries(byDay).sort((a,b)=>a[0].localeCompare(b[0]));

  const RANGE_BTNS=[["today","Today"],["yesterday","Yesterday"],["week","This Week"],["month","This Month"],["custom","Custom"]];

  return(
    <div>
      {/* Range selector */}
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
        {RANGE_BTNS.map(([k,l])=>(
          <button key={k} className="btn" style={{background:range===k?"#a35a00":"#fff",color:range===k?"#fff":"#555",border:`1.5px solid ${range===k?"#a35a00":"#ddd"}`,fontSize:12}} onClick={()=>setRange(k)}>{l}</button>
        ))}
      </div>
      {range==="custom"&&(
        <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:16,flexWrap:"wrap"}}>
          <input type="date" className="inp" style={{width:"auto"}} value={dateFrom} onChange={e=>setDateFrom(e.target.value)}/>
          <span style={{color:"#bbb"}}>to</span>
          <input type="date" className="inp" style={{width:"auto"}} value={dateTo} onChange={e=>setDateTo(e.target.value)}/>
        </div>
      )}

      {/* Summary cards */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:12,marginBottom:20}}>
        <div className="card" style={{padding:"14px 16px",background:"linear-gradient(135deg,#a35a00,#cc7a00)",border:"none"}}>
          <div style={{fontSize:10.5,color:"rgba(255,255,255,.75)",marginBottom:5,fontWeight:600}}>Design Revenue</div>
          <div style={{fontSize:26,fontWeight:900,color:"#fff"}}>{fmtM(totalRev)}</div>
        </div>
        <div className="card" style={{padding:"14px 16px"}}>
          <div style={{fontSize:10.5,color:"#bbb",marginBottom:5}}>Design Orders</div>
          <div style={{fontSize:26,fontWeight:700,color:"#a35a00"}}>{filtered.length}</div>
        </div>
        {Object.entries(byType).map(([t,d])=>(
          <div key={t} className="card" style={{padding:"14px 16px"}}>
            <div style={{fontSize:10.5,color:"#bbb",marginBottom:5}}>{t}</div>
            <div style={{fontSize:20,fontWeight:700,color:"#cc6600"}}>{fmtM(d.total)}</div>
            <div style={{fontSize:11,color:"#bbb",marginTop:2}}>{d.count} order{d.count===1?"":"s"}</div>
          </div>
        ))}
      </div>

      {/* Day-by-day breakdown */}
      {days.length>0&&(
        <div className="card" style={{marginBottom:16}}>
          <div style={{fontSize:12,fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:.5,marginBottom:14}}>Day-by-Day Breakdown</div>
          {days.map(([dk,d])=>{
            const pct=totalRev>0?Math.round((d.total/totalRev)*100):0;
            return(
              <div key={dk} style={{marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:12.5,marginBottom:4}}>
                  <span style={{fontWeight:600,color:"#555"}}>{d.label}</span>
                  <span style={{fontWeight:700,color:"#cc6600"}}>{fmtM(d.total)} <span style={{fontSize:11,color:"#bbb"}}>· {d.count} orders</span></span>
                </div>
                <div style={{background:"#f5f0e8",borderRadius:6,height:10,overflow:"hidden"}}>
                  <div style={{width:`${pct}%`,height:"100%",background:"#cc7a00",borderRadius:6,transition:"width .3s"}}/>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Detailed order list */}
      <div style={{fontSize:12,fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Order Details</div>
      {filtered.length===0&&<div style={{textAlign:"center",padding:30,color:"#bbb",background:"#fff",borderRadius:14}}>No design orders for this period</div>}
      <div style={{background:"#fff",borderRadius:14,border:"1px solid #eeebe6",overflow:"hidden"}}>
        {filtered.length>0&&<div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr style={{background:"#fafaf8"}}>
              {["Order #","Customer","Design Type","Design Cost","Total Order","Date"].map(h=><th key={h} style={{padding:"9px 10px",textAlign:"left",fontWeight:600,color:"#bbb",fontSize:11,borderBottom:"1px solid #eeebe6"}}>{h}</th>)}
            </tr></thead>
            <tbody>
              {filtered.map(o=>(
                <tr key={o.id} style={{borderBottom:"1px solid #fafaf8"}}>
                  <td style={{padding:"9px 10px",fontWeight:900,color:"#cc0000"}}>{displayOrderNum(o,orders)}</td>
                  <td style={{padding:"9px 10px",fontWeight:600}}>{o.customer}</td>
                  <td style={{padding:"9px 10px",color:"#a35a00",fontWeight:600}}>{o.designType||"—"}</td>
                  <td style={{padding:"9px 10px",fontWeight:700,color:"#cc6600"}}>{fmtM(designCostOf(o))}</td>
                  <td style={{padding:"9px 10px"}}>{fmtM(orderTotalOf(o))}</td>
                  <td style={{padding:"9px 10px",color:"#bbb",fontSize:11.5}}>{orderDateTime(o).date}</td>
                </tr>
              ))}
              <tr style={{background:"#fff8f0",borderTop:"2px solid #ffd9a0"}}>
                <td colSpan={3} style={{padding:"10px",fontWeight:700,color:"#a35a00"}}>Total</td>
                <td style={{padding:"10px",fontWeight:900,color:"#cc6600",fontSize:15}}>{fmtM(totalRev)}</td>
                <td colSpan={2}/>
              </tr>
            </tbody>
          </table>
        </div>}
      </div>
    </div>
  );
}

// ── WHOLESALE REPORT TAB (Reports) ── Wholesale orders already count in every other report
// (Daily/Monthly totals include them like any order); this tab isolates them for a focused view.
function WholesaleReportTab({orders}){
  const [range,setRange]=useState("month");
  const [dateFrom,setDateFrom]=useState(todayKey());
  const [dateTo,setDateTo]=useState(todayKey());

  const wsOrders=orders.filter(isWholesaleOrder);

  const inRange=o=>{
    const p=parseLocaleDate(o.created);
    if(!p) return false;
    const dk=p.dateKey;
    const today=todayKey();
    const d=new Date();
    if(range==="today") return dk===today;
    if(range==="yesterday"){const y=new Date(d);y.setDate(d.getDate()-1);return dk===`${y.getFullYear()}-${String(y.getMonth()+1).padStart(2,"0")}-${String(y.getDate()).padStart(2,"0")}`;}
    if(range==="week"){const w=new Date(d);w.setDate(d.getDate()-6);return dk>=`${w.getFullYear()}-${String(w.getMonth()+1).padStart(2,"0")}-${String(w.getDate()).padStart(2,"0")}`&&dk<=today;}
    if(range==="month"){return p.monthKey===today.slice(0,7);}
    if(range==="custom") return dk>=dateFrom&&dk<=dateTo;
    return true;
  };
  const filtered=wsOrders.filter(inRange);
  const billable=filtered.filter(o=>!/cancel/i.test(o.status||""));
  const totalRev=billable.reduce((a,o)=>a+orderTotalOf(o),0);
  const totalOutstanding=billable.reduce((a,o)=>a+Number(o.pending||0),0);
  const avgOrder=billable.length?totalRev/billable.length:0;

  // Group by wholesale customer (firm name)
  const byFirm={};
  billable.forEach(o=>{const f=o.customer||"Unknown Firm";if(!byFirm[f])byFirm[f]={count:0,total:0};byFirm[f].count++;byFirm[f].total+=orderTotalOf(o);});
  const firms=Object.entries(byFirm).sort((a,b)=>b[1].total-a[1].total);

  const RANGE_BTNS=[["today","Today"],["yesterday","Yesterday"],["week","This Week"],["month","This Month"],["custom","Custom"]];

  return(
    <div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
        {RANGE_BTNS.map(([k,l])=>(
          <button key={k} className="btn" style={{background:range===k?"#4338ca":"#fff",color:range===k?"#fff":"#555",border:`1.5px solid ${range===k?"#4338ca":"#ddd"}`,fontSize:12}} onClick={()=>setRange(k)}>{l}</button>
        ))}
      </div>
      {range==="custom"&&(
        <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:16,flexWrap:"wrap"}}>
          <input type="date" className="inp" style={{width:"auto"}} value={dateFrom} onChange={e=>setDateFrom(e.target.value)}/>
          <span style={{color:"#bbb"}}>to</span>
          <input type="date" className="inp" style={{width:"auto"}} value={dateTo} onChange={e=>setDateTo(e.target.value)}/>
        </div>
      )}

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:12,marginBottom:20}}>
        <div className="card" style={{padding:"14px 16px",background:"linear-gradient(135deg,#4338ca,#6366f1)",border:"none"}}>
          <div style={{fontSize:10.5,color:"rgba(255,255,255,.75)",marginBottom:5,fontWeight:600}}>Wholesale Revenue</div>
          <div style={{fontSize:26,fontWeight:900,color:"#fff"}}>{fmtM(totalRev)}</div>
        </div>
        <div className="card" style={{padding:"14px 16px"}}>
          <div style={{fontSize:10.5,color:"#bbb",marginBottom:5}}>Wholesale Orders</div>
          <div style={{fontSize:24,fontWeight:700,color:"#1a1a1a"}}>{billable.length}</div>
        </div>
        <div className="card" style={{padding:"14px 16px"}}>
          <div style={{fontSize:10.5,color:"#bbb",marginBottom:5}}>Outstanding</div>
          <div style={{fontSize:24,fontWeight:700,color:totalOutstanding>0?"#cc0000":"#999"}}>{fmtM(totalOutstanding)}</div>
        </div>
        <div className="card" style={{padding:"14px 16px"}}>
          <div style={{fontSize:10.5,color:"#bbb",marginBottom:5}}>Avg Order Value</div>
          <div style={{fontSize:24,fontWeight:700,color:"#1a1a1a"}}>{fmtM(avgOrder)}</div>
        </div>
      </div>

      {firms.length>0&&(
        <div className="card" style={{marginBottom:16}}>
          <div style={{fontSize:12,fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:.5,marginBottom:14}}>By Wholesale Customer</div>
          {firms.map(([f,d])=>{
            const pct=totalRev>0?Math.round((d.total/totalRev)*100):0;
            return(
              <div key={f} style={{marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:12.5,marginBottom:4}}>
                  <span style={{fontWeight:600,color:"#555"}}>{f}</span>
                  <span style={{fontWeight:700,color:"#4338ca"}}>{fmtM(d.total)} <span style={{fontSize:11,color:"#bbb"}}>· {d.count} orders</span></span>
                </div>
                <div style={{background:"#eef2ff",borderRadius:6,height:10,overflow:"hidden"}}>
                  <div style={{width:`${pct}%`,height:"100%",background:"#4338ca",borderRadius:6,transition:"width .3s"}}/>
                </div>
              </div>
            );
          })}
        </div>
      )}

      <div style={{fontSize:12,fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Order Details</div>
      {filtered.length===0&&<div style={{textAlign:"center",padding:30,color:"#bbb",background:"#fff",borderRadius:14}}>No wholesale orders for this period</div>}
      <div style={{background:"#fff",borderRadius:14,border:"1px solid #eeebe6",overflow:"hidden"}}>
        {filtered.length>0&&<div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr style={{background:"#fafaf8"}}>
              {["Order #","Firm","Total","Pending","Status","Date"].map(h=><th key={h} style={{padding:"9px 10px",textAlign:"left",fontWeight:600,color:"#bbb",fontSize:11,borderBottom:"1px solid #eeebe6"}}>{h}</th>)}
            </tr></thead>
            <tbody>
              {filtered.map(o=>(
                <tr key={o.id} style={{borderBottom:"1px solid #fafaf8"}}>
                  <td style={{padding:"9px 10px",fontWeight:900,color:"#cc0000"}}>{displayOrderNum(o,orders)}</td>
                  <td style={{padding:"9px 10px",fontWeight:600}}>{o.customer}</td>
                  <td style={{padding:"9px 10px"}}>{fmtM(orderTotalOf(o))}</td>
                  <td style={{padding:"9px 10px",color:o.pending>0?"#cc0000":"#999",fontWeight:o.pending>0?700:400}}>{fmtM(o.pending)}</td>
                  <td style={{padding:"9px 10px"}}><StatusBadge s={o.status}/></td>
                  <td style={{padding:"9px 10px",color:"#bbb",fontSize:11.5}}>{orderDateTime(o).date}</td>
                </tr>
              ))}
              <tr style={{background:"#eef2ff",borderTop:"2px solid #c7d2fe"}}>
                <td colSpan={2} style={{padding:"10px",fontWeight:700,color:"#4338ca"}}>Total</td>
                <td style={{padding:"10px",fontWeight:900,color:"#4338ca",fontSize:15}}>{fmtM(totalRev)}</td>
                <td colSpan={3}/>
              </tr>
            </tbody>
          </table>
        </div>}
      </div>
    </div>
  );
}

// ── FEEDBACK TAB (rating analytics) ──
function FeedbackTab({orders,rated}){
  const deliCount=orders.filter(o=>o.status===S.DELI).length;
  const sentCount=orders.filter(o=>o.feedbackSent).length;
  const avgRating=rated.length?(rated.reduce((a,o)=>a+o.customerRating,0)/rated.length):0;
  const counts={5:0,4:0,3:0,2:0,1:0};
  rated.forEach(o=>{counts[o.customerRating]=(counts[o.customerRating]||0)+1;});
  const lowRatings=counts[1]+counts[2];
  const maxCount=Math.max(1,...Object.values(counts));

  const statCards=[
    {l:"Average Rating",v:rated.length?avgRating.toFixed(1)+" ⭐":"—",c:"#854f0b"},
    {l:"Total Reviews",v:rated.length,c:"#185fa5"},
    {l:"5-Star Reviews",v:counts[5],c:"#1d9e75"},
    {l:"4-Star Reviews",v:counts[4],c:"#3b9e6f"},
    {l:"Low Ratings (1-2★)",v:lowRatings,c:lowRatings>0?"#cc0000":"#999"},
  ];

  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:12,marginBottom:20}}>
        {statCards.map(s=>(
          <div key={s.l} className="card" style={{padding:"14px 16px"}}>
            <div style={{fontSize:10.5,color:"#bbb",marginBottom:5}}>{s.l}</div>
            <div style={{fontSize:24,fontWeight:700,color:s.c}}>{s.v}</div>
          </div>
        ))}
      </div>

      <div style={{display:"flex",gap:16,flexWrap:"wrap",marginBottom:20}}>
        <div style={{background:"#fafaf8",borderRadius:10,padding:"10px 16px",fontSize:12.5,color:"#777"}}>
          <i className="ti ti-circle-check" style={{color:"#185fa5",marginRight:6}}/>
          <b>{deliCount}</b> orders delivered
        </div>
        <div style={{background:"#fafaf8",borderRadius:10,padding:"10px 16px",fontSize:12.5,color:"#777"}}>
          <i className="ti ti-brand-whatsapp" style={{color:"#25D366",marginRight:6}}/>
          <b>{sentCount}</b> feedback requests sent
        </div>
        <div style={{background:"#fafaf8",borderRadius:10,padding:"10px 16px",fontSize:12.5,color:"#777"}}>
          <i className="ti ti-star" style={{color:"#854f0b",marginRight:6}}/>
          <b>{rated.length}</b> ratings received
        </div>
      </div>

      {/* ── Rating distribution bar chart ── */}
      <div className="card" style={{marginBottom:20}}>
        <div style={{fontSize:12,fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:.5,marginBottom:14}}>Rating Distribution</div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {[5,4,3,2,1].map(n=>(
            <div key={n} style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:34,fontSize:12.5,fontWeight:600,color:"#555",flexShrink:0}}>{n}★</div>
              <div style={{flex:1,background:"#f5f2ee",borderRadius:6,height:18,overflow:"hidden"}}>
                <div style={{width:`${(counts[n]/maxCount)*100}%`,height:"100%",background:n>=4?"#1d9e75":n===3?"#854f0b":"#cc0000",borderRadius:6,transition:"width .3s"}}/>
              </div>
              <div style={{width:26,fontSize:12,color:"#999",textAlign:"right",flexShrink:0}}>{counts[n]}</div>
            </div>
          ))}
        </div>
      </div>

      {/* ── Recent reviews list ── */}
      <div style={{fontSize:12,fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Recent Reviews</div>
      <div style={{display:"flex",flexDirection:"column",gap:9}}>
        {rated.length===0&&<div style={{textAlign:"center",padding:30,color:"#bbb",background:"#fff",borderRadius:14}}>No ratings received yet</div>}
        {rated.slice().reverse().map(o=>(
          <div key={o.id} className="card" style={{padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
            <div>
              <div style={{fontWeight:600,fontSize:13}}>{o.customer}</div>
              <div style={{fontSize:11,color:"#bbb"}}>{o.orderNum?displayOrderNum(o,orders)+" · ":""}{o.product}</div>
              {o.customerReviewText&&<div style={{fontSize:12,color:"#777",marginTop:3,fontStyle:"italic"}}>"{o.customerReviewText}"</div>}
            </div>
            <div style={{fontSize:16}}>{"⭐".repeat(o.customerRating)}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
