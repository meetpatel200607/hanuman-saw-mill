// ── NEW ORDER ──
const LBL={fontSize:11.5,fontWeight:600,color:"#777",display:"block",marginBottom:4};
const emptyItem=()=>({product:PRODUCTS[0],wood:"Khair",dimL:"",dimW:"",dimT:"",qty:"",total:"",advance:"",advPayMethod:"Cash",notes:"",needsDesign:false,designType:"",designCost:"",oilPolish:false});
const DRAFT_KEY="hsm_order_draft_v1";

function NewOrder({user,onAdd,toast2,orders,allOrders,goto,defaultSource,orderType,presetCustomer,wholesaleCustomerId,onDone}){
  const orderSource=defaultSource||(user.role==="Factory Staff"?"Factory":"Office");
  const numberSource=allOrders||orders;
  const usedNums=numberSource.map(o=>o.orderNum).filter(Boolean);
  const suggestNum=usedNums.length>0?Math.max(...usedNums)+1:1;

  const [customer,setCustomer]=useState(presetCustomer?.name||"");
  const [mobile,setMobile]=useState(presetCustomer?.mobile||"");
  const [delivery,setDelivery]=useState(todayKey());
  const [deliveryCollectionLocation,setDeliveryCollectionLocation]=useState("");
  const [orderNumInput,setOrderNumInput]=useState(String(suggestNum));
  const [items,setItems]=useState([emptyItem()]);
  const [done,setDone]=useState(null);
  const [draftLoaded,setDraftLoaded]=useState(false);
  const fieldRefs=useRef({});

  // ── Load draft on mount ── (skipped for Wholesale orders — those aren't drafted, they're tied to a specific customer profile)
  useEffect(()=>{
    if(wholesaleCustomerId){setDraftLoaded(true);return;}
    try{
      const raw=localStorage.getItem(DRAFT_KEY);
      if(raw){
        const d=JSON.parse(raw);
        if(d.customer||d.mobile||(d.items&&d.items.some(it=>it.dimL||it.qty||it.total))){
          setCustomer(d.customer||"");setMobile(d.mobile||"");setDelivery(d.delivery||todayKey());setDeliveryCollectionLocation(d.deliveryCollectionLocation||"");
          if(d.orderNumInput) setOrderNumInput(d.orderNumInput);
          if(d.items&&d.items.length) setItems(d.items.map(it=>({...emptyItem(),...it})));
          toast2("Restored your unsaved order draft");
        }
      }
    }catch(e){/* ignore */}
    setDraftLoaded(true);
  },[]);

  // ── Auto-save draft on every change ──
  useEffect(()=>{
    if(!draftLoaded||wholesaleCustomerId) return;
    try{
      localStorage.setItem(DRAFT_KEY,JSON.stringify({customer,mobile,delivery,deliveryCollectionLocation,orderNumInput,items}));
    }catch(e){/* ignore */}
  },[customer,mobile,delivery,deliveryCollectionLocation,orderNumInput,items,draftLoaded]);

  const clearDraft=()=>{try{localStorage.removeItem(DRAFT_KEY);}catch(e){}};

  const [custSuggestions,setCustSuggestions]=useState([]);
  const [showSugg,setShowSugg]=useState(false);

  // Build unique customers list from orders
  const knownCustomers=useMemo(()=>{
    const seen={};
    orders.forEach(o=>{if(o.customer&&o.mobile)seen[o.mobile]={name:o.customer,mobile:o.mobile,count:orders.filter(x=>x.mobile===o.mobile).length};});
    return Object.values(seen);
  },[orders]);

  const onCustomerChange=v=>{
    setCustomer(v);
    if(v.trim().length>=1){
      const q=v.toLowerCase();
      const matches=knownCustomers.filter(c=>c.name.toLowerCase().includes(q)).slice(0,5);
      setCustSuggestions(matches);
      setShowSugg(matches.length>0);
    } else {
      setShowSugg(false);
    }
  };

  const pickCustomer=c=>{
    setCustomer(c.name);
    setMobile(c.mobile);
    setShowSugg(false);
    // Show their previous orders count
    toast2(`${c.name} — ${c.count} previous order${c.count===1?"":"s"} on record`);
  };

  // Previous orders for this customer (by name match)
  const prevOrders=customer.trim().length>=2
    ?orders.filter(o=>o.customer.toLowerCase().includes(customer.toLowerCase().trim())).slice(0,3)
    :[];

  const updItem=(i,k,v)=>setItems(p=>{
    const n=[...p];n[i]={...n[i],[k]:v};
    if(k==="needsDesign"&&!v){n[i].designCost="";n[i].designType="";n[i].oilPolish=false;}
    if(k==="advance"||k==="total"||k==="designCost"||k==="needsDesign")n[i].pending=Math.max(0,(Number(n[i].total||0)+(n[i].needsDesign?Number(n[i].designCost||0):0))-Number(n[i].advance||0));
    return n;
  });
  const addItem=()=>setItems(p=>[...p,emptyItem()]);
  const removeItem=i=>setItems(p=>p.filter((_,idx)=>idx!==i));

  // ── Enter-key navigation ──
  const fieldOrder=["customer","mobile","orderNum","delivery","deliveryCollectionLocation"];
  items.forEach((_,i)=>{
    ["product","wood","dimL","dimW","dimT","qty","total","designType","designCost","advance","advPayMethod","notes"].forEach(f=>fieldOrder.push(`${f}-${i}`));
  });
  fieldOrder.push("submit");
  const setRef=key=>el=>{fieldRefs.current[key]=el;};
  const onEnter=key=>e=>{
    if(e.key!=="Enter") return;
    if(e.target.tagName==="TEXTAREA"&&e.shiftKey) return; // allow Shift+Enter newline in notes
    e.preventDefault();
    const idx=fieldOrder.indexOf(key);
    for(let j=idx+1;j<fieldOrder.length;j++){
      const el=fieldRefs.current[fieldOrder[j]];
      if(el){el.focus();if(el.select)try{el.select();}catch(_){};break;}
    }
  };

  const sub=e=>{
    e.preventDefault();
    if(!customer||!mobile){toast2("Enter customer name and mobile","err");return;}
    if(!deliveryCollectionLocation){toast2("Select Delivery Collection Location","err");return;}
    const num=parseInt(orderNumInput)||suggestNum;
    if(orderNumberTaken(num,orderSource,numberSource)){toast2("Order number "+fmtONForSource(num,orderSource)+" already exists!","err");return;}
    const created=[];
    for(let i=0;i<items.length;i++){
      const it=items[i];
      if(!it.dimL||!it.dimW||!it.dimT||!it.qty){toast2(`Fill all dimensions & qty for item ${i+1}`,"err");return;}
      const size=it.dimL+'"x'+it.dimW+'"x'+it.dimT+'"';
      const productTotal=Number(it.total)||0;
      const designCost=it.needsDesign?Number(it.designCost)||0:0;
      const total=productTotal+designCost;
      const designTypeFull=it.needsDesign?(it.designType&&it.oilPolish?`${it.designType} + Oil Polish`:it.designType||( it.oilPolish?"Oil Polish":"")):"";
      created.push({
        id:genId(),orderNum:num,orderSuffix:orderSuffixForIndex(i),
        customer,mobile,delivery,deliveryCollectionLocation,
        product:it.product,wood:it.wood,size,qty:Number(it.qty),
        productTotal,total,advance:Number(it.advance)||0,
        pending:Math.max(0,total-(Number(it.advance)||0)),
        advPayMethod:it.advPayMethod||"Cash",
        notes:it.notes,
        needsDesign:!!it.needsDesign,designStatus:it.needsDesign?"Pending":"",designType:designTypeFull,designCost,oilPolish:!!it.oilPolish,
        status:S.PEND,created:now2(),createdBy:user.name,createdRole:user.role,
        orderSource,createdFromFactory:orderSource==="Factory",
        payMethod:"",payAt:"",receivedAt:"",receivedBy:"",deliveredAt:"",deliveredBy:"",deliveredLocation:"",
        acceptedAt:"",acceptedBy:"",dispatchedAt:"",dispatchedBy:"",
        feedbackSent:false,feedbackSentAt:"",customerRating:null,customerReviewText:"",
        orderType:orderType||"Retail",wholesaleCustomerId:wholesaleCustomerId||null,
      });
    }
    const groupId=created[0].id;
    created.forEach((o,i)=>{if(i>0)o.groupId=groupId;});
    created[0].groupId=groupId;
    Promise.all(created.map(o=>onAdd(o))).then(()=>{clearDraft();setDone(created);if(onDone)onDone(created);});
  };

  if(done) return(
    <div style={{maxWidth:520,margin:"0 auto"}}>
      <div className="card" style={{textAlign:"center"}}>
        <div style={{width:52,height:52,background:"#e1f5ee",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 10px"}}><i className="ti ti-check" style={{fontSize:26,color:"#1d9e75"}}/></div>
        <div style={{fontSize:17,fontWeight:700,marginBottom:2}}>{done.length>1?`${done.length} Orders Created!`:"Order Created!"}{wholesaleCustomerId&&<span style={{marginLeft:8,display:"inline-flex",alignItems:"center",gap:4,background:"#eef2ff",color:"#4338ca",border:"1px solid #c7d2fe",borderRadius:8,padding:"2px 8px",fontSize:11,fontWeight:700,verticalAlign:"middle"}}><i className="ti ti-building-store"/>Wholesale</span>}</div>
        <div style={{fontSize:26,fontWeight:900,color:"#cc0000",marginBottom:2}}>{done[0].orderNum?`Order ${displayOrderNum(done[0],done)}`:done[0].id}</div>
        <div style={{fontSize:11,color:"#aaa",marginBottom:16}}>{done[0].customer} · {done[0].mobile}</div>

        {/* WhatsApp + Design buttons */}
        <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap",marginBottom:16}}>
          <button className="btn" style={{background:"#25D366",color:"#fff",fontSize:14,fontWeight:700}} onClick={()=>sendWhatsApp(done)}>
            <i className="ti ti-brand-whatsapp" style={{fontSize:18}}/>Send on WhatsApp
          </button>
          {done.some(o=>o.needsDesign)&&<button className="btn btn-outline" style={{fontSize:13}} onClick={()=>goto("design")}>
            <i className="ti ti-pencil-ruler"/>View in Design Queue
          </button>}
        </div>

        {/* ── Item summary — every size/sub-item in this order, no separate QR each ── */}
        <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:16,textAlign:"left"}}>
          {done.map((o,i)=>(
            <div key={o.id} style={{background:"#fafaf8",borderRadius:12,padding:12}}>
              <div style={{fontSize:12,fontWeight:700,color:"#cc0000",marginBottom:4}}>{o.orderNum?`Order ${displayOrderNum(o,done)}`:o.id}</div>
              <div style={{fontSize:12,color:"#777",marginBottom:8}}>{o.product} · {o.wood} · <b className="size-strong-sm">{o.size}</b> · Qty {o.qty}</div>
              <div style={{fontSize:11,color:"#854f0b",fontWeight:700}}><i className="ti ti-map-pin" style={{marginRight:4}}/>{collectionLocationOf(o)}{isFactoryOrder(o)&&<span style={{marginLeft:8}}><FactoryOrderBadge/></span>}</div>
              {o.needsDesign&&<div style={{display:"inline-block",background:"#fff3e0",color:"#a35a00",border:"1px solid #ffd9a0",borderRadius:8,padding:"3px 10px",fontSize:11,fontWeight:700,marginTop:8}}><i className="ti ti-pencil-ruler" style={{marginRight:4}}/>{o.designType||"Design"} · {fmtM(o.designCost)}</div>}
            </div>
          ))}
        </div>

        {/* ── ONE QR for the whole order — covers every size/sub-item above ── */}
        <div style={{background:"#fafaf8",borderRadius:12,padding:14,marginBottom:16}}>
          <div style={{fontSize:11,fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Order QR Code {done.length>1?`(covers all ${done.length} items)`:""}</div>
          <div style={{background:"#fff",borderRadius:10,padding:8,display:"inline-block"}}><QRSvg order={done[0]} size={160}/></div>
          <div style={{display:"flex",gap:8,justifyContent:"center",marginTop:10,flexWrap:"wrap"}}>
            <button className="btn btn-red" style={{padding:"7px 12px",fontSize:12}} onClick={()=>printQR(done[0])}><i className="ti ti-printer"/>Print</button>
            <button className="btn btn-green" style={{padding:"7px 12px",fontSize:12}} onClick={()=>downloadQR(done[0])}><i className="ti ti-download"/>Download</button>
          </div>
        </div>
        <button className="btn btn-outline" onClick={()=>{setDone(null);setCustomer(presetCustomer?.name||"");setMobile(presetCustomer?.mobile||"");setDelivery(todayKey());setDeliveryCollectionLocation("");setOrderNumInput(String(suggestNum+1));setItems([emptyItem()]);clearDraft();}}><i className="ti ti-plus"/>{wholesaleCustomerId?"New Order for this Customer":"New Order"}</button>
      </div>
    </div>
  );

  return(
    <div style={{maxWidth:680,margin:"0 auto"}}>
      <div className="card">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18,flexWrap:"wrap",gap:8}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{fontWeight:700,fontSize:15}}>{wholesaleCustomerId?"Create Wholesale Order":"Create New Order"}</div>
            {orderSource==="Factory"?<FactoryOrderBadge/>:<span title="Office order" style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:20,height:20,borderRadius:"50%",background:"#1a1a1a",color:"#fff",fontSize:11,fontWeight:900,border:"2px solid #cc0000",lineHeight:1}}>O</span>}
            {wholesaleCustomerId&&<span style={{display:"inline-flex",alignItems:"center",gap:4,background:"#eef2ff",color:"#4338ca",border:"1px solid #c7d2fe",borderRadius:8,padding:"3px 9px",fontSize:11,fontWeight:700}}><i className="ti ti-building-store"/>Wholesale</span>}
          </div>
          <div style={{fontSize:10.5,color:"#bbb",display:"flex",alignItems:"center",gap:4}}><i className="ti ti-device-floppy"/>Draft auto-saved</div>
        </div>
        <form onSubmit={sub}>
          {/* ── Customer info ── */}
          <div style={{background:"#fafaf8",borderRadius:12,padding:14,marginBottom:16}}>
            <div style={{fontSize:12,fontWeight:700,color:"#888",marginBottom:10,textTransform:"uppercase",letterSpacing:.5}}>Customer Details</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:13}}>
              <div style={{position:"relative"}}>
                <label style={LBL}>Customer Name *</label>
                <input
                  ref={setRef("customer")}
                  onKeyDown={onEnter("customer")}
                  className="inp"
                  value={customer}
                  onChange={e=>onCustomerChange(e.target.value)}
                  onBlur={()=>setTimeout(()=>setShowSugg(false),150)}
                  onFocus={()=>{if(custSuggestions.length>0)setShowSugg(true);}}
                  placeholder="Full name"
                  autoComplete="off"
                />
                {/* Suggestions dropdown */}
                {showSugg&&(
                  <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:50,background:"#fff",border:"1.5px solid #e0ddd8",borderRadius:10,boxShadow:"0 4px 16px rgba(0,0,0,.1)",overflow:"hidden",marginTop:4}}>
                    {custSuggestions.map(c=>(
                      <div key={c.mobile} onMouseDown={()=>pickCustomer(c)} style={{padding:"10px 14px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid #f5f5f3"}}
                        onMouseEnter={e=>e.currentTarget.style.background="#fafaf8"}
                        onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
                        <div>
                          <div style={{fontWeight:600,fontSize:13}}>{c.name}</div>
                          <div style={{fontSize:11,color:"#bbb"}}>{c.mobile}</div>
                        </div>
                        <div style={{fontSize:11,color:"#cc0000",fontWeight:600}}>{c.count} order{c.count===1?"":"s"}</div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
              <div><label style={LBL}>Mobile Number *</label>
                <div style={{display:"flex",gap:8}}>
                  <input ref={setRef("mobile")} onKeyDown={onEnter("mobile")} className="inp" value={mobile} onChange={e=>setMobile(e.target.value)} placeholder="10-digit mobile" style={{flex:1}}/>
                  {mobile.length>=10&&<a href={"tel:"+mobile} className="btn btn-green" style={{padding:"10px 14px",textDecoration:"none",whiteSpace:"nowrap"}}><i className="ti ti-phone"/>Call</a>}
                </div>
              </div>
              <div>
                <label style={LBL}>Order Number *</label>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <span style={{fontWeight:700,color:"#cc0000",fontSize:16,flexShrink:0}}>{orderSource==="Factory"?"F":"#"}</span>
                  <input ref={setRef("orderNum")} onKeyDown={onEnter("orderNum")} className="inp" type="number" value={orderNumInput} onChange={e=>setOrderNumInput(e.target.value)} placeholder={String(suggestNum)} style={{flex:1}}/>
                </div>
                <div style={{fontSize:10.5,color:"#bbb",marginTop:3}}>Suggested: {fmtONForSource(suggestNum,orderSource)} · Change if needed</div>
              </div>
              <div><label style={LBL}>Delivery Date</label><input ref={setRef("delivery")} onKeyDown={onEnter("delivery")} type="date" className="inp" value={delivery} onChange={e=>setDelivery(e.target.value)}/></div>
              <div style={{gridColumn:"span 2"}}>
                <label style={LBL}>Delivery Collection Location *</label>
                <select ref={setRef("deliveryCollectionLocation")} onKeyDown={onEnter("deliveryCollectionLocation")} className="inp" value={deliveryCollectionLocation} onChange={e=>setDeliveryCollectionLocation(e.target.value)} required>
                  <option value="">Select pickup location</option>
                  {COLLECTION_LOCATIONS.map(l=><option key={l}>{l}</option>)}
                </select>
              </div>
            </div>
          </div>

          {/* ── Previous orders for this customer ── */}
          {prevOrders.length>0&&(
            <div style={{background:"#fff8f8",border:"1px solid #ffdddd",borderRadius:10,padding:"10px 14px",marginBottom:16}}>
              <div style={{fontSize:11,fontWeight:700,color:"#cc0000",marginBottom:8,textTransform:"uppercase",letterSpacing:.4}}>
                <i className="ti ti-history" style={{marginRight:5}}/>Previous Orders ({orders.filter(o=>o.customer.toLowerCase().includes(customer.toLowerCase().trim())).length} total)
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {prevOrders.map(o=>(
                  <div key={o.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:12,flexWrap:"wrap",gap:4}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      {o.orderNum&&<span style={{fontWeight:700,color:"#cc0000",minWidth:32}}>{displayOrderNum(o,orders)}</span>}
                      <span style={{color:"#555"}}>{o.product} · {o.wood} · <b className="size-strong-sm">{o.size}</b></span>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <span style={{color:"#bbb"}}>{orderDateTime(o).label}</span>
                      <StatusBadge s={o.status}/>
                    </div>
                  </div>
                ))}
                {orders.filter(o=>o.customer.toLowerCase().includes(customer.toLowerCase().trim())).length>3&&(
                  <div style={{fontSize:11,color:"#bbb",marginTop:2}}>+ {orders.filter(o=>o.customer.toLowerCase().includes(customer.toLowerCase().trim())).length-3} more orders</div>
                )}
              </div>
            </div>
          )}
          <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:14}}>
            {items.map((it,i)=>(
              <div key={i} style={{border:"1.5px solid #eeebe6",borderRadius:13,padding:14,position:"relative"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <div style={{fontSize:12,fontWeight:700,color:"#cc0000",textTransform:"uppercase",letterSpacing:.5}}>
                    {items.length>1?`Item ${i+1}`:"Order Item"}
                  </div>
                  {items.length>1&&<button type="button" onClick={()=>removeItem(i)} style={{background:"#fff0f0",border:"1px solid #ffcccc",borderRadius:7,padding:"3px 8px",cursor:"pointer",color:"#cc0000",fontSize:12,fontWeight:600,display:"flex",alignItems:"center",gap:4}}><i className="ti ti-x" style={{fontSize:12}}/>Remove</button>}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:11}}>
                  <div><label style={LBL}>Product Type *</label><select ref={setRef(`product-${i}`)} onKeyDown={onEnter(`product-${i}`)} className="inp" value={it.product} onChange={e=>updItem(i,"product",e.target.value)}>{PRODUCTS.map(p=><option key={p}>{p}</option>)}</select></div>
                  <div><label style={LBL}>Wood Type *</label><select ref={setRef(`wood-${i}`)} onKeyDown={onEnter(`wood-${i}`)} className="inp" value={it.wood} onChange={e=>updItem(i,"wood",e.target.value)}>{WOODS.map(w=><option key={w}>{w}</option>)}</select></div>
                  <div style={{gridColumn:"span 2"}}>
                    <label style={LBL}>Size / Dimensions (inches) *</label>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                      <div><label style={{fontSize:11,color:"#999",display:"block",marginBottom:3}}>Length</label><input ref={setRef(`dimL-${i}`)} onKeyDown={onEnter(`dimL-${i}`)} type="number" step="0.1" className="inp" value={it.dimL} onChange={e=>updItem(i,"dimL",e.target.value)} placeholder="e.g. 10"/></div>
                      <div><label style={{fontSize:11,color:"#999",display:"block",marginBottom:3}}>Width</label><input ref={setRef(`dimW-${i}`)} onKeyDown={onEnter(`dimW-${i}`)} type="number" step="0.1" className="inp" value={it.dimW} onChange={e=>updItem(i,"dimW",e.target.value)} placeholder="e.g. 4"/></div>
                      <div><label style={{fontSize:11,color:"#999",display:"block",marginBottom:3}}>Thickness</label><input ref={setRef(`dimT-${i}`)} onKeyDown={onEnter(`dimT-${i}`)} type="number" step="0.1" className="inp" value={it.dimT} onChange={e=>updItem(i,"dimT",e.target.value)} placeholder="e.g. 2"/></div>
                    </div>
                  </div>
                  <div><label style={LBL}>Quantity *</label><input ref={setRef(`qty-${i}`)} onKeyDown={onEnter(`qty-${i}`)} type="number" className="inp" value={it.qty} onChange={e=>updItem(i,"qty",e.target.value)} placeholder="Units"/></div>
                  <div><label style={LBL}>Product Amount (₹)</label><input ref={setRef(`total-${i}`)} onKeyDown={onEnter(`total-${i}`)} type="number" className="inp" value={it.total} onChange={e=>updItem(i,"total",e.target.value)} placeholder="0"/></div>
                  {it.needsDesign&&<>
                    <div>
                      <label style={LBL}>Design Type</label>
                      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                        {DESIGN_TYPES.map(d=>(
                          <button key={d} type="button"
                            onClick={()=>updItem(i,"designType",it.designType===d?"":d)}
                            className="btn"
                            style={{padding:"7px 12px",fontSize:12,flex:1,justifyContent:"center",background:it.designType===d?"#1a1a1a":"#fff",color:it.designType===d?"#fff":"#555",border:`1.5px solid ${it.designType===d?"#1a1a1a":"#ddd"}`}}>
                            {d}
                          </button>
                        ))}
                      </div>
                      <div style={{marginTop:8}}>
                        <button type="button"
                          onClick={()=>updItem(i,"oilPolish",!it.oilPolish)}
                          className="btn"
                          style={{width:"100%",justifyContent:"center",padding:"7px 12px",fontSize:12,background:it.oilPolish?"#fff3e0":"#fff",color:it.oilPolish?"#a35a00":"#777",border:`1.5px solid ${it.oilPolish?"#ffb74d":"#ddd"}`}}>
                          <i className="ti ti-droplet"/>
                          {it.oilPolish?"Oil Polish (OP) — Added":"Add Oil Polish (OP)?"}
                        </button>
                      </div>
                    </div>
                    <div>
                      <label style={LBL}>Design Cost (₹)</label>
                      <input ref={setRef(`designCost-${i}`)} onKeyDown={onEnter(`designCost-${i}`)} type="number" className="inp" value={it.designCost} onChange={e=>updItem(i,"designCost",e.target.value)} placeholder="0" style={{borderColor:"#ffb74d",background:"#fffaf2",fontWeight:700,color:"#a35a00"}}/>
                    </div>
                    <div style={{background:"#fff3e0",border:"1px solid #ffd9a0",borderRadius:10,padding:"9px 11px",fontSize:12,color:"#a35a00",gridColumn:"span 2"}}>
                      <div style={{fontWeight:700,marginBottom:3}}>Design: {it.designType&&it.oilPolish?`${it.designType} + Oil Polish (OP)`:it.designType?it.designType:it.oilPolish?"Oil Polish (OP) only":"None selected"}</div>
                      <div>Product {fmtM(Number(it.total||0))} + Design {fmtM(Number(it.designCost||0))} = <b>{fmtM(Number(it.total||0)+Number(it.designCost||0))}</b></div>
                    </div>
                  </>}
                  <div><label style={LBL}>Advance Paid (₹)</label><input ref={setRef(`advance-${i}`)} onKeyDown={onEnter(`advance-${i}`)} type="number" className="inp" value={it.advance} onChange={e=>updItem(i,"advance",e.target.value)} placeholder="0"/></div>
                  <div><label style={LBL}>Pending (₹)</label><input type="number" className="inp" readOnly value={Math.max(0,(Number(it.total)||0)+(it.needsDesign?Number(it.designCost||0):0)-(Number(it.advance)||0))} style={{background:"#fafaf8",color:"#999"}} placeholder="Auto"/></div>
                  <div>
                    <label style={LBL}>Advance Payment Method</label>
                    <select ref={setRef(`advPayMethod-${i}`)} onKeyDown={onEnter(`advPayMethod-${i}`)} className="inp" value={it.advPayMethod} onChange={e=>updItem(i,"advPayMethod",e.target.value)}>
                      {PAY_M.map(m=><option key={m}>{m}</option>)}
                    </select>
                    <div style={{fontSize:10.5,color:"#bbb",marginTop:3}}>Defaults to Cash — change only if paid via UPI/Bank</div>
                  </div>
                  <div><label style={LBL}>Notes</label><textarea ref={setRef(`notes-${i}`)} onKeyDown={onEnter(`notes-${i}`)} className="inp" rows={2} value={it.notes} onChange={e=>updItem(i,"notes",e.target.value)} placeholder="Special instructions... (Shift+Enter for new line)"/></div>
                  <div style={{gridColumn:"span 2"}}>
                    <button type="button" onClick={()=>updItem(i,"needsDesign",!it.needsDesign)}
                      className="btn" style={{width:"100%",justifyContent:"center",
                        background:it.needsDesign?"#fff3e0":"#fff",
                        color:it.needsDesign?"#a35a00":"#777",
                        border:`1.5px solid ${it.needsDesign?"#ffb74d":"#ddd"}`}}>
                      <i className="ti ti-pencil-ruler"/>
                      {it.needsDesign?"Marked for Design — this order needs to go to the design shop":"Send for Design? (tap to mark)"}
                    </button>
                  </div>
                </div>
              </div>
            ))}
          </div>

          <button type="button" onClick={addItem} className="btn btn-outline" style={{marginBottom:16,width:"100%",justifyContent:"center",borderStyle:"dashed"}}>
            <i className="ti ti-plus"/>Add Another Item / Size
          </button>

          <button ref={setRef("submit")} type="submit" className="btn btn-red" style={{width:"100%",justifyContent:"center",fontSize:15}}>
            <i className="ti ti-check"/>Create {items.length>1?`Order (${items.length} Sizes)`:"Order"} & Generate QR
          </button>
        </form>
      </div>
    </div>
  );
}

// ── EDIT ORDER (Admin only) ──
function EditOrder({order,orders,onSave,onCancel,toast2}){
  const [f,setF]=useState({
    orderNum:order.orderNum?String(order.orderNum):"",
    customer:order.customer||"",
    mobile:order.mobile||"",
    product:order.product||PRODUCTS[0],
    wood:order.wood||"Khair",
    dimL:order.size?order.size.replace(/"/g,"").split("x")[0]:"",
    dimW:order.size?order.size.replace(/"/g,"").split("x")[1]:"",
    dimT:order.size?order.size.replace(/"/g,"").split("x")[2]:"",
    qty:String(order.qty||""),
    total:String(productTotalOf(order)||""),
    advance:String(order.advance||""),
    advPayMethod:order.advPayMethod||"Cash",
    delivery:order.delivery||"",
    deliveryCollectionLocation:order.deliveryCollectionLocation||"",
    notes:order.notes||"",
    needsDesign:!!order.needsDesign,
    designType:order.designType?(order.designType.replace(" + Oil Polish","").replace(" + OP","").split("+")[0].trim())||"":"",
    designCost:String(designCostOf(order)||""),
    oilPolish:!!(order.oilPolish||(order.designType&&order.designType.includes("Oil Polish"))),
  });
  const upd=(k,v)=>setF(p=>{
    const n={...p,[k]:v};
    if(k==="needsDesign"&&!v){n.designCost="";n.designType="";n.oilPolish=false;}
    if(k==="advance"||k==="total"||k==="designCost"||k==="needsDesign") n.pending=Math.max(0,(Number(n.total)||0)+(n.needsDesign?Number(n.designCost||0):0)-(Number(n.advance)||0));
    return n;
  });
  const productTotal=Number(f.total)||0;
  const designCost=f.needsDesign?Number(f.designCost)||0:0;
  const total=productTotal+designCost;
  const pending=Math.max(0,total-(Number(f.advance)||0));

  const sub=e=>{
    e.preventDefault();
    if(!f.customer||!f.mobile||!f.dimL||!f.dimW||!f.dimT||!f.qty||!f.deliveryCollectionLocation){toast2("Fill all required fields","err");return;}
    const nextNum=String(f.orderNum).trim()===""?null:parseInt(f.orderNum,10);
    if(String(f.orderNum).trim()!==""&&(!nextNum||nextNum<1)){toast2("Enter a valid order number","err");return;}
    const gid=order.groupId||order.id;
    if(orderNumberTaken(nextNum,orderSourceOf(order),orders,order.id,gid)){toast2("Order number "+fmtONForSource(nextNum,orderSourceOf(order))+" already exists!","err");return;}
    const size=f.dimL+'"x'+f.dimW+'"x'+f.dimT+'"';
    const designTypeFull=f.needsDesign?(f.designType&&f.oilPolish?`${f.designType} + Oil Polish`:f.designType||(f.oilPolish?"Oil Polish":"")):"";
    onSave(order.id,{
      orderNum:nextNum,customer:f.customer,mobile:f.mobile,product:f.product,wood:f.wood,
      size,qty:Number(f.qty),productTotal,total,advance:Number(f.advance)||0,
      pending,advPayMethod:f.advPayMethod,delivery:f.delivery,deliveryCollectionLocation:f.deliveryCollectionLocation,notes:f.notes,needsDesign:f.needsDesign,
      designStatus:f.needsDesign?(order.designStatus||"Pending"):"",
      designType:designTypeFull,
      designCost,oilPolish:!!f.oilPolish,
    });
  };

  const lbl={fontSize:11.5,fontWeight:600,color:"#777",display:"block",marginBottom:4};
  return(
    <div style={{maxWidth:660,margin:"0 auto"}}>
      <button className="btn btn-outline" style={{marginBottom:14,padding:"7px 14px",fontSize:12}} onClick={onCancel}>← Cancel</button>
      <div className="card">
        {/* Edit header with change indicator */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4,flexWrap:"wrap",gap:8}}>
          <div style={{fontWeight:700,fontSize:15}}>Edit Order</div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            {order.orderNum&&<span style={{fontWeight:900,color:"#cc0000",fontSize:16}}>Order {displayOrderNum(order,orders)}</span>}
            <StatusBadge s={order.status}/>
          </div>
        </div>
        <div style={{fontSize:11,color:"#bbb",marginBottom:18}}>
          Created {order.created} by {order.createdBy}
          {order.lastEditedAt&&` · Last edited ${order.lastEditedAt} by ${order.lastEditedBy}`}
        </div>

        {/* Warning for delivered orders */}
        {order.status===S.DELI&&<div style={{background:"#fffbea",border:"1px solid #ffe58f",borderRadius:10,padding:"10px 14px",fontSize:12,color:"#7a5c00",marginBottom:16}}>
          <i className="ti ti-alert-triangle" style={{marginRight:6}}/>This order is already delivered. Changes will update the record but not affect the invoice already printed.
        </div>}

        <form onSubmit={sub}>
          <div style={{background:"#fafaf8",borderRadius:12,padding:14,marginBottom:14}}>
            <div style={{fontSize:11,fontWeight:700,color:"#888",marginBottom:10,textTransform:"uppercase",letterSpacing:.5}}>Customer</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <div><label style={lbl}>Order Number</label><input className="inp" type="number" value={f.orderNum} onChange={e=>upd("orderNum",e.target.value)} placeholder="Order number"/></div>
              <div><label style={lbl}>Customer Name *</label><input className="inp" value={f.customer} onChange={e=>upd("customer",e.target.value)} placeholder="Full name"/></div>
              <div><label style={lbl}>Mobile Number *</label><input className="inp" value={f.mobile} onChange={e=>upd("mobile",e.target.value)} placeholder="10-digit mobile"/></div>
            </div>
          </div>

          <div style={{border:"1.5px solid #eeebe6",borderRadius:13,padding:14,marginBottom:14}}>
            <div style={{fontSize:11,fontWeight:700,color:"#cc0000",marginBottom:10,textTransform:"uppercase",letterSpacing:.5}}>Order Details</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <div><label style={lbl}>Product Type *</label><select className="inp" value={f.product} onChange={e=>upd("product",e.target.value)}>{PRODUCTS.map(p=><option key={p}>{p}</option>)}</select></div>
              <div><label style={lbl}>Wood Type *</label><select className="inp" value={f.wood} onChange={e=>upd("wood",e.target.value)}>{WOODS.map(w=><option key={w}>{w}</option>)}</select></div>
              <div style={{gridColumn:"span 2"}}>
                <label style={lbl}>Size / Dimensions (inches) *</label>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                  <div><label style={{fontSize:11,color:"#999",display:"block",marginBottom:3}}>Length</label><input type="number" step="0.1" className="inp" value={f.dimL} onChange={e=>upd("dimL",e.target.value)} placeholder="10"/></div>
                  <div><label style={{fontSize:11,color:"#999",display:"block",marginBottom:3}}>Width</label><input type="number" step="0.1" className="inp" value={f.dimW} onChange={e=>upd("dimW",e.target.value)} placeholder="4"/></div>
                  <div><label style={{fontSize:11,color:"#999",display:"block",marginBottom:3}}>Thickness</label><input type="number" step="0.1" className="inp" value={f.dimT} onChange={e=>upd("dimT",e.target.value)} placeholder="2"/></div>
                </div>
              </div>
              <div><label style={lbl}>Quantity *</label><input type="number" className="inp" value={f.qty} onChange={e=>upd("qty",e.target.value)} placeholder="Units"/></div>
              <div><label style={lbl}>Delivery Date</label><input type="date" className="inp" value={f.delivery} onChange={e=>upd("delivery",e.target.value)}/></div>
              <div style={{gridColumn:"span 2"}}><label style={lbl}>Delivery Collection Location *</label><select className="inp" value={f.deliveryCollectionLocation} onChange={e=>upd("deliveryCollectionLocation",e.target.value)} required><option value="">Select pickup location</option>{COLLECTION_LOCATIONS.map(l=><option key={l}>{l}</option>)}</select></div>
              <div style={{gridColumn:"span 2"}}><label style={lbl}>Notes</label><textarea className="inp" rows={2} value={f.notes} onChange={e=>upd("notes",e.target.value)} placeholder="Special instructions..."/></div>
            </div>
          </div>

          <div style={{border:"1.5px solid #eeebe6",borderRadius:13,padding:14,marginBottom:14}}>
            <div style={{fontSize:11,fontWeight:700,color:"#888",marginBottom:10,textTransform:"uppercase",letterSpacing:.5}}>Payment</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <div><label style={lbl}>Product Amount (₹)</label><input type="number" className="inp" value={f.total} onChange={e=>upd("total",e.target.value)} placeholder="0"/></div>
              {f.needsDesign&&<>
                <div style={{gridColumn:"span 2"}}>
                  <label style={lbl}>Design Type</label>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}}>
                    {DESIGN_TYPES.map(d=>(
                      <button key={d} type="button"
                        onClick={()=>upd("designType",f.designType===d?"":d)}
                        className="btn"
                        style={{padding:"7px 12px",fontSize:12,flex:1,justifyContent:"center",background:f.designType===d?"#1a1a1a":"#fff",color:f.designType===d?"#fff":"#555",border:`1.5px solid ${f.designType===d?"#1a1a1a":"#ddd"}`}}>
                        {d}
                      </button>
                    ))}
                  </div>
                  <button type="button"
                    onClick={()=>upd("oilPolish",!f.oilPolish)}
                    className="btn"
                    style={{width:"100%",justifyContent:"center",padding:"7px 12px",fontSize:12,background:f.oilPolish?"#fff3e0":"#fff",color:f.oilPolish?"#a35a00":"#777",border:`1.5px solid ${f.oilPolish?"#ffb74d":"#ddd"}`}}>
                    <i className="ti ti-droplet"/>
                    {f.oilPolish?"Oil Polish (OP) — Added":"Add Oil Polish (OP)?"}
                  </button>
                </div>
                <div>
                  <label style={lbl}>Design Cost (₹)</label>
                  <input type="number" className="inp" value={f.designCost} onChange={e=>upd("designCost",e.target.value)} placeholder="0" style={{borderColor:"#ffb74d",background:"#fffaf2",fontWeight:700,color:"#a35a00"}}/>
                </div>
                <div style={{background:"#fff3e0",border:"1px solid #ffd9a0",borderRadius:10,padding:"9px 11px",fontSize:12,color:"#a35a00"}}>
                  <div style={{fontWeight:700,marginBottom:3}}>Design: {f.designType&&f.oilPolish?`${f.designType} + Oil Polish`:f.designType?f.designType:f.oilPolish?"Oil Polish (OP) only":"None selected"}</div>
                  <div>{fmtM(productTotal)} + {fmtM(designCost)} = <b>{fmtM(total)}</b></div>
                </div>
              </>}
              <div><label style={lbl}>Advance Paid (₹)</label><input type="number" className="inp" value={f.advance} onChange={e=>upd("advance",e.target.value)} placeholder="0"/></div>
              <div><label style={lbl}>Pending (₹)</label><input type="number" className="inp" readOnly value={pending} style={{background:"#fafaf8",color:"#999"}}/></div>
              <div>
                <label style={lbl}>Advance Payment Method</label>
                <select className="inp" value={f.advPayMethod} onChange={e=>upd("advPayMethod",e.target.value)}>{PAY_M.map(m=><option key={m}>{m}</option>)}</select>
              </div>
            </div>
          </div>

          <div style={{marginBottom:16}}>
            <button type="button" onClick={()=>upd("needsDesign",!f.needsDesign)} className="btn" style={{width:"100%",justifyContent:"center",background:f.needsDesign?"#fff3e0":"#fff",color:f.needsDesign?"#a35a00":"#777",border:`1.5px solid ${f.needsDesign?"#ffb74d":"#ddd"}`}}>
              <i className="ti ti-pencil-ruler"/>{f.needsDesign?"Marked for Design":"Send for Design? (tap to mark)"}
            </button>
          </div>

          <div style={{display:"flex",gap:10}}>
            <button type="button" className="btn btn-outline" style={{flex:1,justifyContent:"center"}} onClick={onCancel}>Cancel</button>
            <button type="submit" className="btn btn-red" style={{flex:2,justifyContent:"center",fontSize:15}}><i className="ti ti-device-floppy"/>Save Changes</button>
          </div>
        </form>
      </div>
    </div>
  );
}

// ── ORDER LIST ──
function OrderList({orders,allOrders,updOrder,updOrderH,delOrder,bulkDelOrders,toast2,user}){
  const [q,setQ]=useState("");
  const [fl,setFl]=useState("all");
  const [typeFl,setTypeFl]=useState("all");
  const [sel,setSel]=useState(null);
  const [delTarget,setDelTarget]=useState(null);
  const [editTarget,setEditTarget]=useState(null);
  const [histOrder,setHistOrder]=useState(null);
  const [bulkMode,setBulkMode]=useState(false);
  const [selectedIds,setSelectedIds]=useState(new Set());
  const [expandedGroups,setExpandedGroups]=useState(new Set());
  const isAdmin=user.role==="Admin";

  const matchQ=(o,q)=>{
    if(!q) return true;
    const t=q.toLowerCase().trim();
    return String(o.customer||"").toLowerCase().includes(t)||
      String(o.mobile||"").includes(t)||
      String(o.id||"").toLowerCase().includes(t)||
      String(o.product||"").toLowerCase().includes(t)||
      String(o.size||"").toLowerCase().includes(t)||
      String(o.wood||"").toLowerCase().includes(t)||
      String(o.designType||"").toLowerCase().includes(t)||
      (o.oilPolish&&"oil polish op".includes(t))||
      matchesOrderNumber(o,t,allOrders||orders);
  };
  const filtered=orders.filter(o=>matchQ(o,q)&&(fl==="all"||o.status===fl)&&(typeFl==="all"||orderTypeOf(o)===typeFl));
  const doDelete=(o)=>{setDelTarget(o);setSel(null);};

  // ── Build grouped order list ──
  // Primary = order that "owns" the group (has orderNum, or is groupId anchor)
  // Sub-items = same groupId but not the primary
  const groupedFiltered=useMemo(()=>{
    // First get all orders that match the filter/search
    const matched=orders.filter(o=>matchQ(o,q)&&(fl==="all"||o.status===fl)&&(typeFl==="all"||orderTypeOf(o)===typeFl));
    // Also get all orders (unfiltered by search) to find siblings
    const allActive=orders;

    // Build a map: groupId -> {primary, subs}
    const groupMap={};
    allActive.forEach(o=>{
      const gid=o.groupId||o.id;
      if(!groupMap[gid]) groupMap[gid]={primary:null,subs:[]};
      // Primary = the one with orderNum set, or the one whose id===groupId
      if(o.id===gid||o.orderNum) {
        if(!groupMap[gid].primary) groupMap[gid].primary=o;
        else if(o.orderNum&&!groupMap[gid].primary.orderNum) groupMap[gid].primary=o; // prefer one with orderNum
      } else {
        groupMap[gid].subs.push(o);
      }
    });
    // Also push primary into subs correctly: some groups have no orderNum on any item
    // Re-normalise: primary = lowest index item in group (first created)
    Object.keys(groupMap).forEach(gid=>{
      const g=groupMap[gid];
      if(!g.primary){
        // Fall back: pick first item in group
        const all=allActive.filter(o=>(o.groupId||o.id)===gid);
        g.primary=all[0];
        g.subs=all.slice(1);
      } else {
        // Subs = all group members except primary
        g.subs=allActive.filter(o=>(o.groupId||o.id)===gid&&o.id!==g.primary.id);
      }
    });

    // Now produce display list: only show groups where primary or any sub matches the filter
    const seen=new Set();
    const result=[];
    matched.forEach(o=>{
      const gid=o.groupId||o.id;
      if(seen.has(gid)) return;
      seen.add(gid);
      const g=groupMap[gid]||{primary:o,subs:[]};
      result.push(g);
    });
    // Sort by real order date/time desc (newest first). String sorting breaks DD/M/YYYY dates.
    result.sort((a,b)=>(parseLocaleDateMs(b.primary.created)||0)-(parseLocaleDateMs(a.primary.created)||0));
    return result;
  },[orders,q,fl,typeFl]);

  const toggleGroup=gid=>setExpandedGroups(p=>{const n=new Set(p);n.has(gid)?n.delete(gid):n.add(gid);return n;});
  const todayKeyNow=todayKey();
  const isTodayOrder=o=>{const p=parseLocaleDate(o.created);return p&&p.dateKey===todayKeyNow;};
  const todayOrders=orders.filter(isTodayOrder);
  // Today's Revenue = Cash + UPI + Other Payments received today (excludes Design Revenue), same definition as the Dashboard — payments received today only, each counted once.
  const todayDeliveredOL=orders.filter(o=>{const p=parseLocaleDate(o.deliveredAt);return p&&p.dateKey===todayKeyNow;});
  const todayAdvOrdersOL=todayOrders.filter(o=>Number(o.advance)>0);
  const todayRevenue=todayDeliveredOL.reduce((a,o)=>a+productTotalOf(o),0)+todayAdvOrdersOL.reduce((a,o)=>a+Number(o.advance||0),0);
  const summary=[
    ["Today's Orders",todayOrders.length,"ti-calendar-plus","#0f766e"],
    ["Pending",orders.filter(o=>o.status===S.PEND).length,"ti-clock-pause","#dc2626"],
    ["Production",orders.filter(o=>o.status===S.PROD).length,"ti-tool","#f97316"],
    ["Ready",orders.filter(o=>o.status===S.RECV||o.status===S.TRANSIT).length,"ti-package","#2563eb"],
    ["Delivered",orders.filter(o=>o.status===S.DELI).length,"ti-circle-check","#16a34a"],
    ["Today's Revenue",fmtM(todayRevenue),"ti-currency-rupee","#111827"],
  ];
  const premiumStatus=o=>{
    const s=o.status||"";
    if(/cancel/i.test(s)) return {label:"Cancelled",bg:"#f3f4f6",color:"#6b7280",border:"#e5e7eb"};
    if(s===S.PEND) return {label:"Factory Pending",bg:"#fff1f2",color:"#be123c",border:"#fecdd3"};
    if(s===S.PROD) return {label:"Production",bg:"#fff7ed",color:"#c2410c",border:"#fed7aa"};
    if(s===S.TRANSIT||s===S.RECV) return {label:"Ready",bg:"#eff6ff",color:"#1d4ed8",border:"#bfdbfe"};
    if(s===S.DELI&&Number(o.pending||0)<=0) return {label:"Paid",bg:"#ecfdf5",color:"#047857",border:"#a7f3d0"};
    if(s===S.DELI) return {label:"Delivered",bg:"#f0fdf4",color:"#15803d",border:"#bbf7d0"};
    return {label:s||"—",bg:"#f8fafc",color:"#475569",border:"#e2e8f0"};
  };
  const StatusPill=({o})=>{
    const st=premiumStatus(o);
    return <span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",background:st.bg,color:st.color,border:`1px solid ${st.border}`,borderRadius:999,padding:"5px 10px",fontSize:11.5,fontWeight:800,whiteSpace:"nowrap"}}>{st.label}</span>;
  };
  const DetailChip=({label,icon,children,tone="#475569",strong=false})=>children?(
    <span style={{display:"inline-flex",alignItems:"center",gap:6,background:"#f8fafc",border:"1px solid #eef2f7",color:tone,borderRadius:999,padding:"6px 10px",fontSize:12,fontWeight:strong?850:720,lineHeight:1.15,maxWidth:"100%"}}>
      {icon&&<i className={`ti ${icon}`} style={{fontSize:14,flexShrink:0}}/>}
      {label&&<span style={{color:"#94a3b8",fontWeight:750}}>{label}</span>}
      <span style={{minWidth:0,overflow:"hidden",textOverflow:"ellipsis"}}>{children}</span>
    </span>
  ):null;
  const designChips=o=>{
    const chips=[];
    if(o.needsDesign&&o.designType) chips.push(o.designType);
    else if(o.needsDesign) chips.push("Design");
    if(o.oilPolish&&!String(o.designType||"").includes("Oil")) chips.push("Oil Polish");
    return chips;
  };
  const uniqueDesignChips=list=>[...new Set(list.flatMap(designChips).filter(Boolean))];

  // ── EDIT VIEW ──
  if(editTarget) return(
    <EditOrder
      order={editTarget}
      orders={allOrders||orders}
      onSave={(id,patch)=>{
        const prev=editTarget;
        // Build a meaningful history action
        let action="Order Updated";
        const changes=[];
        if(patch.customer!==prev.customer) changes.push(`Customer: ${prev.customer} → ${patch.customer}`);
        if(Number(patch.advance)!==Number(prev.advance)) changes.push(`Advance: ${fmtM(prev.advance)} → ${fmtM(patch.advance)}`);
        if(Number(patch.total)!==Number(productTotalOf(prev))) changes.push(`Amount: ${fmtM(productTotalOf(prev))} → ${fmtM(patch.productTotal||patch.total)}`);
        if(patch.delivery!==prev.delivery) changes.push(`Delivery: ${prev.delivery} → ${patch.delivery}`);
        const h=makeHistoryEntry(action,"Admin",undefined,undefined);
        if(changes.length) h.change=changes.join(", ");
        updOrderH(id,{...patch,lastEditedAt:now2(),lastEditedBy:user.name},h);
        toast2("Order updated successfully!");
        setSel({...editTarget,...patch,lastEditedAt:now2(),lastEditedBy:user.name});
        setEditTarget(null);
      }}
      onCancel={()=>setEditTarget(null)}
      toast2={toast2}
    />
  );

  if(sel) return(
    <div style={{maxWidth:560,margin:"0 auto"}}>
      {histOrder&&<OrderHistoryPanel order={histOrder} onClose={()=>setHistOrder(null)}/>}
      <button className="btn btn-outline" style={{marginBottom:14,padding:"7px 14px",fontSize:12}} onClick={()=>setSel(null)}>← Back</button>
      <div className="card">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18,flexWrap:"wrap",gap:8}}>
          <div>
            <div style={{fontSize:22,fontWeight:900,color:"#cc0000",marginBottom:2,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <OrderNumberEditor order={sel} orders={allOrders||orders} updOrder={updOrder} user={user} toast2={toast2} onLocalUpdate={setSel}/>
              {isFactoryOrder(sel)&&<FactoryOrderBadge/>}
            </div>
            <div style={{fontSize:12,color:"#aaa",marginBottom:2}}>{sel.id||"—"}</div>
            <div style={{fontSize:17,fontWeight:700}}>{sel.customer||"—"}</div>
            <div style={{fontSize:13,color:"#999"}}>{sel.mobile||"—"}</div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"flex-start",flexWrap:"wrap"}}>
            <StatusBadge s={sel.status}/>
            <button className="btn btn-outline" style={{padding:"5px 10px",fontSize:12}} onClick={()=>setHistOrder(sel)}><i className="ti ti-history"/>History</button>
            {["Admin"].includes(user.role)&&<button className="btn btn-outline" style={{padding:"5px 10px",fontSize:12}} onClick={()=>setEditTarget(sel)}><i className="ti ti-edit"/>Edit</button>}
            {isAdmin&&<button className="btn btn-danger" style={{padding:"5px 10px",fontSize:12}} onClick={()=>doDelete(sel)}><i className="ti ti-trash"/>Trash</button>}
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,fontSize:13,marginBottom:18}}>
          {[["Product",sel.product||"—"],["Wood",sel.wood||"—"],["Size",sel.size||"—"],["Quantity",sel.qty||"—"],
            ["Order Date",orderDateTime(sel).date],["Order Time",orderDateTime(sel).time],
            ...(["Admin","Accountant"].includes(user.role)?[
              ["Product Amount",fmtM(productTotalOf(sel))],
              ...(sel.needsDesign?[["Design Type",sel.designType||"—"],["Design Cost",fmtM(designCostOf(sel))],["Total Order Value",totalFormulaText(sel)]]:[["Total",fmtM(orderTotalOf(sel))]]),
              ["Advance",fmtM(sel.advance)],["Advance Via",sel.advPayMethod||"—"],["Pending",fmtM(sel.pending)]
            ]:[] ),
            ["Delivery",fmtD(sel.delivery)],
            ["Collection Location",collectionLocationOf(sel)],
            ...(sel.deliveredLocation?[["Collected",sel.deliveredLocation]]:[]),
            ...(sel.lastEditedAt?[["Last Edited",sel.lastEditedAt+" by "+sel.lastEditedBy]]:[])
          ].map(([k,v])=>(
            <div key={k} style={{gridColumn:k==="Last Edited"?"span 2":undefined}}>
              <div style={{fontSize:10.5,color:"#bbb",marginBottom:2}}>{k}</div>
              <div className={k==="Size"?"size-strong":""} style={{fontWeight:600,fontSize:k==="Last Edited"?11:13,color:k==="Last Edited"?"#bbb":"#1a1a1a"}}>{v}</div>
            </div>
          ))}
          {sel.notes&&<div style={{gridColumn:"span 2"}}><div style={{fontSize:10.5,color:"#bbb",marginBottom:2}}>Notes</div><div style={{color:"#555",fontSize:12}}>{sel.notes}</div></div>}
        </div>
        <div style={{display:"flex",justifyContent:"center",marginBottom:14}}><QRSvg order={sel}/></div>
        <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
          <button className="btn btn-red" onClick={()=>printQR(sel)}><i className="ti ti-printer"/>Print QR</button>
          <button className="btn btn-green" onClick={()=>downloadQR(sel)}><i className="ti ti-download"/>Download QR</button>
          <button className="btn" style={{background:"#25D366",color:"#fff",fontWeight:700}} onClick={()=>{
            sendWhatsApp(sameOrderGroup(sel,orders));
            updOrder(sel.id,{whatsappConfirmationSent:true,whatsappConfirmationSentAt:now2()});
            setSel({...sel,whatsappConfirmationSent:true,whatsappConfirmationSentAt:now2()});
            toast2("WhatsApp confirmation opened");
          }}><i className="ti ti-brand-whatsapp"/>Resend WhatsApp</button>
          {sel.status===S.DELI&&<button className="btn btn-outline" onClick={()=>printInvoice(sel)}><i className="ti ti-file-invoice"/>Invoice</button>}
        </div>

        {/* ── Other sizes sharing this order's single QR ── */}
        {sameOrderGroup(sel,orders).length>1&&(
          <div style={{marginTop:18,paddingTop:18,borderTop:"1px solid #f0ede8"}}>

                  <div>
                    <div style={{fontSize:12.5,fontWeight:700}}>{displayOrderNum(o,orders)} · <b className="size-strong-sm">{o.size}</b></div>
                    <div style={{fontSize:11,color:"#999"}}>{o.product} · {o.wood} · Qty {o.qty}</div>
                  </div>
                  <StatusBadge s={o.status}/>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ── Feedback section — only for Delivered & Paid orders ── */}
        {sel.status===S.DELI&&(
          <div style={{marginTop:18,paddingTop:18,borderTop:"1px solid #f0ede8"}}>
            <div style={{fontSize:11,fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Customer Feedback</div>

            {sel.customerRating?(
              <div style={{background:"#fafaf8",borderRadius:12,padding:14,textAlign:"center"}}>
                <div style={{fontSize:22,marginBottom:4}}>{"⭐".repeat(sel.customerRating)}</div>
                <div style={{fontSize:13,fontWeight:700,color:"#1a1a1a"}}>{sel.customerRating}/5 Rating</div>
                {sel.customerReviewText&&<div style={{fontSize:12,color:"#777",marginTop:6,fontStyle:"italic"}}>"{sel.customerReviewText}"</div>}
              </div>
            ):(
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
                <div style={{fontSize:12,color:"#999"}}>
                  {sel.feedbackSent
                    ?<><i className="ti ti-check" style={{color:"#1d9e75",marginRight:4}}/>Feedback request sent {sel.feedbackSentAt}</>
                    :"No feedback requested yet"}
                </div>
                <button className="btn" style={{background:"#25D366",color:"#fff",fontWeight:700,fontSize:13}}
                  onClick={()=>{
                    sendFeedbackRequest(sel);
                    const h=makeHistoryEntry("Google Review Request Sent","Delivery");
                    updOrderH(sel.id,{feedbackSent:true,feedbackSentAt:now2()},h);
                    setSel({...sel,feedbackSent:true,feedbackSentAt:now2()});
                    toast2("Feedback request sent on WhatsApp!");

                  <i className="ti ti-brand-whatsapp" style={{fontSize:17}}/>Send Feedback Request
                </button>
              </div>

              <div style={{marginTop:12}}>

                  {[5,4,3,2,1].map(n=>(

                <div style={{marginTop:12,padding:"11px 12px",background:"#fafaf8",borderRadius:10,fontSize:12.5,color:"#777",lineHeight:1.45}}>

                </div>
              </div>
            )}

      </div>
      {delTarget&&<DeleteConfirm order={delTarget} onCancel={()=>setDelTarget(null)} onConfirm={()=>{delOrder(delTarget.id);setDelTarget(null);setSel(null);}}/>}

  return(
    <div style={{maxWidth:1240,margin:"0 auto"}}>
      {histOrder&&<OrderHistoryPanel order={histOrder} onClose={()=>setHistOrder(null)}/>}

      <div className="orders-shell" style={{background:"#fff",border:"1px solid #edf0f4",borderRadius:16,padding:18,boxShadow:"0 16px 42px rgba(15,23,42,.07)",marginBottom:16}}>

            <div style={{fontSize:12,color:"#94a3b8",marginTop:3}}>{new Date().toLocaleDateString("en-IN",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}</div>

            <div className="orders-search" style={{position:"relative",flex:"1 1 330px",maxWidth:520}}>

            </div>
            <select className="inp orders-filter" style={{width:"auto",minWidth:190,borderRadius:14,borderColor:"#e5e7eb",background:"#fbfcfe",height:44}} value={fl} onChange={e=>setFl(e.target.value)}>
              <option value="all">All Status</option>
              <option value={S.PEND}>Pending Factory Acceptance</option>
              <option value={S.PROD}>In Production</option>

            <select className="inp orders-filter" style={{width:"auto",minWidth:150,borderRadius:14,borderColor:"#e5e7eb",background:"#fbfcfe",height:44}} value={typeFl} onChange={e=>setTypeFl(e.target.value)}>

                      <DetailChip label="Wood" icon="ti-tree" tone="#166534">{allWoods.length?allWoods.join(", "):""}</DetailChip>
                      <DetailChip label="Size" icon="ti-ruler" tone="#334155" strong>{allSizes.length?allSizes.join(", "):""}</DetailChip>

                    <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>

                      {o.product&&<span style={{display:"inline-flex",alignItems:"center",gap:5,background:"#f8fafc",border:"1px solid #eef2f7",color:"#64748b",borderRadius:999,padding:"4px 9px",fontSize:11.5,fontWeight:700}}>{o.product}</span>}
                      {o.notes&&<span style={{display:"inline-flex",alignItems:"center",gap:5,background:"#fff1f2",border:"1px solid #ffe4e6",color:"#be123c",borderRadius:999,padding:"4px 9px",fontSize:11.5,fontWeight:700}}><i className="ti ti-note" style={{fontSize:13}}/>Notes</span>}
                    </div>
                    {isAdmin&&o.status===S.DELI&&o.deliveredAt&&(()=>{const daysLeft=Math.max(0,15-Math.floor((Date.now()-parseLocaleDateMs(o.deliveredAt))/(1000*60*60*24)));return <div style={{fontSize:10.5,color:daysLeft<=3?"#dc2626":"#94a3b8",marginTop:8,fontWeight:daysLeft<=3?800:600}}><i className="ti ti-clock" style={{marginRight:3}}/>Auto-delete in {daysLeft} day{daysLeft===1?"":"s"}</div>;})()}
                  </div>

                <div className="orders-right" style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:10,minWidth:196}}>
                  {["Admin","Accountant"].includes(user.role)&&(
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:11,color:"#94a3b8",fontWeight:800,marginBottom:3}}>Total Amount</div>
                      <div style={{fontSize:23,fontWeight:950,color:"#0f172a",lineHeight:1}}>{fmtM(groupTotal)}</div>
                      <div style={{fontSize:12,color:groupPending>0?"#dc2626":"#047857",fontWeight:850,marginTop:6}}>Due {fmtM(groupPending)}</div>
                    </div>
                  )}
                  {mixedStatus
                    ?<span style={{fontSize:11.5,fontWeight:800,background:"#f8fafc",color:"#475569",border:"1px solid #e2e8f0",borderRadius:999,padding:"5px 10px"}}>Mixed Status</span>
                    :<StatusPill o={o}/>}
                  <div style={{display:"flex",gap:7,flexWrap:"wrap",justifyContent:"flex-end"}}>

                    {hasMulti&&<button title={isExpanded?"Collapse sizes":"Expand sizes"} style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:12,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#475569"}} onClick={e=>{e.stopPropagation();toggleGroup(gid);}}><i className={`ti ${isExpanded?"ti-chevron-up":"ti-chevron-down"}`} style={{fontSize:16}}/></button>}
                    <button title="More" style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:12,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#475569"}} onClick={e=>{e.stopPropagation();setHistOrder(o);}}><i className="ti ti-dots-vertical" style={{fontSize:17}}/></button>
                    {isAdmin&&<button title="Move to Trash" style={{background:"#fff7f7",border:"1px solid #fecaca",borderRadius:12,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#dc2626"}} onClick={e=>{e.stopPropagation();doDelete(o);}}><i className="ti ti-trash" style={{fontSize:16}}/></button>}
                  </div>
                </div>
              </div>
              {hasMulti&&isExpanded&&(
                <div style={{borderTop:"1px solid #edf0f4",background:"#fbfcfe",padding:"8px 14px 12px"}}>
                  {subs.map((sub,si)=>(
                    <div key={sub.id} style={{display:"grid",gridTemplateColumns:"minmax(0,1fr) auto",gap:12,alignItems:"center",padding:"10px 8px",borderBottom:si<subs.length-1?"1px solid #edf0f4":"none"}}>
                      <div onClick={()=>setSel(sub)} style={{display:"flex",alignItems:"center",gap:10,minWidth:0,cursor:"pointer"}}>
                        {isAdmin&&bulkMode&&(
                          <div onClick={e=>{e.stopPropagation();setSelectedIds(p=>{const n=new Set(p);n.has(sub.id)?n.delete(sub.id):n.add(sub.id);return n;});}} style={{width:22,height:22,borderRadius:7,border:`2px solid ${selectedIds.has(sub.id)?"#111827":"#cbd5e1"}`,background:selectedIds.has(sub.id)?"#111827":"#fff",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}>
                            {selectedIds.has(sub.id)&&<i className="ti ti-check" style={{fontSize:13,color:"#fff"}}/>}
                          </div>
                        )}
                        <div style={{width:34,height:34,borderRadius:11,background:"#eef2ff",color:"#4338ca",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:900,flexShrink:0}}>S{si+2}</div>
                        <div style={{minWidth:0}}>
                          <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap",fontSize:12.5,fontWeight:800,color:"#0f172a"}}>
                            {isFactoryOrder(sub)&&<FactoryOrderBadge/>}
                            {sub.wood&&<span>{sub.wood}</span>}
                            {sub.size&&<b className="size-strong-sm">{sub.size}</b>}
                            {sub.qty&&<span>Qty {sub.qty}</span>}
                            {designChips(sub).map(chip=><span key={chip} style={{background:"#fff7ed",border:"1px solid #fed7aa",color:"#c2410c",borderRadius:999,padding:"2px 7px",fontSize:10.5,fontWeight:800}}>{chip}</span>)}
                          </div>
                          <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>{sub.id}{collectionLocationOf(sub)!=="—"?` · ${collectionLocationOf(sub)}`:""}</div>
                        </div>
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:8,justifyContent:"flex-end",flexWrap:"wrap"}}>
                        {["Admin","Accountant"].includes(user.role)&&<div style={{textAlign:"right",fontSize:12}}>
                          <div style={{fontWeight:850,color:"#0f172a"}}>{fmtM(orderTotalOf(sub))}</div>
                          {sub.pending>0&&<div style={{fontSize:11,color:"#dc2626",fontWeight:800}}>Due {fmtM(sub.pending)}</div>}
                        </div>}
                        <StatusPill o={sub}/>
                        <button title="More" style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:11,width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#475569"}} onClick={e=>{e.stopPropagation();setHistOrder(sub);}}><i className="ti ti-dots-vertical" style={{fontSize:15}}/></button>
                        {isAdmin&&<button title="Move to Trash" style={{background:"#fff7f7",border:"1px solid #fecaca",borderRadius:11,width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#dc2626"}} onClick={e=>{e.stopPropagation();doDelete(sub);}}><i className="ti ti-trash" style={{fontSize:15}}/></button>}
                      </div>
                    </div>
                  ))}
                  {["Admin","Accountant"].includes(user.role)&&(
                    <div style={{display:"flex",justifyContent:"flex-end",alignItems:"center",gap:16,padding:"10px 8px 0",fontSize:12,color:"#64748b"}}>
                      <span>{groupOrders.length} items total</span>
                      <span style={{fontWeight:850,color:"#0f172a"}}>Group Total: {fmtM(groupTotal)}</span>
                      {groupPending>0&&<span style={{fontWeight:850,color:"#dc2626"}}>Due: {fmtM(groupPending)}</span>}
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })}
      </div>
      <style>{`
        @media(max-width:920px){
          .orders-header{align-items:flex-start!important}
          .orders-toolbar{width:100%;justify-content:flex-start!important}
          .orders-search{max-width:none!important;flex-basis:100%!important}
