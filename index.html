const fmtM=n=>"₹"+Number(n||0).toLocaleString("en-IN");
const fmtD=d=>d?new Date(d).toLocaleDateString("en-IN"):"—";
const fmtON=n=>n?"#"+String(n).padStart(3,"0"):"—";
// Formats a bare order number with the correct prefix for its source — "#100" for Office, "F100" for Factory.
const fmtONForSource=(n,source)=>n?(source==="Factory"?"F":"#")+String(n).padStart(3,"0"):"—";
const collectionLocationOf=o=>o&&o.deliveryCollectionLocation?o.deliveryCollectionLocation:(o&&o.deliveredLocation?(o.deliveredLocation==="At Production"?"Factory Pickup":o.deliveredLocation==="At Office"?"Office Pickup":o.deliveredLocation):"—");
// Source of an order — "Factory" or "Office". Falls back to legacy fields for records created before orderSource existed.
const orderSourceOf=o=>(o&&o.orderSource)?o.orderSource:(o&&o.createdFromFactory?"Factory":"Office");
const isFactoryOrder=o=>orderSourceOf(o)==="Factory";

// ── Push relay: alert Factory Staff/Admin devices the moment an Office order is created ──
// Browsers can't call OneSignal's send-notification API directly (it's blocked by CORS),
// so this calls a tiny Cloudflare Worker instead, which forwards the request to OneSignal
// server-to-server. The Worker also keeps the OneSignal REST API key out of this file
// entirely — see the setup notes for how the Worker is configured.
const notifyFactoryOfNewOrder=async order=>{
  if(!ONESIGNAL_READY) return;
  try{
    await fetch(PUSH_RELAY_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        orderLabel:fmtONForSource(order.orderNum,orderSourceOf(order)),
        customer:order.customer||"a customer",
        url:location.origin+location.pathname+"?view=factory"
      })
    });
  }catch(e){console.error("Push relay failed:",e);}
};
const orderSuffixForIndex=i=>i>0?String.fromCharCode(65+i):"";
const orderGroupIndex=(o,orders=[])=>{
  if(!o) return 0;
  const gid=o.groupId||o.id;
  const group=orders.filter(x=>(x.groupId||x.id)===gid).sort((a,b)=>(parseLocaleDateMs(a.created)||0)-(parseLocaleDateMs(b.created)||0)||String(a.id).localeCompare(String(b.id)));
  const idx=group.findIndex(x=>x.id===o.id);
  return idx<0?0:idx;
};
// Displays the order number. Factory orders replace the "#" with "F" (e.g. F100) so Office #100 and Factory #100 are visually distinct everywhere.
const displayOrderNum=(o,orders=[])=>{
  if(!o) return "—";
  const base=o.orderNum||sameOrderGroup(o,orders).find(x=>x.orderNum)?.orderNum;
  if(!base) return o.id||"—";
  const suffix=o.orderSuffix!==undefined&&o.orderSuffix!==null?o.orderSuffix:orderSuffixForIndex(orderGroupIndex(o,orders));
  const padded=String(base).padStart(3,"0")+(suffix||"");
  return (isFactoryOrder(o)?"F":"#")+padded;
};
// Order numbers are unique per (orderNumber + orderSource) — an Office order and a Factory order can share the same number.
// Orders sharing a groupId (multi-item orders created together) are exempt from colliding with each other.
const orderNumberTaken=(num,source,orders,excludeOrderId,excludeGroupId)=>{
  if(!num) return false;
  return orders.some(o=>{
    if(excludeOrderId&&o.id===excludeOrderId) return false;
    const gid=o.groupId||o.id;
    if(excludeGroupId&&gid===excludeGroupId) return false;
    return o.orderNum===num&&orderSourceOf(o)===source;
  });
};
const matchesOrderNumber=(o,text,orders=[])=>{
  const t=String(text||"").trim().toLowerCase();
  if(!o||!t||!o.orderNum) return false;
  const shown=displayOrderNum(o,orders).toLowerCase();
  const raw=(isFactoryOrder(o)?"f":"")+String(o.orderNum).toLowerCase()+String(o.orderSuffix||"").toLowerCase();
  return String(o.orderNum)===t||fmtON(o.orderNum).toLowerCase()===t||("#"+String(o.orderNum))===t||shown===t||shown.replace("#","")===t||raw===t;
};
const designCostOf=o=>Number(o&&o.needsDesign?o.designCost:0)||0;
const productTotalOf=o=>{
  if(o&&o.productTotal!==undefined&&o.productTotal!==null&&o.productTotal!=="") return Number(o.productTotal)||0;
  return Math.max(0,(Number(o&&o.total)||0)-designCostOf(o));
};
const orderTotalOf=o=>productTotalOf(o)+designCostOf(o);
const totalFormulaText=o=>`${fmtM(productTotalOf(o))}${designCostOf(o)>0?` + ${fmtM(designCostOf(o))}`:""} = ${fmtM(orderTotalOf(o))}`;
const isTrashed=o=>!!(o&&o.deleted);
// ── Wholesale helpers ── Wholesale orders live in the exact same "orders" collection as retail orders
// (same status pipeline, same production/delivery flow) but are tagged orderType:"Wholesale" and linked
// to a wholesaleCustomerId, so they stay filterable/separable while still counting in overall revenue & reports.
const orderTypeOf=o=>(o&&o.orderType)?o.orderType:"Retail";
const isWholesaleOrder=o=>orderTypeOf(o)==="Wholesale";
// Amount actually collected for an order at delivery time (excludes any advance already collected earlier).
const deliveryPaymentOf=o=>o&&o.status===S.DELI?Math.max(0,orderTotalOf(o)-Number(o.advance||0)-Number(o.pending||0)):0;
// Chronological list of money-in events for one order: an advance (if any) taken at order time, plus a delivery payment (if delivered).
const transactionsForOrder=o=>{
  const t=[];
  if(Number(o.advance)>0) t.push({id:o.id+"-adv",orderId:o.id,type:"Advance",amount:Number(o.advance),method:o.advPayMethod||"Cash",date:o.created,ts:parseLocaleDateMs(o.created)||0});
  const delivAmt=deliveryPaymentOf(o);
  if(delivAmt>0) t.push({id:o.id+"-pay",orderId:o.id,type:o.status===S.DELI&&o.pending>0?"Partial Payment":"Final Payment",amount:delivAmt,method:o.payMethod||"—",date:o.payAt||o.deliveredAt,ts:parseLocaleDateMs(o.payAt||o.deliveredAt)||0});
  return t;
};
const backupFileName=()=>`hsm-orders-backup-${new Date().toISOString().slice(0,10)}.json`;
function exportOrdersBackup(orders){
  const payload={
    app:"Hanuman Saw Mill",
    exportedAt:new Date().toISOString(),
    totalOrders:orders.length,
    activeOrders:orders.filter(o=>!isTrashed(o)).length,

    orders
  };
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=backupFileName();
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
const orderDateTime=o=>{
  const raw=o&&o.created;
  if(!raw) return {date:"—",time:"—",label:"—"};
  const parts=String(raw).split(",");
  const date=parts[0]?parts[0].trim():"—";
  const time=parts.slice(1).join(",").trim()||"—";
  return {date,time,label:time==="—"?date:`${date} · ${time}`};
};
const sameOrderGroup=(o,orders)=>{
  if(!o) return [];
  const gid=o.groupId||o.id;
  const group=orders.filter(x=>(x.groupId||x.id)===gid);
  return group.length?group:[o];
};
// All members of an order's group (all size/sub-item variants), sorted oldest-first (primary item first).
const groupMembers=(o,orders)=>sameOrderGroup(o,orders).slice().sort((a,b)=>(parseLocaleDateMs(a.created)||0)-(parseLocaleDateMs(b.created)||0)||String(a.id).localeCompare(String(b.id)));
// Resolve scanned QR text (now the group id) or a manually typed order#/ID/mobile to the FULL order group —
// every size/sub-item that belongs to that order — so a single scan surfaces everything for that order.
const findGroupByText=(text,orders)=>{
  const t=String(text||"").trim();
  if(!t) return null;
  const o=orders.find(x=>x.id===t||x.groupId===t||x.mobile===t||matchesOrderNumber(x,t,orders));
  return o?groupMembers(o,orders):null;
};
function normalizeOrderNumbers(list){
  const groups={};
  list.forEach(o=>{
    const gid=o.groupId||o.id;
    if(!groups[gid]) groups[gid]=[];
    groups[gid].push(o);
  });
  return list.map(o=>{
    const gid=o.groupId||o.id;
    const group=(groups[gid]||[o]).slice().sort((a,b)=>(parseLocaleDateMs(a.created)||0)-(parseLocaleDateMs(b.created)||0)||String(a.id).localeCompare(String(b.id)));
    const baseHolder=group.find(x=>x.orderNum);
    const base=baseHolder?baseHolder.orderNum:o.orderNum;
    const idx=group.findIndex(x=>x.id===o.id);
    if(!base) return o;
    const suffix=orderSuffixForIndex(idx<0?0:idx);
    return {...o,orderNum:base,orderSuffix:o.orderSuffix!==undefined?o.orderSuffix:suffix};
  });
}

// QR encodes ONLY the order's GROUP id (the primary/diary number's id) — one QR represents the WHOLE
// order, including every size/sub-item variant (38, 38B, 38C, ...). No more per-size QR codes.
function buildQRText(o){return o.groupId||o.id;}

function drawQROnCanvas(canvas,text,size){
  try{
    const qr=qrcode(0,"M");qr.addData(text);qr.make();
    const count=qr.getModuleCount(),cell=Math.floor(size/count),actual=cell*count;
    canvas.width=actual;canvas.height=actual;
    const ctx=canvas.getContext("2d");
    ctx.fillStyle="#fff";ctx.fillRect(0,0,actual,actual);
    ctx.fillStyle="#000";
    for(let r=0;r<count;r++)for(let c=0;c<count;c++)if(qr.isDark(r,c))ctx.fillRect(c*cell,r*cell,cell,cell);
    return canvas;
  }catch(e){console.error("QR error",e);return null;}
}

function QRSvg({order,size=180}){
  const ref=useRef(null);
  useEffect(()=>{if(!ref.current||!order)return;drawQROnCanvas(ref.current,buildQRText(order),size);},[order&&order.id,size]);
  if(!order)return null;
  return <canvas ref={ref} style={{display:"block",imageRendering:"pixelated",width:size,height:size}}/>;
}

function downloadQR(o){
  const size=220,padX=24,padTop=o.orderNum?72:56,padBot=48;
  const W=size+padX*2,H=size+padTop+padBot;
  const out=document.createElement("canvas");out.width=W;out.height=H;
  const ctx=out.getContext("2d");
  ctx.fillStyle="#fff";ctx.fillRect(0,0,W,H);
  ctx.strokeStyle="#cc0000";ctx.lineWidth=3;ctx.beginPath();ctx.roundRect(2,2,W-4,H-4,12);ctx.stroke();
  ctx.fillStyle="#cc0000";ctx.font="bold 22px Arial";ctx.textAlign="center";ctx.fillText("HSM",W/2,26);
  ctx.fillStyle="#999";ctx.font="8px Arial";ctx.fillText("HANUMAN SAW MILL",W/2,38);
  if(o.orderNum){ctx.fillStyle="#cc0000";ctx.font="bold 17px Arial";ctx.fillText("Order "+displayOrderNum(o),W/2,58);}
  const tmp=document.createElement("canvas");
  if(!drawQROnCanvas(tmp,buildQRText(o),size)){alert("QR failed");return;}
  ctx.drawImage(tmp,padX,padTop,size,size);
  ctx.fillStyle="#1a1a1a";ctx.font="bold 11px Arial";ctx.fillText(o.id,W/2,padTop+size+14);
  ctx.fillStyle="#555";ctx.font="10px Arial";ctx.fillText(o.customer+" · "+o.mobile,W/2,padTop+size+28);
  const a=document.createElement("a");a.download="QR-"+o.id+".png";a.href=out.toDataURL("image/png");a.click();
}

  <div class="row" style="border:none"><span>Wood</span><span>${o.wood}</span></div>

  w.document.close();
}

function printMultiQR(orderList){
  const canvases=orderList.map(o=>{
    const tmp=document.createElement("canvas");
    if(!drawQROnCanvas(tmp,buildQRText(o),160)) return null;
    return {order:o,dataUrl:tmp.toDataURL("image/png")};
  }).filter(Boolean);
  if(!canvases.length){alert("QR generation failed");return;}
  const w=window.open("","_blank");
  const labels=canvases.map(({order:o,dataUrl})=>`
    <div class="label">
      <div class="hsm">HSM</div>

// ── SHARED QR SCANNER COMPONENT (getUserMedia + jsQR — works across mobile/laptop/tablet) ──
function QRScanner({onResult,onError}){
  const vidRef=useRef(null);
  const canvasRef=useRef(null);
  const streamRef=useRef(null);
  const rafRef=useRef(null);
  const lastRef=useRef("");
  const [active,setActive]=useState(false);
  const [err,setErr]=useState("");
  const [devices,setDevices]=useState([]);
  const [deviceId,setDeviceId]=useState("");

  // Enumerate cameras once (helps on tablets/laptops with multiple cameras)
  useEffect(()=>{
    if(!navigator.mediaDevices?.enumerateDevices) return;
    navigator.mediaDevices.enumerateDevices().then(list=>{
      const cams=list.filter(d=>d.kind==="videoinput");
      setDevices(cams);
    }).catch(()=>{});
  },[]);

  const stop=useCallback(()=>{
    if(rafRef.current){cancelAnimationFrame(rafRef.current);rafRef.current=null;}
    if(streamRef.current){streamRef.current.getTracks().forEach(t=>t.stop());streamRef.current=null;}
    if(vidRef.current){vidRef.current.srcObject=null;}
    setActive(false);
  },[]);

  const tick=useCallback(()=>{
    const video=vidRef.current,canvas=canvasRef.current;
    if(!video||!canvas){rafRef.current=requestAnimationFrame(tick);return;}
    if(video.readyState===video.HAVE_ENOUGH_DATA && video.videoWidth>0){
      canvas.width=video.videoWidth;
      canvas.height=video.videoHeight;
      const ctx=canvas.getContext("2d",{willReadFrequently:true});
      ctx.drawImage(video,0,0,canvas.width,canvas.height);
      try{
        const img=ctx.getImageData(0,0,canvas.width,canvas.height);
        if(window.jsQR){
          const code=window.jsQR(img.data,img.width,img.height,{inversionAttempts:"attemptBoth"});
          if(code&&code.data){
            if(code.data!==lastRef.current){
              lastRef.current=code.data;
              stop();
              onResult(code.data);
              return;
            }
          }
        }
      }catch(e){/* ignore frame errors */}
    }
    rafRef.current=requestAnimationFrame(tick);
  },[onResult,stop]);

  const start=useCallback(async(forceDeviceId)=>{
    setErr("");
    if(!window.jsQR){setErr("Scanner library still loading — please wait a moment and tap Start again.");return;}
    if(!navigator.mediaDevices?.getUserMedia){setErr("Camera not supported on this browser.");return;}
    try{
      // Stop any existing stream first
      if(streamRef.current){streamRef.current.getTracks().forEach(t=>t.stop());streamRef.current=null;}
      const idToUse=forceDeviceId||deviceId;
      const constraints=idToUse
        ?{video:{deviceId:{exact:idToUse}}}
        :{video:{facingMode:{ideal:"environment"}}};
      let stream;
      try{
        stream=await navigator.mediaDevices.getUserMedia(constraints);
      }catch(e1){
        // Fallback to any camera if the preferred one fails
        stream=await navigator.mediaDevices.getUserMedia({video:true});
      }
      streamRef.current=stream;
      lastRef.current="";
      const video=vidRef.current;
      video.srcObject=stream;
      video.setAttribute("playsinline","true");
      video.setAttribute("muted","true");
      video.muted=true;
      await video.play().catch(()=>{});
      // refresh device list with labels now that permission is granted
      if(navigator.mediaDevices?.enumerateDevices){
        navigator.mediaDevices.enumerateDevices().then(list=>{
          setDevices(list.filter(d=>d.kind==="videoinput"));
        }).catch(()=>{});
      }
      setActive(true);
      rafRef.current=requestAnimationFrame(tick);
    }catch(e){
      console.error("Camera error",e);
      let msg="Camera access denied. Please allow camera permission in your browser settings and try again.";
      if(e.name==="NotFoundError") msg="No camera found on this device.";
      if(e.name==="NotAllowedError") msg="Camera permission denied. Please allow camera access for this site.";
      if(e.name==="NotReadableError") msg="Camera is being used by another app. Close it and try again.";
      setErr(msg);
      if(onError) onError(e);
      setActive(false);
    }
  },[deviceId,tick,onResult,onError]);

  useEffect(()=>()=>stop(),[stop]);

  const switchCamera=e=>{
    const id=e.target.value;
    setDeviceId(id);
    if(active) start(id);
  };

  return(
    <div>
      <div style={{background:"#1a1a1a",borderRadius:13,overflow:"hidden",marginBottom:12,position:"relative",minHeight:240}}>
        <video ref={vidRef} playsInline muted autoPlay style={{width:"100%",display:"block",maxHeight:280,objectFit:"cover"}}/>
        <canvas ref={canvasRef} style={{display:"none"}}/>
        {!active&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:8}}>
          <i className="ti ti-qrcode" style={{fontSize:48,color:"#444"}}/>
          <div style={{color:"#666",fontSize:13}}>Camera not active</div>
        </div>}
        {active&&<div style={{position:"absolute",inset:0,pointerEvents:"none"}}>
          <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:190,height:190,border:"3px solid #cc0000",borderRadius:14,boxShadow:"0 0 0 9999px rgba(0,0,0,.35)"}}/>
          <div style={{position:"absolute",bottom:12,width:"100%",textAlign:"center",color:"#fff",fontSize:12,fontWeight:600,textShadow:"0 1px 3px rgba(0,0,0,.8)"}}>Point camera at QR code</div>
        </div>}
      </div>
      {err&&<div style={{background:"#fff8f8",border:"1px solid #ffe0e0",borderRadius:10,padding:"10px 14px",fontSize:12,color:"#cc0000",marginBottom:12}}>{err}</div>}
      {devices.length>1&&<select className="inp" style={{marginBottom:10}} value={deviceId} onChange={switchCamera}>
        <option value="">Auto (Back Camera)</option>
        {devices.map((d,i)=><option key={d.deviceId} value={d.deviceId}>{d.label||`Camera ${i+1}`}</option>)}
      </select>}
      {!active
        ?<button className="btn btn-red" style={{width:"100%",justifyContent:"center"}} onClick={()=>start()}><i className="ti ti-camera"/>Start Camera Scan</button>
        :<button className="btn btn-outline" style={{width:"100%",justifyContent:"center"}} onClick={stop}><i className="ti ti-player-stop"/>Stop Camera</button>}
    </div>
  );
}

function Login({onLogin}){
  const [u,setU]=useState(""),[p,setP]=useState(""),[err,setErr]=useState(""),[busy,setBusy]=useState(false);
  const go=async e=>{
    e.preventDefault();
    setErr("");
    if(!window.auth){setErr("Cloud login isn't set up yet — check your connection.");return;}
    setBusy(true);
    try{
      const cred=await window.auth.signInWithEmailAndPassword(usernameToEmail(u),p);
      const doc=await window.db.collection("users").doc(cred.user.uid).get();
      if(!doc.exists){
        setErr("Account has no profile set up. Contact your Admin.");
        await window.auth.signOut();
        setBusy(false);
        return;
      }
      onLogin({uid:cred.user.uid,...doc.data()});
    }catch(e){
      setErr("Invalid username or password");
      setBusy(false);
    }
  };
  return(
    <div style={{minHeight:"100vh",background:"#1a1a1a",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:"#fff",borderRadius:20,padding:"40px 32px",width:"100%",maxWidth:360,textAlign:"center"}}>
        <div style={{fontSize:54,fontWeight:900,color:"#cc0000",letterSpacing:3,lineHeight:1}}>HSM</div>
        <div style={{fontSize:11,color:"#aaa",letterSpacing:2,marginTop:4,marginBottom:28}}>HANUMAN SAW MILL</div>
        <form onSubmit={go} style={{display:"flex",flexDirection:"column",gap:12,textAlign:"left"}}>
          <div><label style={{fontSize:12,fontWeight:600,color:"#666",display:"block",marginBottom:4}}>Username</label>
            <input className="inp" value={u} onChange={e=>setU(e.target.value)} placeholder="Enter username" autoFocus disabled={busy}/></div>
          <div><label style={{fontSize:12,fontWeight:600,color:"#666",display:"block",marginBottom:4}}>Password</label>
            <input type="password" className="inp" value={p} onChange={e=>setP(e.target.value)} placeholder="Enter password" disabled={busy}/></div>
          {err&&<div style={{color:"#cc0000",fontSize:12,fontWeight:500}}>{err}</div>}
          <button type="submit" className="btn btn-red" style={{justifyContent:"center",marginTop:4,opacity:busy?.6:1}} disabled={busy}>{busy?"Signing in...":"Sign In"}</button>
        </form>
      </div>
    </div>
  );
}

// ── SHELL ──
function App(){
  const [user,setUser]=useState(null);
  const [authChecked,setAuthChecked]=useState(!window.auth); // if no auth configured, skip straight to login
  const [page,setPage]=useState("dashboard");
  const [orders,setOrders]=useState([]);
  const [wholesaleCustomers,setWholesaleCustomers]=useState([]);
  const [toast,setToast]=useState(null);
  const [menuOpen,setMenuOpen]=useState(false);
  const [loading,setLoading]=useState(false);
  const [dbMode]=useState(!!window.db);

  // Restore the signed-in staff member automatically (persisted login) —
  // this is what lets someone stay logged in after closing/reopening the app.
  useEffect(()=>{
    if(!window.auth){return;}
    const unsub=window.auth.onAuthStateChanged(async fbUser=>{
      if(!fbUser){setUser(null);setAuthChecked(true);return;}
      try{
        const doc=await window.db.collection("users").doc(fbUser.uid).get();
        if(doc.exists) setUser({uid:fbUser.uid,...doc.data()});
        else{await window.auth.signOut();setUser(null);}
      }catch(e){setUser(null);}
      setAuthChecked(true);
    });
    return()=>unsub();
  },[]);

  useEffect(()=>{
    if(!window.db||!user)return;
    setLoading(true);
    const unsub=window.db.collection("orders").orderBy("createdTs","desc").onSnapshot(snap=>{
      const docs=normalizeOrderNumbers(snap.docs.map(d=>({...d.data(),id:d.id})));
      setOrders(docs);
      setLoading(false);
      const deliveredCutoff=Date.now()-15*24*60*60*1000;
      docs.filter(o=>o.status===S.DELI&&Number(o.pending||0)===0&&o.deliveredAt).forEach(o=>{
        const parsed=parseLocaleDateMs(o.deliveredAt);
        if(parsed&&parsed<deliveredCutoff) window.db.collection("orders").doc(o.id).delete().catch(()=>{});
      });
      // ── Auto-permanently-delete trash older than 30 days ──
      const cutoff=Date.now()-30*24*60*60*1000;
      docs.filter(o=>o.deleted&&o.deletedAt).forEach(o=>{
        // parse deletedAt (en-IN locale string like "29/6/2026, 10:15:00 am")
        const parsed=parseLocaleDateMs(o.deletedAt);
        if(parsed&&parsed<cutoff){
          window.db.collection("orders").doc(o.id).delete().catch(()=>{});
        }
      });
    },err=>{console.error(err);setLoading(false);});
    return()=>unsub();
  },[user]);

  useEffect(()=>{if(!window.db)setOrders(normalizeOrderNumbers(SEED));},[]);

  // ── OneSignal: tag this device as "factory" so Factory Staff AND Admin receive
  // new-order push notifications (Office/Accounts do not). Tagging can happen
  // automatically, but browsers block auto-triggered permission prompts — that
  // part needs an actual click, handled by the banner below. ──
  const [pushPermission,setPushPermission]=useState(null); // null=unknown, "granted"/"denied"/"default"
  useEffect(()=>{
    if(!user||!ONESIGNAL_READY) return;
    if(user.role!=="Factory Staff"&&user.role!=="Admin") return;
    window.OneSignalDeferred=window.OneSignalDeferred||[];
    window.OneSignalDeferred.push(async OneSignal=>{
      try{
        await OneSignal.User.addTag("role","factory");
        setPushPermission(OneSignal.Notifications.permission?"granted":(Notification&&Notification.permission==="denied"?"denied":"default"));
      }catch(e){console.error("OneSignal tagging failed:",e);}
    });
  },[user]);

  const enablePushNotifications=()=>{
    window.OneSignalDeferred=window.OneSignalDeferred||[];
    window.OneSignalDeferred.push(async OneSignal=>{
      try{
        await OneSignal.Notifications.requestPermission();
        setPushPermission(OneSignal.Notifications.permission?"granted":"denied");
      }catch(e){console.error("Permission request failed:",e);}
    });
  };

  // ── Deep link: tapping a "new order" push opens the app straight to Factory View ──
  useEffect(()=>{
    if(!user) return;
    const params=new URLSearchParams(window.location.search);
    if(params.get("view")==="factory"&&(user.role==="Factory Staff"||user.role==="Admin")){
      setPage("factory");
      const cleanUrl=window.location.origin+window.location.pathname;
      window.history.replaceState({},"",cleanUrl);
    }
  },[user]);

  // ── Wholesale customer directory — synced the same way as orders, so the ~20-25 regular
  // wholesale firms are saved permanently and available on every device. ──
  useEffect(()=>{
    if(!window.db||!user)return;
    const unsub=window.db.collection("wholesaleCustomers").orderBy("firmName").onSnapshot(snap=>{
      setWholesaleCustomers(snap.docs.map(d=>({...d.data(),id:d.id})));
    },err=>console.error(err));
    return()=>unsub();
  },[user]);

  const addWholesaleCustomer=async c=>{
    const rec={...c,id:c.id||genId(),createdAt:now2(),createdBy:user.name,active:true};
    if(window.db){try{await window.db.collection("wholesaleCustomers").doc(rec.id).set(rec);toast2("Wholesale customer saved!");}catch(e){toast2("Save failed: "+e.message,"err");}}
    else{setWholesaleCustomers(p=>[...p,rec].sort((a,b)=>a.firmName.localeCompare(b.firmName)));toast2("Wholesale customer saved (local only)");}
    return rec;
  };
  const updWholesaleCustomer=async(id,patch)=>{
    if(window.db){try{await window.db.collection("wholesaleCustomers").doc(id).update(patch);toast2("Customer updated");}catch(e){toast2("Update failed","err");}}
    else{setWholesaleCustomers(p=>p.map(c=>c.id===id?{...c,...patch}:c));toast2("Customer updated");}
  };
  const delWholesaleCustomer=async id=>{
    if(user.role!=="Admin"){toast2("Only Admin can remove wholesale customers","err");return;}
    if(window.db){try{await window.db.collection("wholesaleCustomers").doc(id).update({active:false});toast2("Customer archived");}catch(e){toast2("Archive failed","err");}}
    else{setWholesaleCustomers(p=>p.map(c=>c.id===id?{...c,active:false}:c));toast2("Customer archived");}
  };

  useEffect(()=>{
    if(window.db) return;
    const deliveredCutoff=Date.now()-15*24*60*60*1000;
    const trashCutoff=Date.now()-30*24*60*60*1000;
    setOrders(p=>p.filter(o=>{
      const deliveredMs=parseLocaleDateMs(o.deliveredAt);
      const deletedMs=parseLocaleDateMs(o.deletedAt);
      if(o.status===S.DELI&&Number(o.pending||0)===0&&deliveredMs&&deliveredMs<deliveredCutoff) return false;
      if(o.deleted&&deletedMs&&deletedMs<trashCutoff) return false;
      return true;
    }));
  },[]);

  const toast2=(msg,type="ok")=>{setToast({msg,type});setTimeout(()=>setToast(null),3500);};

  const addOrder=async o=>{
    const dept=orderSourceOf(o);
    const h1=makeHistoryEntry("Order Created",dept);
    // Brief pause to stagger timestamps
    const h2=makeHistoryEntry(dept==="Factory"?"Created at Factory":"Sent to Factory",dept);
    const orderWithHistory={...o,history:[h1,h2]};
    if(window.db){
      try{await window.db.collection("orders").doc(o.id).set({...orderWithHistory,createdTs:firebase.firestore.FieldValue.serverTimestamp()});toast2("Order saved to cloud!");}
      catch(e){toast2("Save failed: "+e.message,"err");}
    }else{setOrders(p=>[orderWithHistory,...p]);toast2("Order created (local only)");}
    // Office-created orders need Factory to accept them — ping Factory Staff devices.
    // Orders created directly at the Factory don't need this (Factory already knows).
    if(dept==="Office") notifyFactoryOfNewOrder(orderWithHistory);
  };

  const updOrder=async(id,patch)=>{
    if(window.db){try{await window.db.collection("orders").doc(id).update(patch);}catch(e){toast2("Update failed","err");}}
    else setOrders(p=>p.map(o=>o.id===id?{...o,...patch}:o));
  };

  // updOrderH — same as updOrder but also appends a history entry
  const updOrderH=async(id,patch,histEntry)=>{
    if(histEntry){
      const fullPatch=window.db
        ?{...patch,history:firebase.firestore.FieldValue.arrayUnion(histEntry)}
        :{...patch};
      if(window.db){try{await window.db.collection("orders").doc(id).update(fullPatch);}catch(e){toast2("Update failed","err");}}
      else setOrders(p=>p.map(o=>o.id===id?{...o,...fullPatch,history:[...(o.history||[]),histEntry]}:o));
    } else {
      await updOrder(id,patch);
    }
  };

  const delOrder=async id=>{
    if(user.role!=="Admin"){toast2("Only Admin can delete orders","err");return;}
    const patch={deleted:true,deletedAt:now2(),deletedBy:user.name};
    if(window.db){try{await window.db.collection("orders").doc(id).update(patch);toast2("Order moved to Trash");}catch(e){toast2("Move to Trash failed","err");}}
    else{setOrders(p=>p.map(o=>o.id===id?{...o,...patch}:o));toast2("Order moved to Trash");}
  };

  const bulkDelOrders=async ids=>{
    if(user.role!=="Admin"){toast2("Only Admin can delete orders","err");return;}
    const unique=[...new Set(ids)].filter(Boolean);
    if(!unique.length)return;
    const patch={deleted:true,deletedAt:now2(),deletedBy:user.name};
    if(window.db){
      try{
        const batch=window.db.batch();
        unique.forEach(id=>batch.update(window.db.collection("orders").doc(id),patch));
        await batch.commit();
        toast2(unique.length+" order"+(unique.length===1?"":"s")+" moved to Trash");
      }catch(e){toast2("Bulk delete failed","err");}
    }else{
      setOrders(p=>p.map(o=>unique.includes(o.id)?{...o,...patch}:o));
      toast2(unique.length+" order"+(unique.length===1?"":"s")+" moved to Trash");
    }
  };

  const restoreOrder=async id=>{
    const patch={deleted:false,restoredAt:now2(),restoredBy:user.name};
    if(window.db){try{await window.db.collection("orders").doc(id).update(patch);toast2("Order restored");}catch(e){toast2("Restore failed","err");}}
    else{setOrders(p=>p.map(o=>o.id===id?{...o,...patch}:o));toast2("Order restored");}
  };

  const permanentDeleteOrder=async id=>{
    if(user.role!=="Admin"){toast2("Only Admin can permanently delete","err");return;}
    if(window.db){try{await window.db.collection("orders").doc(id).delete();toast2("Order permanently deleted");}catch(e){toast2("Permanent delete failed","err");}}
    else{setOrders(p=>p.filter(o=>o.id!==id));toast2("Order permanently deleted");}
  };

  if(!authChecked)return(
    <div style={{minHeight:"100vh",background:"#1a1a1a",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{color:"#666",fontSize:13}}>Checking session...</div>
    </div>
  );
  if(!user)return <Login onLogin={u=>{setUser(u);setPage("dashboard");}}/>;

  const activeOrders=orders.filter(o=>!isTrashed(o));
  const trashedOrders=orders.filter(isTrashed);

  const ALL_NAV=[
    {id:"dashboard",icon:"ti-layout-dashboard",label:"Dashboard",roles:["all"]},
    {id:"new-order",icon:"ti-plus-circle",label:"New Order",roles:["Admin","Office Staff"]},
    {id:"orders",icon:"ti-list",label:"All Orders",roles:["all"]},
    {id:"factory",icon:"ti-tool",label:"Factory View",roles:["Admin","Factory Staff"]},
    {id:"design",icon:"ti-ruler-2",label:"Design",roles:["all"]},
    {id:"wholesale",icon:"ti-building-store",label:"Wholesale",roles:["all"]},
    {id:"receive",icon:"ti-qrcode",label:"Receive / Scan",roles:["Admin","Office Staff"]},
    {id:"deliver",icon:"ti-truck-delivery",label:"Deliver & Pay",roles:["Admin","Office Staff"]},
    {id:"reports",icon:"ti-report",label:"Reports",roles:["Admin","Accountant"]},
    {id:"trash",icon:"ti-trash",label:"Trash",roles:["Admin"]},
  ].filter(n=>n.roles.includes("all")||n.roles.includes(user.role));

  const goto=p=>{setPage(p);setMenuOpen(false);};

  return(
    <div style={{display:"flex",height:"100vh",overflow:"hidden",background:"#f5f5f3"}}>
      {menuOpen&&<div className="overlay" style={{display:"none",position:"fixed",inset:0,background:"rgba(0,0,0,.4)",zIndex:199}} onClick={()=>setMenuOpen(false)}/>}
      <aside className={`sidebar${menuOpen?" open":""}`} style={{width:220,background:"#1a1a1a",display:"flex",flexDirection:"column",padding:"18px 10px",flexShrink:0,zIndex:200,overflowY:"auto"}}>
        <div style={{textAlign:"center",padding:"6px 0 18px",borderBottom:"1px solid #2a2a2a",marginBottom:14}}>
          <div style={{fontSize:30,fontWeight:900,color:"#cc0000",letterSpacing:2}}>HSM</div>
          <div style={{fontSize:9,color:"#555",letterSpacing:1.5,marginTop:2}}>HANUMAN SAW MILL</div>
        </div>
        <nav style={{flex:1,display:"flex",flexDirection:"column",gap:2}}>
          {ALL_NAV.map(n=>{
            const pendingDesigns=n.id==="design"?activeOrders.filter(o=>o.needsDesign&&o.designStatus!=="Done").length:0;
            const trashCount=n.id==="trash"?trashedOrders.length:0;
            return(
            <button key={n.id} className="nav-btn" onClick={()=>goto(n.id)} style={page===n.id?{background:"#cc0000",color:"#fff"}:{}}>
              <i className={`ti ${n.icon}`} style={{fontSize:17}}/>{n.label}
              {pendingDesigns>0&&<span style={{marginLeft:"auto",background:page===n.id?"#fff":"#cc0000",color:page===n.id?"#cc0000":"#fff",borderRadius:10,padding:"1px 7px",fontSize:11,fontWeight:700}}>{pendingDesigns}</span>}
              {trashCount>0&&<span style={{marginLeft:"auto",background:page===n.id?"#fff":"#cc0000",color:page===n.id?"#cc0000":"#fff",borderRadius:10,padding:"1px 7px",fontSize:11,fontWeight:700}}>{trashCount}</span>}
            </button>
          );})}
        </nav>
        <div style={{borderTop:"1px solid #2a2a2a",paddingTop:12,marginTop:8}}>
          <div style={{display:"flex",alignItems:"center",gap:6,padding:"4px 10px",marginBottom:8}}>
            <div style={{width:7,height:7,borderRadius:"50%",background:dbMode?"#1d9e75":"#cc0000",flexShrink:0}}/>
            <div style={{fontSize:10,color:dbMode?"#3d9e75":"#cc6666"}}>{dbMode?"Cloud Sync ON":"Local Only"}</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8,padding:"4px 10px",marginBottom:8}}>
            <div style={{width:30,height:30,borderRadius:"50%",background:"#cc0000",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:"#fff"}}>{user.name[0]}</div>
            <div><div style={{fontSize:11,fontWeight:600,color:"#ddd"}}>{user.name}</div><div style={{fontSize:10,color:"#555"}}>{user.role}</div></div>
          </div>
          <button className="nav-btn" style={{color:"#666"}} onClick={()=>{if(window.auth)window.auth.signOut();else setUser(null);}}><i className="ti ti-logout" style={{fontSize:16}}/>Sign Out</button>
        </div>
      </aside>

      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <header style={{background:"#fff",borderBottom:"1px solid #eeebe6",padding:"12px 20px",display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
          <button onClick={()=>setMenuOpen(p=>!p)} style={{background:"none",border:"none",cursor:"pointer",fontSize:22,color:"#555",display:"none"}} id="mBtn"><i className="ti ti-menu-2"/></button>
          <style>{`@media(max-width:700px){#mBtn{display:block!important}}`}</style>
          <div style={{flex:1}}>
            <div style={{fontSize:16,fontWeight:700,color:"#1a1a1a"}}>{ALL_NAV.find(n=>n.id===page)?.label||"Dashboard"}</div>
            <div style={{fontSize:11,color:"#bbb"}}>{new Date().toLocaleDateString("en-IN",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}</div>
          </div>
          <div style={{background:"#fff8f8",border:"1px solid #ffdddd",borderRadius:8,padding:"3px 10px",fontSize:11,color:"#cc0000",fontWeight:600}}>{user.role}</div>
        </header>
        {loading&&<div style={{background:"#fff8f8",borderBottom:"1px solid #ffe0e0",padding:"8px 20px",fontSize:12,color:"#cc0000",display:"flex",alignItems:"center",gap:8}}><div style={{width:12,height:12,border:"2px solid #cc0000",borderTopColor:"transparent",borderRadius:"50%",animation:"spin .8s linear infinite"}}/>Syncing...</div>}
        {!dbMode&&<div style={{background:"#fffbea",borderBottom:"1px solid #ffe58f",padding:"8px 20px",fontSize:12,color:"#7a5c00",display:"flex",alignItems:"center",gap:8}}><i className="ti ti-alert-triangle" style={{fontSize:14}}/>Running in local mode — Firebase not configured.</div>}
        {ONESIGNAL_READY&&(user.role==="Factory Staff"||user.role==="Admin")&&pushPermission==="default"&&(
          <div style={{background:"#eef6ff",borderBottom:"1px solid #cfe4ff",padding:"9px 20px",fontSize:12.5,color:"#0a4a8f",display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,flexWrap:"wrap"}}>
            <span><i className="ti ti-bell-ringing" style={{marginRight:6}}/>Turn on notifications to get alerted the moment a new order comes in — even with the app closed.</span>
            <button className="btn" style={{background:"#0a4a8f",color:"#fff",padding:"6px 14px",fontSize:12}} onClick={enablePushNotifications}>Enable Notifications</button>
          </div>
        )}
        {ONESIGNAL_READY&&(user.role==="Factory Staff"||user.role==="Admin")&&pushPermission==="denied"&&(
          <div style={{background:"#fff5f5",borderBottom:"1px solid #ffd6d6",padding:"9px 20px",fontSize:12.5,color:"#a30000"}}>
            <i className="ti ti-bell-off" style={{marginRight:6}}/>Notifications are blocked for this site. Enable them from your browser's site settings (click the padlock icon next to the address bar) to receive new-order alerts.
          </div>
        )}
        <main style={{flex:1,overflow:"auto",padding:20}}>
          {page==="dashboard"&&<Dashboard orders={activeOrders} goto={goto} user={user}/>}
          {page==="new-order"&&<NewOrder user={user} onAdd={addOrder} toast2={toast2} orders={activeOrders} allOrders={orders} goto={goto} defaultSource="Office"/>}
          {page==="orders"&&<OrderList orders={activeOrders} allOrders={orders} updOrder={updOrder} updOrderH={updOrderH} delOrder={delOrder} bulkDelOrders={bulkDelOrders} toast2={toast2} user={user}/>}
          {page==="factory"&&<Factory orders={activeOrders} allOrders={orders} delOrder={delOrder} updOrder={updOrder} updOrderH={updOrderH} user={user} onAdd={addOrder} toast2={toast2} goto={goto}/>}
          {page==="design"&&<Design orders={activeOrders} updOrder={updOrder} updOrderH={updOrderH} toast2={toast2} user={user}/>}
          {page==="wholesale"&&<Wholesale orders={activeOrders} allOrders={orders} wholesaleCustomers={wholesaleCustomers.filter(c=>c.active!==false)} addWholesaleCustomer={addWholesaleCustomer} updWholesaleCustomer={updWholesaleCustomer} delWholesaleCustomer={delWholesaleCustomer} addOrder={addOrder} updOrder={updOrder} updOrderH={updOrderH} user={user} toast2={toast2}/>}
          {page==="receive"&&<Receive orders={activeOrders} updOrder={updOrder} updOrderH={updOrderH} user={user} toast2={toast2}/>}
          {page==="deliver"&&<Deliver orders={activeOrders} updOrder={updOrder} updOrderH={updOrderH} user={user} toast2={toast2}/>}
          {page==="reports"&&["Admin","Accountant"].includes(user.role)&&<Reports orders={activeOrders}/>}
          {page==="trash"&&user.role==="Admin"&&<Trash orders={trashedOrders} allOrders={orders} restoreOrder={restoreOrder} permanentDeleteOrder={permanentDeleteOrder} toast2={toast2}/>}
        </main>
      </div>
      {toast&&<div style={{position:"fixed",bottom:24,right:24,background:toast.type==="ok"?"#1d9e75":"#cc0000",color:"#fff",padding:"12px 20px",borderRadius:12,fontSize:13.5,fontWeight:600,zIndex:9999,boxShadow:"0 4px 20px rgba(0,0,0,.15)",maxWidth:320}}>
        <i className={`ti ${toast.type==="ok"?"ti-check":"ti-alert-circle"}`} style={{marginRight:6}}/>{toast.msg}
      </div>}
    </div>
  );
}

// ── DASHBOARD ──
function Dashboard({orders,goto,user}){
  const canViewFinancial=["Admin","Accountant"].includes(user.role);
  const isOfficeOrFactory=["Office Staff","Factory Staff"].includes(user.role);
  const tKey=todayKey();
  const todayOrders=orders.filter(o=>{const p=parseLocaleDate(o.created);return p&&p.dateKey===tKey;});
  const todayDelivered=orders.filter(o=>{const p=parseLocaleDate(o.deliveredAt);return p&&p.dateKey===tKey;});
  const todayAdvOrders=todayOrders.filter(o=>Number(o.advance)>0);
  const sales=todayOrders.reduce((a,o)=>a+orderTotalOf(o),0);
  // Revenue = Cash + UPI + Other Payments actually received today (product amount only — Design Revenue is tracked separately below and must not be mixed in here).
  const cashCollected=todayDelivered.filter(o=>o.payMethod==="Cash").reduce((a,o)=>a+productTotalOf(o),0)+todayAdvOrders.filter(o=>!o.advPayMethod||o.advPayMethod==="Cash").reduce((a,o)=>a+Number(o.advance||0),0);
  const upiCollected=todayDelivered.filter(o=>o.payMethod==="UPI").reduce((a,o)=>a+productTotalOf(o),0)+todayAdvOrders.filter(o=>o.advPayMethod==="UPI").reduce((a,o)=>a+Number(o.advance||0),0);
  const otherCollected=todayDelivered.filter(o=>o.payMethod&&o.payMethod!=="Cash"&&o.payMethod!=="UPI").reduce((a,o)=>a+productTotalOf(o),0)+todayAdvOrders.filter(o=>o.advPayMethod&&o.advPayMethod!=="Cash"&&o.advPayMethod!=="UPI").reduce((a,o)=>a+Number(o.advance||0),0);
  // Today's Revenue = total worth of every order placed today (product + design), i.e. the full order value —
  // this already includes outstanding balances and advance received, not just money actually collected.
  const todayRevenue=sales;
  const pendingOrders=orders.filter(o=>o.status!==S.DELI).length;
  const completedToday=todayDelivered.length;
  const prod=orders.filter(o=>o.status===S.PROD).length;
  const cancelled=orders.filter(o=>/cancel/i.test(o.status||"")).length;
  const totalQty=todayOrders.reduce((a,o)=>a+Number(o.qty||0),0);
  const avgOrder=todayOrders.length?sales/todayOrders.length:0;
  const overdue=orders.filter(o=>o.status!==S.DELI&&o.delivery&&new Date(o.delivery)<new Date(new Date().toDateString())).length;
  const failedWhatsApp=orders.filter(o=>o.whatsappFailed).length;

  // Design revenue today
  const todayDesignOrders=todayOrders.filter(o=>o.needsDesign&&designCostOf(o)>0);
  const todayDesignRev=todayDesignOrders.reduce((a,o)=>a+designCostOf(o),0);

  // Pending payments (total outstanding)
  const totalPendingAmt=orders.filter(o=>o.status!==S.DELI&&Number(o.pending)>0).reduce((a,o)=>a+Number(o.pending),0);
  const todayPendingAmt=todayOrders.filter(o=>Number(o.pending)>0).reduce((a,o)=>a+Number(o.pending),0);

  const alerts=[
    overdue>0&&`${overdue} overdue order${overdue===1?"":"s"}`,
    orders.filter(o=>o.status===S.RECV).length>0&&`${orders.filter(o=>o.status===S.RECV).length} pending deliver${orders.filter(o=>o.status===S.RECV).length===1?"y":"ies"} at office`,
    failedWhatsApp>0&&`${failedWhatsApp} failed WhatsApp message${failedWhatsApp===1?"":"s"}`,
  ].filter(Boolean);

  const stats=[
    {l:"Total Orders (All Time)",v:orders.length,icon:"ti-clipboard-list",c:"#cc0000"},
    {l:"Total Orders Today",v:todayOrders.length,icon:"ti-calendar-plus",c:"#854f0b"},
    {l:"Cash Collected",v:fmtM(cashCollected),icon:"ti-cash",c:"#1d9e75"},
    {l:"UPI Collected",v:fmtM(upiCollected),icon:"ti-qrcode",c:"#185fa5"},
    {l:"Other Payments",v:fmtM(otherCollected),icon:"ti-building-bank",c:"#854f0b"},
    {l:"Pending Orders",v:pendingOrders,icon:"ti-clock-pause",c:"#a32d2d"},
    {l:"Completed Today",v:completedToday,icon:"ti-circle-check",c:"#0f6e56"},
    {l:"Cancelled Orders",v:cancelled,icon:"ti-circle-x",c:"#cc0000"},
    {l:"In Production",v:prod,icon:"ti-tool",c:"#854f0b"},
    {l:"Average Order Value",v:fmtM(avgOrder),icon:"ti-chart-bar",c:"#6a1bb5"},
    {l:"Items Sold Today",v:totalQty,icon:"ti-packages",c:"#185fa5"},
  ];
  return(
    <div>
      {canViewFinancial&&(
        <div className="card" style={{marginBottom:16,background:"#1a1a1a",border:"none",color:"#fff"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12,flexWrap:"wrap",marginBottom:16}}>
            <div>
              <div style={{fontSize:11,color:"#ffb3b3",fontWeight:700,textTransform:"uppercase",letterSpacing:.5}}>Today's Revenue (Total Order Value)</div>
              <div style={{fontSize:32,fontWeight:900,marginTop:4,color:"#fff"}}>{fmtM(todayRevenue)}</div>
              <div style={{fontSize:10.5,color:"#777",marginTop:3}}>Total worth of every order placed today — includes outstanding balances and advance received</div>
              <div style={{fontSize:12,color:"#bbb",marginTop:4}}>{todayOrders.length} orders · {totalQty} items</div>
            </div>
            <button className="btn btn-red" onClick={()=>goto("reports")}><i className="ti ti-report"/>Full Reports</button>
          </div>

          {/* Payment breakdown row — actual money collected today, part of Today's Revenue above */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:1,background:"#333",borderRadius:10,overflow:"hidden",marginBottom:12}}>
            {[["💵 Cash",cashCollected,"#e8f5e9","#0f6e56"],["📱 UPI",upiCollected,"#e3f2fd","#185fa5"],["🏦 Other Payments",otherCollected,"#fafafa","#555"]].map(([l,v,bg,c])=>(
              <div key={l} style={{background:"#252525",padding:"10px 12px",textAlign:"center"}}>
                <div style={{fontSize:10.5,color:"#888",marginBottom:3}}>{l}</div>
                <div style={{fontSize:16,fontWeight:700,color:"#fff"}}>{fmtM(v)}</div>
              </div>
            ))}
          </div>

          {/* Design revenue row */}
          {todayDesignRev>0&&<div style={{background:"#2a1a00",border:"1px solid #5a3000",borderRadius:10,padding:"10px 14px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <i className="ti ti-pencil-ruler" style={{color:"#cc7a00",fontSize:16}}/>
              <div>
                <div style={{fontSize:11,color:"#cc7a00",fontWeight:600}}>Design Revenue Today</div>
                <div style={{fontSize:10.5,color:"#888"}}>{todayDesignOrders.length} design order{todayDesignOrders.length===1?"":"s"}</div>
              </div>
            </div>
            <div style={{fontSize:20,fontWeight:900,color:"#ff9900"}}>{fmtM(todayDesignRev)}</div>
          </div>}

          {/* Advances + Pending */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div style={{background:"#252525",borderRadius:10,padding:"10px 12px"}}>
              <div style={{fontSize:10.5,color:"#888",marginBottom:2}}>Today's Advances</div>
              <div style={{fontSize:16,fontWeight:700,color:"#fff"}}>{fmtM(todayAdvOrders.reduce((a,o)=>a+Number(o.advance||0),0))}</div>
              <div style={{fontSize:10.5,color:"#666",marginTop:2}}>{todayAdvOrders.length} orders · already included in Revenue above</div>
            </div>
            <div style={{background:"#252525",borderRadius:10,padding:"10px 12px"}}>
              <div style={{fontSize:10.5,color:"#888",marginBottom:2}}>Today's Pending Due</div>
              <div style={{fontSize:16,fontWeight:700,color:todayPendingAmt>0?"#ff6b6b":"#aaa"}}>{fmtM(todayPendingAmt)}</div>
              <div style={{fontSize:10.5,color:"#666",marginTop:2}}>Already included in Revenue above · Total outstanding: {fmtM(totalPendingAmt)}</div>
            </div>
          </div>
        </div>
      )}

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:12,marginBottom:20}}>
        {stats.filter(s=>canViewFinancial||!["Cash Collected","UPI Collected","Other Payments","Average Order Value","Total Orders Today"].includes(s.l)).map(s=>(
          <div key={s.l} className="card" style={{padding:"14px 16px"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
              <div style={{width:32,height:32,borderRadius:9,background:s.c+"18",display:"flex",alignItems:"center",justifyContent:"center"}}><i className={`ti ${s.icon}`} style={{color:s.c,fontSize:16}}/></div>
              <div style={{fontSize:10.5,color:"#999",fontWeight:500}}>{s.l}</div>
            </div>
            <div style={{fontSize:22,fontWeight:700,color:"#1a1a1a"}}>{s.v}</div>
          </div>
        ))}
      </div>
      {canViewFinancial&&(
        <div className="card" style={{marginBottom:16,border:alerts.length?"1.5px solid #ffcccc":"1px solid #eeebe6"}}>
          <div style={{fontWeight:700,fontSize:15,marginBottom:10}}>Important Alerts</div>
          {alerts.length===0
            ?<div style={{fontSize:13,color:"#1d9e75",fontWeight:600}}><i className="ti ti-circle-check" style={{marginRight:6}}/>No urgent alerts for today.</div>
            :<div style={{display:"flex",flexDirection:"column",gap:8}}>{alerts.map(a=><div key={a} style={{fontSize:13,color:"#cc0000",fontWeight:600,background:"#fff8f8",borderRadius:9,padding:"8px 10px"}}><i className="ti ti-alert-triangle" style={{marginRight:6}}/>{a}</div>)}</div>}
        </div>
      )}
      <div className="card" style={{marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{fontWeight:700,fontSize:15}}>Recent Orders</div>
          <button className="btn btn-outline" style={{padding:"6px 12px",fontSize:12}} onClick={()=>goto("orders")}>View All →</button>
        </div>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12.5}}>
            <thead><tr style={{borderBottom:"1px solid #f0ede8"}}>{["Order #","Date & Time","Customer","Product","Status"].map(h=><th key={h} style={{padding:"8px 10px",textAlign:"left",fontWeight:600,color:"#bbb",fontSize:11}}>{h}</th>)}</tr></thead>
            <tbody>{orders.slice(0,6).map(o=>(
              <tr key={o.id} style={{borderBottom:"1px solid #fafaf8"}}>
                <td style={{padding:"9px 10px",fontWeight:900,color:"#cc0000",fontSize:13}}>{displayOrderNum(o,orders)}</td>
                <td style={{padding:"9px 10px",fontWeight:600,color:"#888",fontSize:11}}>{orderDateTime(o).label}</td>
                <td style={{padding:"9px 10px"}}>{o.customer}</td>
                <td style={{padding:"9px 10px",color:"#777"}}>{o.product}</td>
                <td style={{padding:"9px 10px"}}><StatusBadge s={o.status}/></td>
              </tr>
            ))}</tbody>
          </table>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:12}}>
        {[
          {label:"New Order",icon:"ti-plus-circle",page:"new-order",color:"#cc0000",roles:["Admin","Office Staff"]},
          {label:"Scan / Receive",icon:"ti-qrcode",page:"receive",color:"#1d9e75",roles:["Admin","Office Staff"]},
          {label:"Deliver & Pay",icon:"ti-truck-delivery",page:"deliver",color:"#185fa5",roles:["Admin","Office Staff"]},
          {label:"Factory Deliver",icon:"ti-package-export",page:"factory",color:"#1d9e75",roles:["Factory Staff"]},
          {label:"Reports",icon:"ti-report",page:"reports",color:"#854f0b",roles:["Admin","Accountant"]},
        ].filter(b=>b.roles.includes(user.role)).map(b=>(
          <button key={b.page} onClick={()=>goto(b.page)} style={{background:b.color,color:"#fff",border:"none",borderRadius:13,padding:"16px 14px",cursor:"pointer",display:"flex",alignItems:"center",gap:10,fontSize:13.5,fontWeight:600,fontFamily:"inherit"}}>
            <i className={`ti ${b.icon}`} style={{fontSize:20}}/>{b.label}
          </button>
        ))}
      </div>
    </div>
  );
}

// ── DELETE CONFIRM DIALOG ──
function DeleteConfirm({order,onConfirm,onCancel}){
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#fff",borderRadius:16,padding:24,maxWidth:360,width:"100%",textAlign:"center"}}>
        <div style={{width:52,height:52,background:"#fff0f0",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px"}}>
          <i className="ti ti-trash" style={{fontSize:26,color:"#cc0000"}}/>
        </div>
        <div style={{fontSize:16,fontWeight:700,marginBottom:6}}>Move Order to Trash?</div>

function makeHistoryEntry(action, dept, prevVal, newVal){
  const now=new Date();
  const dateStr=now.toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"});
  const timeStr=now.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit",hour12:true}).toUpperCase();
  const entry={action,dept,date:dateStr,time:timeStr,ts:now.getTime()};
  if(prevVal!==undefined&&newVal!==undefined) entry.change=`${prevVal} → ${newVal}`;
  return entry;
}

async function appendHistory(orderId,entry){
  if(!window.db) return;
  try{
    await window.db.collection("orders").doc(orderId).update({
      history:firebase.firestore.FieldValue.arrayUnion(entry)
    });
  }catch(e){console.error("History append failed",e);}
}

// ── INLINE ORDER NUMBER EDITOR ──
function OrderNumberEditor({order,orders,updOrder,user,toast2,onLocalUpdate,compact=false}){
  const canEdit=["Admin","Office Staff","Factory Staff"].includes(user.role);
  const [editing,setEditing]=useState(false);
  const [val,setVal]=useState(order.orderNum?String(order.orderNum):"");
  useEffect(()=>{setVal(order.orderNum?String(order.orderNum):"");},[order.id,order.orderNum]);

  const save=()=>{
    const raw=String(val).trim();
    const next=raw===""?null:parseInt(raw,10);
    if(raw!==""&&(!next||next<1)){toast2("Enter a valid order number","err");setVal(order.orderNum?String(order.orderNum):"");return;}
    if(next===order.orderNum){setEditing(false);return;}
    const gid=order.groupId||order.id;
    if(orderNumberTaken(next,orderSourceOf(order),orders,order.id,gid)){
      toast2("Order number "+fmtONForSource(next,orderSourceOf(order))+" already exists!","err");
      setVal(order.orderNum?String(order.orderNum):"");
      setEditing(false);
      return;
    }
    const patch={orderNum:next,lastEditedAt:now2(),lastEditedBy:user.name};
    updOrder(order.id,patch);
    if(onLocalUpdate) onLocalUpdate({...order,...patch});
    toast2("Order number updated");
    setEditing(false);
  };

  if(!canEdit) return <span>{displayOrderNum(order,orders)}</span>;
  if(editing) return(
    <input
      className="inp"
      type="number"
      autoFocus
      value={val}
      onClick={e=>e.stopPropagation()}
      onChange={e=>setVal(e.target.value)}
      onBlur={save}
      onKeyDown={e=>{
        if(e.key==="Enter"){e.preventDefault();e.currentTarget.blur();}
        if(e.key==="Escape"){setVal(order.orderNum?String(order.orderNum):"");setEditing(false);}
      }}
      style={{width:compact?76:110,padding:compact?"6px 8px":"8px 10px",fontWeight:900,color:"#cc0000",fontSize:compact?12:15,textAlign:"center"}}
    />
  );
  return(
    <button
      type="button"
      onClick={e=>{e.stopPropagation();setEditing(true);}}
      title="Edit order number"
      style={{background:"#fff8f8",border:"1px solid #ffdddd",borderRadius:8,padding:compact?"4px 7px":"6px 10px",cursor:"pointer",color:"#cc0000",fontWeight:900,fontSize:compact?11:15,fontFamily:"inherit",display:"inline-flex",alignItems:"center",gap:5}}
    >
      {displayOrderNum(order,orders)} <i className="ti ti-edit" style={{fontSize:compact?11:13}}/>
    </button>
  );
}
