// QR encodes ONLY the order ID — short = simple = easy to scan
function buildQRText(o){return o.id;}

function drawQROnCanvas(canvas,text,size){
  try{
    const qr=qrcode(0,"M");qr.addData(text);qr.make();
    const count=qr.getModuleCount(),cell=Math.floor(size/count),actual=cell*count;
    canvas.width=actual;canvas.height=actual;
    const ctx=canvas.getContext("2d");
    ctx.fillStyle="#fff";ctx.fillRect(0,0,actual,actual);
    ctx.fillStyle="#000";
    for(let r=0;r<count;r++)for(let c=0;c<count;c++)if(qr.isDark(r,c))ctx.fillRect(c*cell,r*cell,cell,cell);
    return canvas;
  }catch(e){console.error("QR error",e);return null;}
}

function QRSvg({order,size=180}){
  const ref=useRef(null);
  useEffect(()=>{if(!ref.current||!order)return;drawQROnCanvas(ref.current,buildQRText(order),size);},[order&&order.id,size]);
  if(!order)return null;
  return <canvas ref={ref} style={{display:"block",imageRendering:"pixelated",width:size,height:size}}/>;
}

function downloadQR(o){
  const size=220,padX=24,padTop=o.orderNum?72:56,padBot=48;
  const W=size+padX*2,H=size+padTop+padBot;
  const out=document.createElement("canvas");out.width=W;out.height=H;
  const ctx=out.getContext("2d");
  ctx.fillStyle="#fff";ctx.fillRect(0,0,W,H);
  ctx.strokeStyle="#cc0000";ctx.lineWidth=3;ctx.beginPath();ctx.roundRect(2,2,W-4,H-4,12);ctx.stroke();
  ctx.fillStyle="#cc0000";ctx.font="bold 22px Arial";ctx.textAlign="center";ctx.fillText("HSM",W/2,26);
  ctx.fillStyle="#999";ctx.font="8px Arial";ctx.fillText("HANUMAN SAW MILL",W/2,38);
  if(o.orderNum){ctx.fillStyle="#cc0000";ctx.font="bold 17px Arial";ctx.fillText("Order "+fmtON(o.orderNum),W/2,58);}
  const tmp=document.createElement("canvas");
  if(!drawQROnCanvas(tmp,buildQRText(o),size)){alert("QR failed");return;}
  ctx.drawImage(tmp,padX,padTop,size,size);
  ctx.fillStyle="#1a1a1a";ctx.font="bold 11px Arial";ctx.fillText(o.id,W/2,padTop+size+14);
  ctx.fillStyle="#555";ctx.font="10px Arial";ctx.fillText(o.customer+" · "+o.mobile,W/2,padTop+size+28);
  const a=document.createElement("a");a.download="QR-"+o.id+".png";a.href=out.toDataURL("image/png");a.click();
}

// ── SHARED ZXING SCANNER COMPONENT ──
function QRScanner({onResult,onError}){
  const vidRef=useRef(null);
  const readerRef=useRef(null);
  const [active,setActive]=useState(false);
  const [err,setErr]=useState("");

  const stop=useCallback(()=>{
    if(readerRef.current){try{readerRef.current.reset();}catch(e){}}
    readerRef.current=null;setActive(false);
  },[]);

  const start=useCallback(async()=>{
    setErr("");
    if(!window.ZXing){setErr("Scanner library not loaded. Please refresh.");return;}
    try{
      const hints=new Map();
      hints.set(window.ZXing.DecodeHintType.TRY_HARDER,true);
      const reader=new window.ZXing.BrowserMultiFormatReader(hints,500);
      readerRef.current=reader;
      setActive(true);
      await reader.decodeFromVideoDevice(null,vidRef.current,(result,err2)=>{
        if(result){
          const text=result.getText();
          stop();
          onResult(text);
        }
      });
    }catch(e){
      setErr("Camera access denied. Please allow camera and try again.");
      if(onError) onError(e);
      setActive(false);
    }
  },[stop,onResult,onError]);

  useEffect(()=>()=>stop(),[stop]);

  return(
    <div>
      <div style={{background:"#1a1a1a",borderRadius:13,overflow:"hidden",marginBottom:12,position:"relative",minHeight:240}}>
        <video ref={vidRef} style={{width:"100%",display:"block",maxHeight:280,objectFit:"cover"}}/>
        {!active&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:8}}>
          <i className="ti ti-qrcode" style={{fontSize:48,color:"#444"}}/>
          <div style={{color:"#666",fontSize:13}}>Camera not active</div>
        </div>}
        {active&&<div style={{position:"absolute",inset:0,pointerEvents:"none"}}>
          <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:190,height:190,border:"3px solid #cc0000",borderRadius:14,boxShadow:"0 0 0 9999px rgba(0,0,0,.35)"}}/>
          <div style={{position:"absolute",bottom:12,width:"100%",textAlign:"center",color:"#fff",fontSize:12,fontWeight:600,textShadow:"0 1px 3px rgba(0,0,0,.8)"}}>Point camera at QR code</div>
        </div>}
      </div>
      {err&&<div style={{background:"#fff8f8",border:"1px solid #ffe0e0",borderRadius:10,padding:"10px 14px",fontSize:12,color:"#cc0000",marginBottom:12}}>{err}</div>}
      {!active
        ?<button className="btn btn-red" style={{width:"100%",justifyContent:"center"}} onClick={start}><i className="ti ti-camera"/>Start Camera Scan</button>
        :<button className="btn btn-outline" style={{width:"100%",justifyContent:"center"}} onClick={stop}><i className="ti ti-player-stop"/>Stop Camera</button>}
    </div>
  );
}

            <div style={{fontSize:16,fontWeight:700,color:"#1a1a1a"}}>{ALL_NAV.find(n=>n.id===page)?.label||"Dashboard"}</div>

        {loading&&<div style={{background:"#fff8f8",borderBottom:"1px solid #ffe0e0",padding:"8px 20px",fontSize:12,color:"#cc0000",display:"flex",alignItems:"center",gap:8}}><div style={{width:12,height:12,border:"2px solid #cc0000",borderTopColor:"transparent",borderRadius:"50%",animation:"spin .8s linear infinite"}}/>Syncing...</div>}
        {!dbMode&&<div style={{background:"#fffbea",borderBottom:"1px solid #ffe58f",padding:"8px 20px",fontSize:12,color:"#7a5c00",display:"flex",alignItems:"center",gap:8}}><i className="ti ti-alert-triangle" style={{fontSize:14}}/>Running in local mode — Firebase not configured.</div>}

          {page==="new-order"&&<NewOrder user={user} onAdd={addOrder} toast2={toast2} orders={orders} goto={goto}/>}
          {page==="orders"&&<OrderList orders={orders} updOrder={updOrder} delOrder={delOrder} toast2={toast2} user={user}/>}
          {page==="factory"&&<Factory orders={orders} delOrder={delOrder} user={user}/>}
          {page==="design"&&<Design orders={orders} updOrder={updOrder} toast2={toast2}/>}
          {page==="receive"&&<Receive orders={orders} updOrder={updOrder} user={user} toast2={toast2}/>}
          {page==="deliver"&&<Deliver orders={orders} updOrder={updOrder} user={user} toast2={toast2}/>}
          {page==="reports"&&["Admin","Accountant"].includes(user.role)&&<Reports orders={orders}/>}
        </main>
      </div>
      {toast&&<div style={{position:"fixed",bottom:24,right:24,background:toast.type==="ok"?"#1d9e75":"#cc0000",color:"#fff",padding:"12px 20px",borderRadius:12,fontSize:13.5,fontWeight:600,zIndex:9999,boxShadow:"0 4px 20px rgba(0,0,0,.15)",maxWidth:320}}>
        <i className={`ti ${toast.type==="ok"?"ti-check":"ti-alert-circle"}`} style={{marginRight:6}}/>{toast.msg}
      </div>}
    </div>
  );
}

// ── WHATSAPP HELPER ──
function sendWhatsApp(orders_created){
  // Build one message per customer (group all items)
  const o=orders_created[0];
  const num=o.mobile.replace(/\D/g,"");
  const itemLines=orders_created.map((it,i)=>
    `• Item ${i+1}: ${it.product} | ${it.wood} | ${it.size} | Qty: ${it.qty}`
  ).join("\n");
  const msg=
`🪵 *Hanuman Saw Mill — Order Confirmation*

Hello *${o.customer}*! Your order has been placed.

📋 *Order No:* ${o.orderNum?fmtON(o.orderNum):"—"}
📦 *Items:*
${itemLines}

💰 *Total:* ${fmtM(orders_created.reduce((a,x)=>a+x.total,0))}
✅ *Advance Paid:* ${fmtM(orders_created.reduce((a,x)=>a+x.advance,0))}
🔔 *Pending:* ${fmtM(orders_created.reduce((a,x)=>a+x.pending,0))}
${o.delivery?"🗓 *Delivery Date:* "+fmtD(o.delivery):""}

Thank you for your order! 🙏
— Hanuman Saw Mill`;

  const url="https://wa.me/91"+num+"?text="+encodeURIComponent(msg);
  window.open(url,"_blank");
}

// ── NEW ORDER ──
const LBL={fontSize:11.5,fontWeight:600,color:"#777",display:"block",marginBottom:4};
const emptyItem=()=>({product:PRODUCTS[0],wood:"Khair",dimL:"",dimW:"",dimT:"",qty:"",total:"",advance:"",notes:"",needsDesign:false});

function NewOrder({user,onAdd,toast2,orders,goto}){
  const usedNums=orders.map(o=>o.orderNum).filter(Boolean);
  const suggestNum=usedNums.length>0?Math.max(...usedNums)+1:1;

  const [customer,setCustomer]=useState("");
  const [mobile,setMobile]=useState("");
  const [delivery,setDelivery]=useState("");
  const [orderNumInput,setOrderNumInput]=useState(String(suggestNum));
  const [items,setItems]=useState([emptyItem()]);
  const [done,setDone]=useState(null);

  const updItem=(i,k,v)=>setItems(p=>{
    const n=[...p];n[i]={...n[i],[k]:v};
    if(k==="advance"||k==="total")n[i].pending=Math.max(0,Number(n[i].total||0)-Number(n[i].advance||0));
    return n;
  });
  const addItem=()=>setItems(p=>[...p,emptyItem()]);
  const removeItem=i=>setItems(p=>p.filter((_,idx)=>idx!==i));

  const sub=e=>{
    e.preventDefault();
    if(!customer||!mobile){toast2("Enter customer name and mobile","err");return;}
    const num=parseInt(orderNumInput)||suggestNum;
    if(orders.some(o=>o.orderNum===num)){toast2("Order number "+fmtON(num)+" already exists!","err");return;}
    const created=[];
    for(let i=0;i<items.length;i++){
      const it=items[i];
      if(!it.dimL||!it.dimW||!it.dimT||!it.qty){toast2(`Fill all dimensions & qty for item ${i+1}`,"err");return;}
      const size=it.dimL+'"x'+it.dimW+'"x'+it.dimT+'"';
      created.push({
        id:genId(),orderNum:i===0?num:null,
        customer,mobile,delivery,
        product:it.product,wood:it.wood,size,qty:Number(it.qty),
        total:Number(it.total)||0,advance:Number(it.advance)||0,
        pending:Math.max(0,(Number(it.total)||0)-(Number(it.advance)||0)),
        notes:it.notes,
        needsDesign:!!it.needsDesign,designStatus:it.needsDesign?"Pending":"",
        status:S.PROD,created:now2(),createdBy:user.name,
        payMethod:"",payAt:"",receivedAt:"",receivedBy:"",deliveredAt:"",deliveredBy:"",
      });
    }
    const groupId=created[0].id;
    created.forEach((o,i)=>{if(i>0)o.groupId=groupId;});
    created[0].groupId=groupId;
    Promise.all(created.map(o=>onAdd(o))).then(()=>setDone(created));
  };

  if(done) return(
    <div style={{maxWidth:520,margin:"0 auto"}}>
      <div className="card" style={{textAlign:"center"}}>
        <div style={{width:52,height:52,background:"#e1f5ee",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 10px"}}><i className="ti ti-check" style={{fontSize:26,color:"#1d9e75"}}/></div>
        <div style={{fontSize:17,fontWeight:700,marginBottom:2}}>{done.length>1?`${done.length} Orders Created!`:"Order Created!"}</div>
        <div style={{fontSize:26,fontWeight:900,color:"#cc0000",marginBottom:2}}>{done[0].orderNum?`Order ${fmtON(done[0].orderNum)}`:done[0].id}</div>
        <div style={{fontSize:11,color:"#aaa",marginBottom:16}}>{done[0].customer} · {done[0].mobile}</div>

        {/* WhatsApp + Design buttons */}
        <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap",marginBottom:16}}>
          <button className="btn" style={{background:"#25D366",color:"#fff",fontSize:14,fontWeight:700}} onClick={()=>sendWhatsApp(done)}>
            <i className="ti ti-brand-whatsapp" style={{fontSize:18}}/>Send on WhatsApp
          </button>
          {done.some(o=>o.needsDesign)&&<button className="btn btn-outline" style={{fontSize:13}} onClick={()=>goto("design")}>
            <i className="ti ti-pencil-ruler"/>View in Design Queue
          </button>}
        </div>

        <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:16}}>
          {done.map((o,i)=>(
            <div key={o.id} style={{background:"#fafaf8",borderRadius:12,padding:12}}>
              <div style={{fontSize:12,fontWeight:700,color:"#cc0000",marginBottom:4}}>{i===0&&o.orderNum?`Order ${fmtON(o.orderNum)} · `:""}{o.id}</div>
              <div style={{fontSize:12,color:"#777",marginBottom:8}}>{o.product} · {o.wood} · {o.size} · Qty {o.qty}</div>
              {o.needsDesign&&<div style={{display:"inline-block",background:"#fff3e0",color:"#a35a00",border:"1px solid #ffd9a0",borderRadius:8,padding:"3px 10px",fontSize:11,fontWeight:700,marginBottom:8}}><i className="ti ti-pencil-ruler" style={{marginRight:4}}/>Sent for Design</div>}
              <div style={{background:"#fff",borderRadius:10,padding:8,display:"inline-block"}}><QRSvg order={o} size={140}/></div>
              <div style={{display:"flex",gap:8,justifyContent:"center",marginTop:8,flexWrap:"wrap"}}>
                <button className="btn btn-red" style={{padding:"7px 12px",fontSize:12}} onClick={()=>printQR(o)}><i className="ti ti-printer"/>Print</button>
                <button className="btn btn-green" style={{padding:"7px 12px",fontSize:12}} onClick={()=>downloadQR(o)}><i className="ti ti-download"/>Download</button>
              </div>
            </div>
          ))}
        </div>
        <button className="btn btn-outline" onClick={()=>{setDone(null);setCustomer("");setMobile("");setDelivery("");setOrderNumInput(String(suggestNum+1));setItems([emptyItem()]);}}><i className="ti ti-plus"/>New Order</button>
      </div>
    </div>
  );

  return(
    <div style={{maxWidth:680,margin:"0 auto"}}>
      <div className="card">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
          <div style={{fontWeight:700,fontSize:15}}>Create New Order</div>
        </div>
        <form onSubmit={sub}>
          {/* ── Customer info ── */}
          <div style={{background:"#fafaf8",borderRadius:12,padding:14,marginBottom:16}}>
            <div style={{fontSize:12,fontWeight:700,color:"#888",marginBottom:10,textTransform:"uppercase",letterSpacing:.5}}>Customer Details</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:13}}>
              <div><label style={LBL}>Customer Name *</label><input className="inp" value={customer} onChange={e=>setCustomer(e.target.value)} placeholder="Full name"/></div>
              <div><label style={LBL}>Mobile Number *</label>
                <div style={{display:"flex",gap:8}}>
                  <input className="inp" value={mobile} onChange={e=>setMobile(e.target.value)} placeholder="10-digit mobile" style={{flex:1}}/>
                  {mobile.length>=10&&<a href={"tel:"+mobile} className="btn btn-green" style={{padding:"10px 14px",textDecoration:"none",whiteSpace:"nowrap"}}><i className="ti ti-phone"/>Call</a>}
                </div>
              </div>
              <div>
                <label style={LBL}>Order Number *</label>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <span style={{fontWeight:700,color:"#cc0000",fontSize:16,flexShrink:0}}>#</span>
                  <input className="inp" type="number" value={orderNumInput} onChange={e=>setOrderNumInput(e.target.value)} placeholder={String(suggestNum)} style={{flex:1}}/>
                </div>
                <div style={{fontSize:10.5,color:"#bbb",marginTop:3}}>Suggested: {fmtON(suggestNum)} · Change if needed</div>
              </div>
              <div><label style={LBL}>Delivery Date</label><input type="date" className="inp" value={delivery} onChange={e=>setDelivery(e.target.value)}/></div>
            </div>
          </div>

          {/* ── Order items ── */}
          <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:14}}>
            {items.map((it,i)=>(
              <div key={i} style={{border:"1.5px solid #eeebe6",borderRadius:13,padding:14,position:"relative"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <div style={{fontSize:12,fontWeight:700,color:"#cc0000",textTransform:"uppercase",letterSpacing:.5}}>
                    {items.length>1?`Item ${i+1}`:"Order Item"}
                  </div>
                  {items.length>1&&<button type="button" onClick={()=>removeItem(i)} style={{background:"#fff0f0",border:"1px solid #ffcccc",borderRadius:7,padding:"3px 8px",cursor:"pointer",color:"#cc0000",fontSize:12,fontWeight:600,display:"flex",alignItems:"center",gap:4}}><i className="ti ti-x" style={{fontSize:12}}/>Remove</button>}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:11}}>
                  <div><label style={LBL}>Product Type *</label><select className="inp" value={it.product} onChange={e=>updItem(i,"product",e.target.value)}>{PRODUCTS.map(p=><option key={p}>{p}</option>)}</select></div>
                  <div><label style={LBL}>Wood Type *</label><select className="inp" value={it.wood} onChange={e=>updItem(i,"wood",e.target.value)}>{WOODS.map(w=><option key={w}>{w}</option>)}</select></div>
                  <div style={{gridColumn:"span 2"}}>
                    <label style={LBL}>Size / Dimensions (inches) *</label>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                      <div><label style={{fontSize:11,color:"#999",display:"block",marginBottom:3}}>Length</label><input type="number" step="0.1" className="inp" value={it.dimL} onChange={e=>updItem(i,"dimL",e.target.value)} placeholder="e.g. 10"/></div>
                      <div><label style={{fontSize:11,color:"#999",display:"block",marginBottom:3}}>Width</label><input type="number" step="0.1" className="inp" value={it.dimW} onChange={e=>updItem(i,"dimW",e.target.value)} placeholder="e.g. 4"/></div>
                      <div><label style={{fontSize:11,color:"#999",display:"block",marginBottom:3}}>Thickness</label><input type="number" step="0.1" className="inp" value={it.dimT} onChange={e=>updItem(i,"dimT",e.target.value)} placeholder="e.g. 2"/></div>
                    </div>
                  </div>
                  <div><label style={LBL}>Quantity *</label><input type="number" className="inp" value={it.qty} onChange={e=>updItem(i,"qty",e.target.value)} placeholder="Units"/></div>
                  <div><label style={LBL}>Total Amount (₹)</label><input type="number" className="inp" value={it.total} onChange={e=>updItem(i,"total",e.target.value)} placeholder="0"/></div>
                  <div><label style={LBL}>Advance Paid (₹)</label><input type="number" className="inp" value={it.advance} onChange={e=>updItem(i,"advance",e.target.value)} placeholder="0"/></div>
                  <div><label style={LBL}>Pending (₹)</label><input type="number" className="inp" readOnly value={Math.max(0,(Number(it.total)||0)-(Number(it.advance)||0))} style={{background:"#fafaf8",color:"#999"}} placeholder="Auto"/></div>
                  <div style={{gridColumn:"span 2"}}><label style={LBL}>Notes</label><textarea className="inp" rows={2} value={it.notes} onChange={e=>updItem(i,"notes",e.target.value)} placeholder="Special instructions..."/></div>
                  <div style={{gridColumn:"span 2"}}>
                    <button type="button" onClick={()=>updItem(i,"needsDesign",!it.needsDesign)}
                      className="btn" style={{width:"100%",justifyContent:"center",
                        background:it.needsDesign?"#fff3e0":"#fff",
                        color:it.needsDesign?"#a35a00":"#777",
                        border:`1.5px solid ${it.needsDesign?"#ffb74d":"#ddd"}`}}>
                      <i className="ti ti-pencil-ruler"/>
                      {it.needsDesign?"Marked for Design — this order needs to go to the design shop":"Send for Design? (tap to mark)"}
                    </button>
                  </div>
                </div>
              </div>
            ))}
          </div>

          <button type="button" onClick={addItem} className="btn btn-outline" style={{marginBottom:16,width:"100%",justifyContent:"center",borderStyle:"dashed"}}>
            <i className="ti ti-plus"/>Add Another Item / Size
          </button>

          <button type="submit" className="btn btn-red" style={{width:"100%",justifyContent:"center",fontSize:15}}>
            <i className="ti ti-check"/>Create {items.length>1?`${items.length} Orders`:"Order"} & Generate QR{items.length>1?"s":""}
          </button>
        </form>
      </div>
    </div>
  );
}

// ── ORDER LIST ──
function OrderList({orders,updOrder,delOrder,toast2,user}){
  const [q,setQ]=useState("");
  const [fl,setFl]=useState("all");
  const [sel,setSel]=useState(null);
  const [delTarget,setDelTarget]=useState(null);

  const matchQ=(o,q)=>{
    if(!q) return true;
    const t=q.toLowerCase().trim();
    return o.customer.toLowerCase().includes(t)||o.mobile.includes(t)||o.id.toLowerCase().includes(t)||
      (o.orderNum&&(String(o.orderNum)===t||fmtON(o.orderNum).toLowerCase()===t||("#"+String(o.orderNum))===t));
  };
  const filtered=orders.filter(o=>matchQ(o,q)&&(fl==="all"||o.status===fl));

  const doDelete=(o)=>{setDelTarget(o);setSel(null);};

  if(sel) return(
    <div style={{maxWidth:560,margin:"0 auto"}}>

// ── RECEIVE ──
function Receive({orders,updOrder,user,toast2}){
  const [found,setFound]=useState(null);
  const [mid,setMid]=useState("");

  const findByText=useCallback(text=>{
    const t=text.trim();
    return orders.find(x=>x.id===t||x.mobile===t||(x.orderNum&&(String(x.orderNum)===t||fmtON(x.orderNum)===t||("#"+String(x.orderNum))===t)));
  },[orders]);

  const onScan=useCallback(text=>{
    const o=findByText(text);
    if(o){setFound(o);toast2("Order found: "+(o.orderNum?fmtON(o.orderNum):o.id));}
    else toast2("QR scanned but order not found: "+text,"err");
  },[findByText,toast2]);

  const search=()=>{const o=findByText(mid);o?setFound(o):toast2("Order not found","err");};
  const markRecv=()=>{
    if(found.status!==S.PROD){toast2("Already received","err");return;}
    updOrder(found.id,{status:S.RECV,receivedAt:now2(),receivedBy:user.name});
    toast2("Marked as Received!");setFound(null);setMid("");
  };

  return(
    <div style={{maxWidth:500,margin:"0 auto"}}>
      {!found&&(
        <div className="card">
          <div style={{fontWeight:700,fontSize:15,marginBottom:14}}>Scan QR Code to Receive</div>
          <QRScanner onResult={onScan} onError={()=>toast2("Camera error","err")}/>
          <div style={{display:"flex",alignItems:"center",gap:10,margin:"14px 0"}}>
            <div style={{flex:1,height:1,background:"#eee"}}/>
            <span style={{fontSize:11,color:"#bbb",flexShrink:0}}>OR SEARCH MANUALLY</span>
            <div style={{flex:1,height:1,background:"#eee"}}/>
          </div>
          <div style={{display:"flex",gap:8}}>
            <input className="inp" value={mid} onChange={e=>setMid(e.target.value)} placeholder="Order #, Order ID or Mobile" onKeyDown={e=>e.key==="Enter"&&search()}/>
            <button className="btn btn-red" onClick={search}><i className="ti ti-search"/></button>
          </div>
        </div>
      )}
      {found&&(
        <div className="card">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div style={{fontWeight:700,fontSize:16}}>Order Found</div>
            <button onClick={()=>{setFound(null);setMid("");}} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:"#bbb"}}><i className="ti ti-x"/></button>
          </div>
          <div style={{background:"#fafaf8",borderRadius:12,padding:14,marginBottom:14}}>
            {found.orderNum&&<div style={{fontSize:22,fontWeight:900,color:"#cc0000",marginBottom:2}}>Order {fmtON(found.orderNum)}</div>}
            <div style={{fontSize:11,color:"#aaa",marginBottom:4}}>{found.id}</div>
            <div style={{fontWeight:700,fontSize:15,marginBottom:2}}>{found.customer}</div>
            <div style={{fontSize:13,color:"#999",marginBottom:12}}>{found.mobile}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,fontSize:12.5}}>
              {[["Product",found.product],["Wood",found.wood],["Size",found.size],["Qty",found.qty],["Total",fmtM(found.total)],["Pending",fmtM(found.pending)]].map(([k,v])=>(
                <div key={k}><span style={{color:"#bbb"}}>{k}: </span><b>{v}</b></div>
              ))}
            </div>
          </div>
          <div style={{marginBottom:14}}><StatusBadge s={found.status}/></div>
          {found.status===S.PROD
            ?<button className="btn btn-green" style={{width:"100%",justifyContent:"center",fontSize:15}} onClick={markRecv}><i className="ti ti-check"/>Mark as Received at Office</button>
            :<div style={{padding:12,background:"#e1f5ee",borderRadius:10,color:"#0f6e56",fontWeight:600,fontSize:13,textAlign:"center"}}>✓ Already Received – {found.receivedAt}</div>}
        </div>
      )}
    </div>
  );
}

// ── DELIVER ──
function Deliver({orders,updOrder,user,toast2}){
  const [found,setFound]=useState(null);
  const [mid,setMid]=useState("");
  const [pm,setPm]=useState("Cash");
  const [pt,setPt]=useState("full");
  const [partial,setPartial]=useState("");

  const findByText=useCallback(text=>{
    const t=text.trim();
    return orders.find(x=>x.id===t||x.mobile===t||(x.orderNum&&(String(x.orderNum)===t||fmtON(x.orderNum)===t||("#"+String(x.orderNum))===t)));
  },[orders]);

  const onScan=useCallback(text=>{
    const o=findByText(text);
    if(o){setFound(o);toast2("Order found: "+(o.orderNum?fmtON(o.orderNum):o.id));}
    else toast2("QR scanned but order not found: "+text,"err");
  },[findByText,toast2]);

  const search=()=>{const o=findByText(mid);o?setFound(o):toast2("Order not found","err");};
  const markDel=()=>{
    if(found.status===S.PROD){toast2("Not yet received","err");return;}
    const pendFinal=pt==="full"?0:pt==="partial"?Math.max(0,found.pending-Number(partial)):found.pending;
    updOrder(found.id,{status:S.DELI,pending:pendFinal,payMethod:pm,payAt:now2(),deliveredAt:now2(),deliveredBy:user.name});
    toast2("Delivered & Paid!");
    setTimeout(()=>printInvoice({...found,status:S.DELI,pending:pendFinal,payMethod:pm,deliveredAt:now2()}),400);
    setFound(null);setMid("");setPt("full");setPartial("");
  };

  return(
    <div style={{maxWidth:500,margin:"0 auto"}}>
      {!found&&(
        <div className="card">
          <div style={{fontWeight:700,fontSize:15,marginBottom:14}}>Scan to Deliver & Collect Payment</div>
          <QRScanner onResult={onScan} onError={()=>toast2("Camera error","err")}/>
          <div style={{display:"flex",alignItems:"center",gap:10,margin:"14px 0"}}>
            <div style={{flex:1,height:1,background:"#eee"}}/>
            <span style={{fontSize:11,color:"#bbb",flexShrink:0}}>OR SEARCH MANUALLY</span>
            <div style={{flex:1,height:1,background:"#eee"}}/>
          </div>
          <div style={{display:"flex",gap:8}}>
            <input className="inp" value={mid} onChange={e=>setMid(e.target.value)} placeholder="Order #, Order ID or Mobile" onKeyDown={e=>e.key==="Enter"&&search()}/>
            <button className="btn btn-red" onClick={search}><i className="ti ti-search"/></button>
          </div>
        </div>
      )}
      {found&&(
        <div className="card">
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
            <div style={{fontWeight:700,fontSize:16}}>Payment & Delivery</div>
            <button onClick={()=>{setFound(null);setMid("");}} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:"#bbb"}}><i className="ti ti-x"/></button>
          </div>
          <div style={{background:"#fafaf8",borderRadius:12,padding:13,marginBottom:13}}>
            {found.orderNum&&<div style={{fontSize:20,fontWeight:900,color:"#cc0000",marginBottom:2}}>Order {fmtON(found.orderNum)}</div>}
            <div style={{fontSize:11,color:"#aaa",marginBottom:3}}>{found.id}</div>
            <div style={{fontWeight:700,fontSize:14}}>{found.customer} · {found.mobile}</div>
            <div style={{fontSize:12,color:"#777",marginTop:2}}>{found.product} · {found.wood} · {found.size} · Qty {found.qty}</div>
          </div>
          <div style={{background:"#fff8f8",border:"1px solid #ffe0e0",borderRadius:12,padding:13,marginBottom:13}}>
            <div style={{fontSize:12,fontWeight:700,color:"#cc0000",marginBottom:8}}>Payment Summary</div>
            {[["Total Amount",fmtM(found.total)],["Advance Paid",fmtM(found.advance)],["Pending Amount",fmtM(found.pending)]].map(([k,v])=>(
              <div key={k} style={{display:"flex",justifyContent:"space-between",fontSize:13,padding:"4px 0",borderBottom:"1px solid #ffe0e0"}}>
                <span style={{color:"#aaa"}}>{k}</span><b style={{color:k==="Pending Amount"?"#cc0000":"#1a1a1a"}}>{v}</b>
              </div>
            ))}
          </div>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:11.5,fontWeight:600,color:"#777",marginBottom:7}}>Payment Status</div>
            <div style={{display:"flex",gap:8}}>
              {[["full","Paid Full"],["partial","Partial"],["pending","Still Pending"]].map(([k,l])=>(
                <button key={k} className="btn" onClick={()=>setPt(k)} style={{flex:1,justifyContent:"center",background:pt===k?"#cc0000":"#fff",color:pt===k?"#fff":"#555",border:`1.5px solid ${pt===k?"#cc0000":"#ddd"}`,fontSize:12}}>{l}</button>
              ))}
            </div>
          </div>
          {pt==="partial"&&<div style={{marginBottom:12}}><label style={{...LBL}}>Amount Collected (₹)</label><input type="number" className="inp" value={partial} onChange={e=>setPartial(e.target.value)} placeholder="Enter amount"/></div>}
          <div style={{marginBottom:16}}>
            <div style={{fontSize:11.5,fontWeight:600,color:"#777",marginBottom:7}}>Payment Method</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {PAY_M.map(m=>(<button key={m} className="btn" onClick={()=>setPm(m)} style={{background:pm===m?"#1a1a1a":"#fff",color:pm===m?"#fff":"#555",border:`1.5px solid ${pm===m?"#1a1a1a":"#ddd"}`}}>{m}</button>))}
            </div>
          </div>
          {found.status===S.DELI
            ?<div style={{padding:12,background:"#e1f5ee",borderRadius:10,color:"#0f6e56",fontWeight:600,textAlign:"center",fontSize:13}}>✓ Already Delivered & Paid</div>
            :<button className="btn btn-red" style={{width:"100%",justifyContent:"center",fontSize:15}} onClick={markDel}><i className="ti ti-truck-delivery"/>Mark Delivered & Print Invoice</button>}
        </div>
      )}
    </div>
  );
}

// ── DESIGN (orders that need to be sent to the design shop) ──
function Design({orders,updOrder,toast2}){
  const flagged=orders.filter(o=>o.needsDesign);
  const pending=flagged.filter(o=>o.designStatus!=="Done");
  const done=flagged.filter(o=>o.designStatus==="Done");

  const markDone=o=>{updOrder(o.id,{designStatus:"Done"});toast2("Marked as design done!");};
  const markPending=o=>{updOrder(o.id,{designStatus:"Pending"});toast2("Moved back to pending");};

  const Row=({o,action})=>(
    <div className="card" style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",flexWrap:"wrap",border:"1px solid #eeebe6"}}>
      <div style={{width:44,height:44,background:"#fff3e0",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
        <i className="ti ti-pencil-ruler" style={{color:"#a35a00",fontSize:19}}/>
      </div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          {o.orderNum&&<span style={{fontWeight:900,color:"#cc0000",fontSize:14}}>{fmtON(o.orderNum)}</span>}
          <span style={{fontWeight:600,fontSize:14}}>{o.customer}</span>
        </div>
        <div style={{fontSize:12,color:"#999"}}>{o.product} · {o.wood} · {o.size} · Qty {o.qty}</div>
        {o.notes&&<div style={{fontSize:11.5,color:"#a35a00",marginTop:2}}>📝 {o.notes}</div>}
      </div>
      <StatusBadge s={o.status}/>
      {action}
    </div>
  );

  return(
    <div>
      <div style={{background:"#fff3e0",border:"1px solid #ffd9a0",borderRadius:12,padding:"12px 16px",marginBottom:18,fontSize:13,color:"#a35a00"}}>
        <i className="ti ti-info-circle" style={{marginRight:6}}/>
        Orders marked <b>"Send for Design"</b> while creating the order appear here, so the team can remember to send them to the design shop.
      </div>

      <div style={{fontSize:12,fontWeight:700,color:"#cc0000",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>
        To Be Sent for Design ({pending.length})
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:9,marginBottom:24}}>
        {pending.length===0&&<div style={{textAlign:"center",padding:30,color:"#bbb",background:"#fff",borderRadius:14}}>Nothing pending — all caught up!</div>}
        {pending.map(o=>(
          <Row key={o.id} o={o} action={
            <button className="btn btn-green" style={{padding:"7px 12px",fontSize:12}} onClick={()=>markDone(o)}><i className="ti ti-check"/>Mark Sent</button>
          }/>
        ))}
      </div>

      {done.length>0&&<>
        <div style={{fontSize:12,fontWeight:700,color:"#999",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>
          Already Sent ({done.length})
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:9}}>
          {done.map(o=>(
            <Row key={o.id} o={o} action={
              <button className="btn btn-outline" style={{padding:"7px 12px",fontSize:12}} onClick={()=>markPending(o)}><i className="ti ti-arrow-back-up"/>Undo</button>
            }/>
          ))}
        </div>
      </>}
    </div>
  );
}

function Reports({orders}){
  const [tab,setTab]=useState("daily");
  const deli=orders.filter(o=>o.status===S.DELI);
  const pend=orders.filter(o=>o.status!==S.DELI&&o.pending>0);
  const tabs=[["daily","Daily Sales"],["pending","Pending"],["delivered","Delivered"],["customers","Customers"]];
  const labels={orderNum:"Order #",id:"Order ID",customer:"Customer",mobile:"Mobile",product:"Product",wood:"Wood",qty:"Qty",total:"Total",advance:"Advance",pending:"Pending",status:"Status",payMethod:"Payment",deliveredAt:"Delivered"};
  const fv=(k,v)=>{
    if(k==="orderNum") return v?fmtON(v):"—";
    if(["total","advance","pending"].includes(k)) return fmtM(v);
    if(k==="status") return <StatusBadge s={v}/>;
    return v||"—";
  };
  const Table=({rows,cols})=>rows.length===0
    ?<div style={{textAlign:"center",padding:40,color:"#bbb",background:"#fff",borderRadius:14}}>No records</div>
    :<div style={{background:"#fff",borderRadius:14,border:"1px solid #eeebe6",overflow:"hidden"}}><div style={{overflowX:"auto"}}>
      <table style={{width:"100%",borderCollapse:"collapse"}}>
        <thead><tr style={{background:"#fafaf8"}}>{cols.map(c=><th key={c} style={{padding:"9px 10px",textAlign:"left",fontWeight:600,color:"#bbb",fontSize:11,borderBottom:"1px solid #eeebe6"}}>{labels[c]||c}</th>)}</tr></thead>
        <tbody>{rows.map(o=><tr key={o.id} style={{borderBottom:"1px solid #fafaf8"}}>{cols.map(c=><td key={c} style={{padding:"9px 10px",fontSize:12.5,color:c==="orderNum"?"#cc0000":c==="id"?"#888":c==="pending"&&o.pending>0?"#cc0000":"#333",fontWeight:c==="orderNum"?"700":"400"}}>{fv(c,o[c])}</td>)}</tr>)}</tbody>
      </table></div></div>;
  return(
    <div>
      <div style={{display:"flex",gap:8,marginBottom:18,flexWrap:"wrap"}}>
        {tabs.map(([k,l])=>(<button key={k} className="btn" onClick={()=>setTab(k)} style={{background:tab===k?"#cc0000":"#fff",color:tab===k?"#fff":"#555",border:`1.5px solid ${tab===k?"#cc0000":"#ddd"}`}}>{l}</button>))}
      </div>
      {tab==="daily"&&(
        <div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:12,marginBottom:18}}>
            {[["Total Revenue",fmtM(deli.reduce((a,o)=>a+o.total,0)),"#1d9e75"],["Delivered",deli.length,"#185fa5"],["Avg Order",fmtM(deli.length?Math.round(deli.reduce((a,o)=>a+o.total,0)/deli.length):0),"#854f0b"]].map(([l,v,c])=>(
              <div key={l} className="card" style={{padding:"14px 16px"}}><div style={{fontSize:10.5,color:"#bbb",marginBottom:5}}>{l}</div><div style={{fontSize:22,fontWeight:700,color:c}}>{v}</div></div>
            ))}
          </div>
          <Table rows={deli} cols={["orderNum","id","customer","product","qty","total","payMethod","deliveredAt"]}/>
        </div>
      )}
      {tab==="pending"&&(
        <div>
          <div style={{background:"#fff8f8",border:"1px solid #ffe0e0",borderRadius:12,padding:"11px 16px",marginBottom:14,fontWeight:700,color:"#cc0000",fontSize:14}}>
            Total Pending: {fmtM(pend.reduce((a,o)=>a+o.pending,0))}
          </div>
          <Table rows={pend} cols={["orderNum","id","customer","mobile","total","advance","pending","status"]}/>
        </div>
      )}
      {tab==="delivered"&&<Table rows={deli} cols={["orderNum","id","customer","product","wood","qty","total","deliveredAt"]}/>}
      {tab==="customers"&&(
        <div style={{display:"flex",flexDirection:"column",gap:9}}>
          {[...new Set(orders.map(o=>o.mobile))].map(mob=>{
            const co=orders.filter(o=>o.mobile===mob);const c=co[0];
            return(
              <div key={mob} className="card" style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8,padding:"13px 16px"}}>
                <div><div style={{fontWeight:700,fontSize:14}}>{c.customer}</div><div style={{fontSize:12,color:"#999"}}>{c.mobile}</div></div>
                <div style={{textAlign:"right"}}><div style={{fontWeight:700}}>{co.length} orders</div><div style={{fontSize:12,color:"#1d9e75",fontWeight:600}}>{fmtM(co.reduce((a,o)=>a+o.total,0))} total</div></div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
